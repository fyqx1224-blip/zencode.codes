<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星象座標系 · 3D高精物理地心儀</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#F0C96A;--gold-d:#D4A843;--blue:#63A3ED;--blue-l:#90C4FF;--bg:#020204;--red:#FF6B6B;--green:#7DE09A;--cream:#F0EAD6;}
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Noto Sans TC',sans-serif;user-select:none;-webkit-user-select:none}
#three-canvas{position:absolute;inset:0;z-index:1}
#topbar,#lp,#rp,#legend,.top-left-panel,#time-bar{transition:opacity .5s ease}
#ctrl-bar{transition:opacity .5s ease}
body.zen-mode #topbar,body.zen-mode #lp,body.zen-mode #rp,body.zen-mode #legend,body.zen-mode .top-left-panel,body.zen-mode #time-bar{opacity:0!important;pointer-events:none!important}
body.zen-mode #ctrl-bar{opacity:.2}
body.zen-mode #ctrl-bar:hover{opacity:1}
#topbar{position:absolute;top:0;left:0;right:0;z-index:30;pointer-events:none;padding:14px 22px 36px;background:linear-gradient(to bottom,rgba(2,2,4,.95) 0%,transparent 100%);display:flex;align-items:flex-start;gap:20px}
#tb-title{font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:var(--gold);text-shadow:0 0 28px rgba(240,201,106,.55);letter-spacing:.18em}
#tb-sub{font-size:.53rem;color:rgba(255,255,255,.32);letter-spacing:.28em;margin-top:3px}
.tb-right{margin-left:auto;text-align:right}
#tb-name{font-family:'Ma Shan Zheng',cursive;font-size:1.15rem;color:var(--cream);letter-spacing:.1em}
#tb-date{font-size:.62rem;color:rgba(255,255,255,.42);letter-spacing:.12em;margin-top:2px}
#tb-place{font-size:.52rem;color:var(--blue);opacity:.75;margin-top:3px;letter-spacing:.08em}
.top-left-panel{position:absolute;top:30px;left:30px;pointer-events:auto;z-index:40}
.btn-back{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:rgba(99,163,237,.08);border:1px solid rgba(99,163,237,.4);color:var(--blue);text-decoration:none;font-size:1.2rem;transition:all .3s;margin-bottom:20px;box-shadow:0 0 10px rgba(99,163,237,.2)}
.btn-back:hover{background:rgba(99,163,237,.2);border-color:var(--blue-l);box-shadow:0 0 20px rgba(99,163,237,.6);color:#fff}
#global-lang-toggle{position:fixed;top:20px;right:22px;z-index:100;display:flex;gap:10px;pointer-events:auto}
.mlbtn{background:rgba(99,163,237,.1);border:1px solid rgba(99,163,237,.3);font-size:.6rem;color:rgba(255,255,255,.6);cursor:pointer;letter-spacing:.05em;transition:.3s;padding:5px 12px;border-radius:6px;font-family:'Noto Sans TC',sans-serif}
.mlbtn:hover,.mlbtn.active{color:var(--gold);border-color:var(--gold);background:rgba(240,201,106,.15);box-shadow:0 0 12px rgba(240,201,106,.2)}
.side-panel{position:absolute;top:80px;z-index:20;width:220px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
#lp{left:14px}#rp{right:14px}
.pc{background:rgba(2,2,4,.87);backdrop-filter:blur(24px) saturate(1.5);border:1px solid rgba(99,163,237,.16);border-radius:10px;padding:13px 15px}
.pc:hover{border-color:rgba(99,163,237,.32)}
.pc-t{font-size:.5rem;color:var(--blue);letter-spacing:.22em;text-transform:uppercase;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid rgba(99,163,237,.1)}
.pr{display:flex;align-items:center;gap:7px;padding:4px 2px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;border-radius:4px;transition:.18s}
.pr:last-child{border-bottom:none}
.pr:hover{background:rgba(99,163,237,.07);padding-left:5px}
.pr-ic{font-size:1.05rem;width:20px;text-align:center;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-n{font-size:.62rem;color:rgba(255,255,255,.76)}
.pr-s{font-size:.5rem;color:rgba(255,255,255,.33);margin-top:1px}
.pr-d{font-size:.62rem;color:var(--gold);font-family:'Noto Serif TC',serif;flex-shrink:0}
.hg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.hc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:5px 7px;cursor:pointer;transition:.18s;text-align:center}
.hc:hover{background:rgba(240,201,106,.06);border-color:rgba(240,201,106,.22)}
.hc-n{font-size:.46rem;color:rgba(255,255,255,.45);letter-spacing:.05em}
.hc-s{font-size:.72rem;color:var(--gold);margin-top:1px}
.hc-p{font-size:.6rem;color:var(--blue-l);margin-top:2px;letter-spacing:.1em}
.al{font-size:.61rem;color:rgba(255,255,255,.62);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.7}
.al:last-child{border-bottom:none}
.at{display:inline-block;font-size:.48rem;padding:1px 5px;border-radius:3px;background:rgba(99,163,237,.14);color:var(--blue-l);margin-right:4px}
.av{color:var(--gold);font-family:'Noto Serif TC',serif}
@media(max-width:768px){
  .side-panel{display:none!important}
  #mobile-drawer{position:fixed;bottom:0;left:0;right:0;z-index:25;background:rgba(2,2,4,.96);backdrop-filter:blur(28px);border-top:1px solid rgba(99,163,237,.22);border-radius:18px 18px 0 0;transform:translateY(calc(100% - 48px));transition:transform .38s cubic-bezier(.4,0,.2,1);max-height:72vh;display:flex;flex-direction:column;}
  #mobile-drawer.open{transform:translateY(0)}
  #mobile-drawer-handle{display:flex;align-items:center;justify-content:center;height:48px;cursor:pointer;flex-shrink:0;gap:10px;border-bottom:1px solid rgba(99,163,237,.08);}
  #mobile-drawer-handle .pill{width:38px;height:4px;border-radius:2px;background:rgba(99,163,237,.4);transition:.2s;}
  #mobile-drawer.open .pill{background:var(--gold)}
  #mobile-drawer-label{font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:.2em}
  #mobile-drawer-content{overflow-y:auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;}
  #topbar{padding:10px 14px 24px}
  #tb-title{font-size:1.1rem}
  #tb-sub{display:none}
  #global-lang-toggle{top:12px;right:10px;gap:5px}
  .mlbtn{padding:4px 8px;font-size:.52rem}
  #legend{bottom:52px;left:8px;right:8px;transform:none;width:auto;overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start;padding:5px 14px;gap:12px;}
  #ctrl-bar{bottom:52px;right:8px}
  #time-bar{bottom:100px;min-width:280px;width:90%}
}
#legend{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;background:rgba(2,2,4,.8);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:30px;padding:6px 22px;display:flex;gap:18px;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-size:.56rem;color:rgba(255,255,255,.42);white-space:nowrap}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#ctrl-bar{position:absolute;bottom:16px;right:14px;z-index:20;display:flex;flex-direction:column;gap:6px;pointer-events:auto}
.cb{width:37px;height:37px;border-radius:50%;background:rgba(99,163,237,.07);border:1px solid rgba(99,163,237,.25);color:rgba(144,196,255,.78);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.22s;position:relative}
.cb:hover{background:rgba(99,163,237,.18);box-shadow:0 0 14px rgba(99,163,237,.28)}
.cb.on{background:rgba(99,163,237,.2);border-color:var(--blue-l);box-shadow:0 0 16px rgba(99,163,237,.4)}
.cb[data-tt]:hover::after{content:attr(data-tt);position:absolute;right:44px;top:50%;transform:translateY(-50%);white-space:nowrap;background:rgba(2,2,4,.94);border:1px solid rgba(99,163,237,.28);color:var(--blue-l);font-size:.56rem;padding:4px 9px;border-radius:4px;pointer-events:none}
#time-bar{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:auto;background:rgba(2,2,4,.84);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.09);border-radius:30px;padding:7px 20px;display:none;gap:12px;align-items:center;min-width:340px}
#time-bar.show{display:flex}
#time-lbl{font-size:.6rem;color:var(--gold);white-space:nowrap;min-width:116px;text-align:center}
#time-range{flex:1;accent-color:var(--blue)}
.tbtn{background:none;border:1px solid rgba(99,163,237,.3);color:var(--blue-l);font-size:.66rem;padding:3px 10px;border-radius:14px;cursor:pointer;transition:.18s;white-space:nowrap}
.tbtn:hover{background:rgba(99,163,237,.14)}
#tip{position:absolute;z-index:50;pointer-events:none;background:rgba(5,3,16,.94);border:1px solid rgba(240,201,106,.25);border-radius:8px;padding:11px 15px;display:none;max-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.7)}
#tip h4{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;color:var(--gold);margin-bottom:5px}
#tip p{font-size:.63rem;color:rgba(255,255,255,.63);line-height:1.72}
#mw{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.74);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;transition:opacity .6s;overflow-y:auto}
#modal{background:rgba(5,3,18,.97);border:1px solid rgba(99,163,237,.3);border-radius:14px;padding:38px 34px;width:92%;max-width:406px;box-shadow:0 48px 96px rgba(0,0,0,.92),0 0 80px rgba(99,163,237,.1);position:relative;margin:auto}
@media(max-width:768px){#modal{padding:24px 18px;margin:16px}#mw{align-items:flex-start;padding-top:10px}}
.ml{font-family:'Ma Shan Zheng',cursive;font-size:2.2rem;color:var(--blue-l);text-align:center;text-shadow:0 0 36px rgba(99,163,237,.55);letter-spacing:.14em}
.ms{font-size:.58rem;color:rgba(255,255,255,.32);text-align:center;letter-spacing:.15em;margin:4px 0 26px}
.fl{font-size:.5rem;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
input[type=text],input[type=number]{width:100%;padding:11px 13px;background:rgba(0,0,0,.56);border:1px solid rgba(99,163,237,.2);color:#fff;border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;outline:none;transition:.25s}
input:focus{border-color:var(--blue-l);background:rgba(99,163,237,.09);box-shadow:0 0 14px rgba(99,163,237,.2)}
input::placeholder{color:rgba(255,255,255,.17)}
#st-hint{font-size:.58rem;color:var(--gold);margin-top:6px;padding:7px 11px;background:rgba(212,168,67,.07);border-left:2px solid var(--gold-d);display:none;border-radius:0 4px 4px 0}
.sbtn{width:100%;padding:15px;margin-top:16px;background:rgba(99,163,237,.1);border:1px solid var(--blue);color:var(--blue-l);border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;letter-spacing:.3em;cursor:pointer;transition:.3s}
.sbtn:hover{background:var(--blue);color:#000;box-shadow:0 0 32px rgba(99,163,237,.55)}
.demo{text-align:center;margin-top:11px;font-size:.56rem;color:rgba(255,255,255,.28);cursor:pointer;transition:.18s}
.demo:hover{color:var(--blue-l)}
.lbl{pointer-events:none;font-family:'Noto Sans TC',sans-serif}
.lecl{color:#FFD700;font-size:.72rem;font-weight:600;text-shadow:0 0 14px #D4A843,0 0 5px #000}
.leq{color:#90C4FF;font-size:.72rem;font-weight:500;text-shadow:0 0 12px #63A3ED,0 0 5px #000}
.lman{color:rgba(180,255,200,.88);font-size:.61rem;text-shadow:0 0 8px rgba(125,224,154,.5),0 0 3px #000;letter-spacing:.05em}
.lzod{color:#F0C96A;font-size:.86rem;font-weight:700;text-shadow:0 0 16px #D4A843,0 0 5px #000}
.lpl{display:flex;flex-direction:column;align-items:center;gap:1px}
.lpl-ic{font-family:'Ma Shan Zheng',cursive;font-size:1.52rem;text-shadow:0 0 16px currentColor}
.lpl-nm{font-size:.5rem;opacity:.88;text-shadow:0 0 8px currentColor;white-space:nowrap}
.lax{color:rgba(255,255,255,.65);font-size:.75rem;letter-spacing:.1em;text-shadow:0 0 8px #000;font-weight:bold}
.lasc{color:var(--red);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--red),0 0 5px #000;letter-spacing:.05em}
.ldsc{color:var(--blue-l);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--blue-l),0 0 5px #000;letter-spacing:.05em}
#loading-overlay{position:fixed;inset:0;z-index:55;background:rgba(2,2,4,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .6s}
#loading-overlay.hide{opacity:0;pointer-events:none}
.loading-spinner{width:48px;height:48px;border:2px solid rgba(99,163,237,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.65rem;color:var(--blue);letter-spacing:.25em}
</style>

<body>
<div id="loading-overlay"><div class="loading-spinner"></div><div class="loading-text">載入星象引擎…</div></div>
<div class="top-left-panel"><a href="/" class="btn-back" title="返回主頁">⟨</a></div>
<div id="global-lang-toggle">
  <button class="mlbtn" data-lang="zh-TW" onclick="window.switchLang('zh-TW')">繁</button>
  <button class="mlbtn" data-lang="zh-CN" onclick="window.switchLang('zh-CN')">简</button>
  <button class="mlbtn" data-lang="en" onclick="window.switchLang('en')">EN</button>
  <button class="mlbtn" data-lang="ko" onclick="window.switchLang('ko')">KR</button>
</div>
<div id="three-canvas"></div>
<div id="topbar">
  <div>
    <div id="tb-title">星象座標系 · 天球儀</div>
    <div id="tb-sub">GEOCENTRIC ASTROLABE · 物理光影宇宙</div>
  </div>
  <div class="tb-right">
    <div id="tb-info" style="display:none">
      <div id="tb-name"></div>
      <div id="tb-date"></div>
      <div id="tb-place"></div>
    </div>
  </div>
</div>
<div id="mw">
<div id="modal">
  <div class="ml">星象座標系</div>
  <div class="ms">真3D地心儀 · 晝夜更替 · 二十八宿</div>
  <div class="fl">命主姓名</div>
  <input type="text" id="f-nm" placeholder="姓名（可留空）">
  <div class="fl">出生日期（公曆）</div>
  <div class="r3">
    <input type="number" id="f-y" placeholder="年" min="1900" max="2100" oninput="hst()">
    <input type="number" id="f-m" placeholder="月" min="1" max="12" oninput="hst()">
    <input type="number" id="f-d" placeholder="日" min="1" max="31" oninput="hst()">
  </div>
  <div class="fl">出生時間（24小時）</div>
  <div class="r2">
    <input type="number" id="f-h" placeholder="時 0-23" min="0" max="23" oninput="hst()">
    <input type="number" id="f-mi" placeholder="分 0-59" min="0" max="59" oninput="hst()">
  </div>
  <div class="fl">出生地經緯度與時區</div>
  <div class="r3">
    <input type="number" id="f-lg" placeholder="東經" step="0.1" value="120" oninput="hst()">
    <input type="number" id="f-lat" placeholder="北緯" step="0.1" value="30" oninput="hst()">
    <input type="number" id="f-tz" placeholder="時區" step="1" value="8" oninput="hst()">
  </div>
  <div id="st-hint"></div>
  <button class="sbtn" onclick="submitForm()">觀 測 星 象 能 量</button>
  <div class="demo" onclick="loadDemo()">→ 載入演示資料（2002.12.24 子夜 · 東經109 · 北緯31）</div>
</div>
</div>
<div class="side-panel" id="lp" style="display:none">
  <div class="pc"><div class="pc-t">星象 · 視黃道度數</div><div id="plist"></div></div>
  <div class="pc"><div class="pc-t">命盤分析摘要</div><div id="abody"></div></div>
</div>
<div class="side-panel" id="rp" style="display:none">
  <div class="pc"><div class="pc-t">黃道十二宮 · 宮位星曜</div><div class="hg" id="hgrid"></div></div>
</div>
<div id="mobile-drawer" style="display:none">
  <div id="mobile-drawer-handle" onclick="toggleDrawer()">
    <div class="pill"></div><div id="mobile-drawer-label">星象資料</div><div class="pill"></div>
  </div>
  <div id="mobile-drawer-content">
    <div class="pc"><div class="pc-t">星象 · 視黃道度數</div><div id="plist-m"></div></div>
    <div class="pc"><div class="pc-t">命盤分析摘要</div><div id="abody-m"></div></div>
    <div class="pc"><div class="pc-t">黃道十二宮</div><div class="hg" id="hgrid-m"></div></div>
  </div>
</div>
<div id="legend">
  <div class="li"><div class="ld" style="background:#FFD700"></div><span>黃道星座</span></div>
  <div class="li"><div class="ld" style="background:#63A3ED"></div><span>赤道</span></div>
  <div class="li"><div class="ld" style="background:#7DE09A"></div><span>二十八宿</span></div>
  <div class="li"><div class="ld" style="background:#FF6B6B"></div><span>ASC/十二宮</span></div>
</div>
<div id="ctrl-bar">
  <button class="cb" id="cb-zen" data-tt="沉浸星空" style="font-size:.9rem">🌌</button>
  <button class="cb" id="cb-spin" data-tt="自動旋轉">⟳</button>
  <button class="cb" id="cb-sys" data-tt="切換回歸/恆星" style="font-size:.7rem">歸</button>
  <button class="cb on" id="cb-out" data-tt="三王星">王</button>
  <button class="cb on" id="cb-ecl" data-tt="黃道環" style="color:#FFD700">◉</button>
  <button class="cb on" id="cb-eq"  data-tt="赤道環">⊕</button>
  <button class="cb on" id="cb-man" data-tt="二十八宿">宿</button>
  <button class="cb on" id="cb-pl"  data-tt="星體顯示">政</button>
  <button class="cb"    id="cb-asp" data-tt="相位連線">⋆</button>
  <button class="cb"    id="cb-tm"  data-tt="時間推移">⏱</button>
  <button class="cb"    id="cb-orb" data-tt="黃緯垂線">◎</button>
</div>
<div id="time-bar">
  <button class="tbtn" id="tb-play">▶ 播放</button>
  <input type="range" id="time-range" min="-87600" max="87600" value="0" step="1">
  <div id="time-lbl">當前時間</div>
  <button class="tbtn" onclick="resetTime()">重置</button>
</div>
<div id="tip"><h4 id="tip-h"></h4><p id="tip-p"></p></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════
//  紫炁校準：逆行假想星，每日減少0.0351978°
//  校準基準：2002.12.24 d≈1087.5，ziqi應在氐宿(約202°恆星度)
//  202 = ZIQI_BASE - 0.0351978×1087.5 → ZIQI_BASE ≈ 240.3
// ═══════════════════════════════════════════
const ZIQI_BASE = 240.3;
const Z_EXAG = 3.5;
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 769;

window.toggleDrawer = () => document.getElementById('mobile-drawer').classList.toggle('open');

// ── i18n ──────────────────────────────────
const LANGS = {
  'zh-TW':{
    zod:['白羊','金牛','雙子','巨蟹','獅子','處女','天秤','天蠍','射手','摩羯','水瓶','雙魚'],

const DEG=Math.PI/180, R2D=180/Math.PI;
const norm=x=>((x%360)+360)%360;

function jdn(y,m,d,h=12,mn=0){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5+(h+mn/60)/24;
}
const T_jd=jd=>(jd-2451545.0)/36525;

function solveKepler(M,e){
  let E=M;
  for(let i=0;i<10;i++){const dE=(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));E-=dE;if(Math.abs(dE)<1e-6)break;}
  return E;
}

const PE={
  mercury:{L:252.250,a:0.3871,e:0.2056,i:7.0049,w:77.456,Node:48.331,n:4.0923173},
  venus:  {L:181.979,a:0.7233,e:0.0068,i:3.3947,w:131.533,Node:76.680,n:1.6021302},
  mars:   {L:355.453,a:1.5237,e:0.0934,i:1.8506,w:336.040,Node:49.557,n:0.5240208},
  jupiter:{L:34.404, a:5.2026,e:0.0485,i:1.3030,w:14.754, Node:100.454,n:0.0830853},
  saturn: {L:50.077, a:9.5371,e:0.0555,i:2.4845,w:92.432, Node:113.663,n:0.0334442},
  uranus: {L:313.232,a:19.189,e:0.0463,i:0.7733,w:170.964,Node:74.006, n:0.0117258},
  neptune:{L:304.880,a:30.070,e:0.0090,i:1.7700,w:44.971, Node:131.784,n:0.0059951},
  pluto:  {L:238.929,a:39.482,e:0.2488,i:17.140,w:224.067,Node:110.303,n:0.0039648}
};

function getHelio(id,d){
  const p=PE[id], M=norm(p.L+p.n*d-p.w), E=solveKepler(M*DEG,p.e);
  const xv=p.a*(Math.cos(E)-p.e), yv=p.a*(Math.sqrt(1-p.e*p.e)*Math.sin(E));
  const r=Math.sqrt(xv*xv+yv*yv), l=norm(Math.atan2(yv,xv)*R2D+p.w);
  const lat=p.i*Math.sin((l-p.Node)*DEG), z=r*Math.sin(lat*DEG);
  return {l, r:r*Math.cos(lat*DEG), z};
}

function calcAll(T,jd,lng,lat,isSid){
  const d=jd-2451545.0; let geo={};
  const L_sun=norm(280.460+0.9856474*d), g_sun=norm(357.528+0.9856003*d);
  geo.sun=norm(L_sun+1.915*Math.sin(g_sun*DEG)+0.020*Math.sin(2*g_sun*DEG));
  geo.sun_lat=0;
  const xe=Math.cos(norm(geo.sun+180)*DEG), ye=Math.sin(norm(geo.sun+180)*DEG);
  const D=norm(297.85036+12.190749*d), M=norm(357.52772+0.985600*d);
  const Mp=norm(134.96298+13.064992*d), F=norm(93.27191+13.229350*d);
  geo.moon=norm(218.3165+13.176396*d+6.289*Math.sin(Mp*DEG)+1.274*Math.sin((2*D-Mp)*DEG)+0.658*Math.sin(2*D*DEG)+0.214*Math.sin(2*Mp*DEG)-0.186*Math.sin(M*DEG)-0.114*Math.sin(2*F*DEG));
  ['mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto'].forEach(id=>{
    const h=getHelio(id,d);
    const xp=h.r*Math.cos(h.l*DEG), yp=h.r*Math.sin(h.l*DEG);
    const X=xp-xe, Y=yp-ye;
    geo[id]=norm(Math.atan2(Y,X)*R2D);
    geo[id+'_lat']=Math.atan2(h.z,Math.sqrt(X*X+Y*Y))*R2D;
  });
  const ascNode=norm(125.04452-0.0529538*d);
  geo.ketu=ascNode; geo.rahu=norm(ascNode+180);
  geo.moon_lat=5.145*Math.sin((geo.moon-geo.ketu)*DEG);
  geo.rahu_lat=0; geo.ketu_lat=0;
  geo.yapo=norm(83.3532465+0.11140353*d+180);
  geo.yapo_lat=5.145*Math.sin((geo.yapo-geo.ketu)*DEG);
  // ★ 紫炁：逆行（每日减少），用减法
  geo.ziqi=norm(ZIQI_BASE-0.0351978*d);
  geo.ziqi_lat=0;
  const gmst=280.46061837+360.98564736629*d+0.000387933*T*T;
  const lst=norm(gmst+lng)*DEG;
  const obliq=(23.4392911-0.0130042*T)*DEG, lat_rad=lat*DEG;
  geo.asc=norm(Math.atan2(Math.cos(lst),-(Math.sin(lst)*Math.cos(obliq)+Math.tan(lat_rad)*Math.sin(obliq)))*R2D);
  geo.dsc=norm(geo.asc+180);
  if(isSid){
    const aya=24.03+d*(50.29/36525);
    const latKeys=new Set(Object.keys(geo).filter(k=>k.endsWith('_lat')));
    for(let k in geo){if(!latKeys.has(k)&&typeof geo[k]==='number') geo[k]=norm(geo[k]-aya);}
  }
  return {geo,lst};
}

// 角宿起于恒星黄道约0°（白羊恒星起点），按传统宿度宽度排列
const MANSION_W=[12,9,15,5,5,18,11,26,8,12,10,17,16,9,16,12,14,11,16,2,9,33,4,15,7,18,18,17];
const MANS=[];
// ★ 修复：角宿恒星起点 = 0° (以恒星白羊座0°为基准)
// 传统上角宿起于赤经约180°的恒星度，对应春分点偏移后
// 用标准值：角宿起于恒星黄道 0° (即 vernal equinox in sidereal)
let _acc=0;
for(let i=0;i<28;i++){const w=MANSION_W[i]*360/365;MANS.push({id:i,s:_acc,w});_acc+=w;}

function getMansionSid(sidLon){
  const s=((sidLon%360)+360)%360;
  for(const m of MANS){
    const ms=m.s%360, me=(m.s+m.w)%360;
    if(ms<me){if(s>=ms&&s<me)return LANGS[currLang].man[m.id];}
    else{if(s>=ms||s<me)return LANGS[currLang].man[m.id];}
  }
  return LANGS[currLang].man[0];
}

function getMansion(tropLon,isSid,jd){
  let sidLon=tropLon;
  if(!isSid&&jd){const d=jd-2451545.0;const aya=24.03+d*(50.29/36525);sidLon=norm(tropLon-aya);}
  return getMansionSid(sidLon);
}

function analyzeChart(geo,isSid,jd){
  const d=LANGS[currLang], lines=[];
  const sz=zodiac(geo.sun),mz=zodiac(geo.moon),az=zodiac(geo.asc);
  const mm=getMansion(geo.moon,isSid,jd);
  const elong=norm(geo.moon-geo.sun);
  const phase=elong<45?d.ui.p1:elong<135?d.ui.p2:elong<225?d.ui.p3:elong<315?d.ui.p4:d.ui.p5;
  lines.push(`<span class="at">${d.pl.sun}</span>${d.al.sun} <span class="av">${sz.s} ${sz.d}°</span>`);
  lines.push(`<span class="at">${d.pl.moon}</span>${d.al.moon} <span class="av">${mz.s}·${mm}${d.ui.mansion}</span>`);
  lines.push(`<span class="at">${d.al.phase}</span><span class="av">${phase}</span> ${d.ui.deg} ${elong.toFixed(0)}°`);
  lines.push(`<span class="at">${d.pl.rahu}</span>${d.al.rahu} <span class="av">${zodiac(geo.rahu).s}</span>`);
  lines.push(`<span class="at">${d.pl.jupiter}</span>${d.al.jup} <span class="av">${zodiac(geo.jupiter).s}</span>`);
  lines.push(`<span class="at">${d.pl.saturn}</span>${d.al.sat} <span class="av">${zodiac(geo.saturn).s}</span>`);
  return lines;
}

const METEOR_COUNT=6;
const meteors=[];
function makeMeteor(){
  const len=Math.random()*25+10;
  const geo=new THREE.BufferGeometry();
  const pts=new Float32Array(6); // 2 points × 3 coords
  geo.setAttribute('position',new THREE.BufferAttribute(pts,3));
  const mat=new THREE.LineBasicMaterial({color:0xEEEEFF,transparent:true,opacity:0,linewidth:1});
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  // random direction vector
  const dir=new THREE.Vector3(Math.random()-.5,Math.random()*.3-.5,Math.random()-.5).normalize();
  const startR=180+Math.random()*80;
  const origin=new THREE.Vector3((Math.random()-.5)*startR,(Math.random()-.5)*80,(Math.random()-.5)*startR);
  const speed=80+Math.random()*120;
  return {line,geo,mat,dir,origin,speed,len,t:Math.random()*4,active:false,life:0};
}
for(let i=0;i<METEOR_COUNT;i++) meteors.push(makeMeteor());
function respawnMeteor(m){
  m.dir=new THREE.Vector3(Math.random()-.5,-0.3-Math.random()*0.4,Math.random()-.5).normalize();
  const startR=150+Math.random()*60;
  m.origin=new THREE.Vector3((Math.random()-.5)*startR,60+Math.random()*40,(Math.random()-.5)*startR);
  m.speed=80+Math.random()*120;
  m.len=Math.random()*22+8;
  m.life=0;
  m.t=0;
  m.active=true;
}
function updateMeteors(dt){
  meteors.forEach(m=>{
    m.t+=dt;
    if(!m.active&&m.t>3+Math.random()*5){respawnMeteor(m);return;}
    if(!m.active) return;
    m.life+=dt;
    const maxLife=0.8+m.len/m.speed;
    if(m.life>maxLife){m.active=false;m.mat.opacity=0;m.t=0;return;}
    const head=m.origin.clone().addScaledVector(m.dir,m.life*m.speed);
    const tail=head.clone().addScaledVector(m.dir,-m.len);
    const pos=m.geo.attributes.position;
    pos.setXYZ(0,tail.x,tail.y,tail.z);
    pos.setXYZ(1,head.x,head.y,head.z);
    pos.needsUpdate=true;
    const fade=m.life/maxLife;
    m.mat.opacity=fade<0.15?fade/0.15:fade>0.7?(1-fade)/0.3:1;
    m.mat.opacity*=0.85;
  });
}

// Saturn ring texture
function saturnRingTex(){
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const ctx=c.getContext('2d'),cx=256,cy=256;
  const g=ctx.createRadialGradient(cx,cy,95,cx,cy,252);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(0.08,'rgba(190,170,140,0.9)');
  g.addColorStop(0.25,'rgba(215,195,165,1)');
  g.addColorStop(0.42,'rgba(0,0,0,0)');
  g.addColorStop(0.5,'rgba(235,215,185,0.95)');
  g.addColorStop(0.78,'rgba(185,165,135,0.65)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,512,512);
  return new THREE.CanvasTexture(c);
}

function lbl2D(parent,cls,r,angle,type,id){
  const el=document.createElement('div');el.className='lbl '+cls;
  if(type) el.setAttribute('data-3d-type',type);
  if(id!==undefined) el.setAttribute('data-3d-id',id);
  const d=LANGS[currLang];
  if(type==='raw') el.innerHTML=id;
  else if(type==='ui') el.innerHTML=d.ui[id];
  else if(type==='zod') el.innerHTML=d.zod[id];
  else if(type==='man') el.innerHTML=d.man[id]+d.ui.mansion;
  else if(type==='pl') el.innerHTML=d.pl[id];
  const o=new CSS2DObject(el);
  o.position.set(Math.cos(angle)*r,Math.sin(angle)*r,0);
  parent.add(o); return o;
}

const earthG=new THREE.Group(); scene.add(earthG);
function buildEarth(){
  const mat=new THREE.MeshStandardMaterial({
    map:loadedTex.earth||null, color:loadedTex.earth?0xffffff:0x1a4a9a,
    roughness:0.8, metalness:0.1
  });
  earthG.add(new THREE.Mesh(new THREE.SphereGeometry(1.5,64,64),mat));
  earthG.add(new THREE.Mesh(new THREE.SphereGeometry(1.68,32,32),
    new THREE.MeshBasicMaterial({color:0x4488CC,transparent:true,opacity:.13,blending:THREE.AdditiveBlending,side:THREE.BackSide})));
}

function buildPlanet(pc){
  const tex=loadedTex[pc.id];
  const em=EMISSIVE[pc.id]||{col:pc.col,intensity:0.1};
  let mat;
  if(pc.type==='fict'){
    mat=new THREE.MeshBasicMaterial({color:pc.col});
  } else if(pc.id==='sun'){
    // 太阳：纯发光，不受其他光影响，高emissive触发强bloom
    mat=new THREE.MeshStandardMaterial({
      color:0xFFFAE0, emissive:new THREE.Color(em.col), emissiveIntensity:em.intensity,
      roughness:1,metalness:0
    });
  } else {
    // ★★ 其他行星：物理材质+贴图+适量emissive
    // emissive足够触发bloom但不覆盖贴图细节
    mat=new THREE.MeshStandardMaterial({
      map:tex||null, color:tex?0xffffff:pc.col,
      emissive:new THREE.Color(em.col), emissiveIntensity:em.intensity,
      roughness:0.75, metalness:0.05
    });
  }
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(pc.sz,64,64),mat);
  // 虚星装饰环
  if(pc.type==='fict'){
    sphere.add(new THREE.Mesh(new THREE.TorusGeometry(pc.sz*1.9,.09,8,32),
      new THREE.MeshBasicMaterial({color:pc.col,transparent:true,opacity:.45})));
  }
  // 土星环
  if(pc.id==='saturn'){
    const rm=new THREE.MeshStandardMaterial({map:satRingTex,transparent:true,opacity:.93,side:THREE.DoubleSide,emissive:new THREE.Color(0x554433),emissiveIntensity:.1});
    const ring=new THREE.Mesh(new THREE.RingGeometry(pc.sz*1.55,pc.sz*2.85,64),rm);
    ring.rotation.x=Math.PI/2+0.466; sphere.add(ring);
  }
  // 太阳：点光源+Corona
  if(pc.id==='sun'){
    sphere.add(new THREE.PointLight(0xFFF5CC,1100,0,2.0));
    sphere.add(new THREE.Mesh(new THREE.SphereGeometry(pc.sz*1.5,32,32),
      new THREE.MeshBasicMaterial({color:0xFFAA00,transparent:true,opacity:.16,blending:THREE.AdditiveBlending,side:THREE.BackSide})));
  }
  // 金星、木星额外Corona
  if(pc.id==='venus'||pc.id==='jupiter'){
    sphere.add(new THREE.Mesh(new THREE.SphereGeometry(pc.sz*1.32,24,24),
      new THREE.MeshBasicMaterial({color:em.col,transparent:true,opacity:.1,blending:THREE.AdditiveBlending,side:THREE.BackSide})));
  }
  return sphere;
}

function buildAllPlanets(){
  buildEarth();
  PCONF.forEach(pc=>{
    const sphere=buildPlanet(pc);
    if(pc.isOut) sphere.visible=false;
    plG.add(sphere); pMesh[pc.id]=sphere;

    const hex='#'+pc.col.toString(16).padStart(6,'0');
    const el=document.createElement('div');el.className='lbl lpl';
    el.innerHTML=`<div class="lpl-ic" style="color:${hex}">${pc.ic}</div><div class="lpl-nm" style="color:${hex}" data-3d-type="pl" data-3d-id="${pc.id}"></div>`;
    const obj=new CSS2DObject(el);
    if(pc.isOut) obj.element.style.display='none';
    plG.add(obj); pLbl[pc.id]=obj;

    // ★★ Drop lines：用动态位置数组，避免geometry重建
    const positions=new Float32Array(6);
    const dg=new THREE.BufferGeometry();
    const pa=new THREE.BufferAttribute(positions,3); pa.setUsage(THREE.DynamicDrawUsage);
    dg.setAttribute('position',pa);
    const dl=new THREE.Line(dg,new THREE.LineBasicMaterial({color:pc.col,transparent:true,opacity:.55}));
    dl.visible=false; dl.userData.positions=positions;
    plG.add(dl); dropLines[pc.id]=dl;
  });
  window.switchLang(currLang);
}

const S={zen:false,spin:false,sidereal:false,showOut:true,ecliptic:true,equator:true,mansion:true,planets:true,aspects:false,time:false,orb:false};

function bindBtn(id,key,onFn,offFn){
  const b=document.getElementById(id); if(!b) return;
  b.classList.toggle('on',S[key]);
  b.addEventListener('click',()=>{S[key]=!S[key];b.classList.toggle('on',S[key]);S[key]?onFn():offFn();});
}

function placePlanets(geo,lst){
  currentLST=lst;
  earthG.rotation.y=(lst*DEG)+idleSpin;

  PCONF.forEach(pc=>{
    const vis=!pc.isOut||S.showOut;
    const lon=geo[pc.id]; if(lon===undefined) return;
    const a=lon*DEG, beta=(geo[pc.id+'_lat']||0)*DEG;
    const rP=Math.cos(beta)*pc.R;
    const x=Math.cos(a)*rP, y=Math.sin(a)*rP;
    const z=Math.sin(beta)*pc.R*(pc.id==='moon'?1.5:Z_EXAG);
    if(pMesh[pc.id]){pMesh[pc.id].position.set(x,y,z);pMesh[pc.id].visible=vis;}
    if(pLbl[pc.id]){pLbl[pc.id].position.set(x,y,z);pLbl[pc.id].element.style.display=vis?'flex':'none';}

    // ★★ Drop line：直接写入buffer，无需重建geometry
    const dl=dropLines[pc.id];
    if(dl){
      const show=vis&&S.orb&&Math.abs(z)>0.05;
      dl.visible=show;
      if(show){
        const pos=dl.userData.positions;
        pos[0]=x;pos[1]=y;pos[2]=z;   // tail (on ecliptic plane)
        pos[3]=x;pos[4]=y;pos[5]=0;   // head (projected to plane)
        dl.geometry.attributes.position.needsUpdate=true;
      }
    }
  });

  if(S.aspects) buildAspects(geo); else aspG.clear();

  // Rebuild house lines
  while(houseG.children.length>0){
    const c=houseG.children[0];
    if(c.isCSS2DObject&&c.element) c.element.remove();
    houseG.remove(c);
  }
  const asc=geo.asc;
  for(let i=0;i<12;i++){
    const a=norm(asc+i*30)*DEG, isA=(i===0||i===6);
    const col=i===0?0xFF4444:(i===6?0x4488FF:0xFFFFFF);
    houseG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(Math.cos(a)*18,Math.sin(a)*18,0),
      new THREE.Vector3(Math.cos(a)*(isA?43:40),Math.sin(a)*(isA?43:40),0)
    ]),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:isA?.65:.18})));
    if(i===0) lbl2D(houseG,'lasc',46,a,'ui','asc');
    else if(i===6) lbl2D(houseG,'ldsc',46,a,'ui','dsc');
    else lbl2D(houseG,'lax',42.5,a,'raw',i+1);
  }
}

const ASP_A=[0,60,90,120,150,180], ASP_C=[0xFFFF00,0x44FF88,0xFF4444,0x44AAFF,0xFF8844,0xFF4444];
function buildAspects(geo){
  aspG.clear();
  const bp=['sun','moon','mercury','venus','mars','jupiter','saturn'];
  if(S.showOut) bp.push('uranus','neptune','pluto');
  for(let i=0;i<bp.length;i++) for(let j=i+1;j<bp.length;j++){
    const d1=bp[i],d2=bp[j];
    const diff=Math.min(norm(geo[d1]-geo[d2]),norm(geo[d2]-geo[d1]));
    for(let k=0;k<ASP_A.length;k++){
      if(Math.abs(diff-ASP_A[k])<8){
        const p1=pMesh[d1]?pMesh[d1].position.clone():new THREE.Vector3();
        const p2=pMesh[d2]?pMesh[d2].position.clone():new THREE.Vector3();
        aspG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1,p2]),
          new THREE.LineBasicMaterial({color:ASP_C[k],transparent:true,opacity:.45})));
        break;
      }
    }
  }
}

  document.getElementById('tip-p').innerHTML=p;
  const t=document.getElementById('tip'); t.style.display='block';
  t.style.left=Math.min(e.clientX+16,innerWidth-215)+'px';

window.hst=function(){
  const lng=parseFloat(document.getElementById('f-lg').value);
  const tz=parseInt(document.getElementById('f-tz').value)||8;
  const h=parseInt(document.getElementById('f-h').value)||0;

window.submitForm=function(){
  const name=document.getElementById('f-nm').value.trim()||'命主';
  const y=parseInt(document.getElementById('f-y').value);
  const m=parseInt(document.getElementById('f-m').value);
  const d=parseInt(document.getElementById('f-d').value);
  let h=parseInt(document.getElementById('f-h').value);
  let mn=parseInt(document.getElementById('f-mi').value);
  if(isNaN(h)||h<0||h>23) h=12;
  if(isNaN(mn)||mn<0||mn>59) mn=0;
  const lng=parseFloat(document.getElementById('f-lg').value)||120;
  const lat=parseFloat(document.getElementById('f-lat').value)||30;
  const tz=parseInt(document.getElementById('f-tz').value)||8;
  if(!y||!m||!d||isNaN(y)||isNaN(m)||isNaN(d)){alert('請輸入完整的年月日！');return;}
  const utcH=h-tz;
  const jd_utc=jdn(y,m,d,utcH,mn);
  const st=applyST(h,mn,stCorr(lng,tz*15));
  userData={name,y,m,d,h:st.h,mn:st.m,lng,lat,tz,jd:jd_utc};
  launch();
};

// ★ 演示数据改为午夜，使11宫落在角亢氐区域
window.loadDemo=function(){
  ['f-nm','f-y','f-m','f-d','f-h','f-mi','f-lg','f-lat','f-tz']
    .forEach((id,i)=>{ document.getElementById(id).value=['演示','2002','12','24','0','0','109','31','8'][i]; });
  window.submitForm();
};

function updatePositions(){
  if(!userData.jd) return;
  const offH=parseInt(document.getElementById('time-range').value)||0;
  const tJD=userData.jd+(offH/24);
  const T=T_jd(tJD);
  const res=calcAll(T,tJD,userData.lng,userData.lat,S.sidereal);
  curGeo=res.geo;
  placePlanets(curGeo,res.lst);
  // ★★ 宿度环旋转修正：把恒星坐标对齐到热带黄道平面
  // manG在eclG下，所以rotation.z = +aya使恒星0°对齐热带aya°
  const d2=tJD-2451545.0;
  const aya=24.03+d2*(50.29/36525);
  manG.rotation.z=S.sidereal?0:aya*DEG;
  renderPlanetList(curGeo,S.sidereal,tJD,'');
  renderHouseGrid(curGeo,S.sidereal,tJD,'');
  renderAnalysis(curGeo,S.sidereal,tJD,'');
  renderPlanetList(curGeo,S.sidereal,tJD,'-m');
  renderHouseGrid(curGeo,S.sidereal,tJD,'-m');
  renderAnalysis(curGeo,S.sidereal,tJD,'-m');
  document.getElementById('tb-place').textContent=
    `lng ${userData.lng.toFixed(1)}° · lat ${userData.lat.toFixed(1)}° · ${S.sidereal?LANGS[currLang].ui.sid:LANGS[currLang].ui.trop}`;
}

function launch(){
  updatePositions();
  document.getElementById('tb-name').textContent=userData.name;
  document.getElementById('tb-date').textContent=
    `${userData.y}.${String(userData.m).padStart(2,'0')}.${String(userData.d).padStart(2,'0')} ${String(userData.h).padStart(2,'0')}:${String(userData.mn).padStart(2,'0')}`;
  document.getElementById('tb-info').style.display='block';
  if(isMobile){ document.getElementById('mobile-drawer').style.display='flex'; }
  else{ document.getElementById('lp').style.display='flex'; document.getElementById('rp').style.display='flex'; }
  const mw=document.getElementById('mw');
  if(mw.style.display!=='none'){
    mw.style.transition='opacity .7s'; mw.style.opacity='0';
    setTimeout(()=>{mw.style.display='none';},700);
    OCtrl.autoRotate=true; setTimeout(()=>OCtrl.autoRotate=false,5500);
  }
}

// ── Time Scrubber ──────────────────────────
const tRange=document.getElementById('time-range'), tLbl=document.getElementById('time-lbl');
tRange.addEventListener('input',()=>{
  if(!userData.jd) return;
  updatePositions();
  const offH=parseInt(tRange.value);
  const base=new Date(Date.UTC(userData.y,userData.m-1,userData.d,userData.h,userData.mn));
  const tgt=new Date(base.getTime()+offH*3600000);
  tLbl.textContent=`${tgt.getUTCFullYear()}.${String(tgt.getUTCMonth()+1).padStart(2,'0')}.${String(tgt.getUTCDate()).padStart(2,'0')} ${String(tgt.getUTCHours()).padStart(2,'0')}:00`;
});
const tbPlay=document.getElementById('tb-play');
tbPlay.addEventListener('click',function(){
  if(playingTime){clearInterval(playInterval);playingTime=false;this.textContent='▶ 播放';return;}
  playingTime=true; this.textContent='⏸ 暫停';
  playInterval=setInterval(()=>{
    const v=Math.min(parseInt(tRange.value)+12,87600);
    tRange.value=v; tRange.dispatchEvent(new Event('input'));
    if(v>=87600){clearInterval(playInterval);playingTime=false;tbPlay.textContent='▶ 播放';}
  },45);
});
window.resetTime=function(){
  clearInterval(playInterval);playingTime=false;tbPlay.textContent='▶ 播放';
  tRange.value=0;tRange.dispatchEvent(new Event('input'));tLbl.textContent='當前時間';
};

bindBtn('cb-zen','zen',()=>document.body.classList.add('zen-mode'),()=>document.body.classList.remove('zen-mode'));

});}

// ★★ 黄纬垂线按钮（完整修复版）
{const b=document.getElementById('cb-orb');
b.addEventListener('click',()=>{
  S.orb=!S.orb; b.classList.toggle('on',S.orb);
  if(!S.orb){
    // 关闭时立即隐藏所有垂线
    Object.values(dropLines).forEach(dl=>{dl.visible=false;});
  } else {
    // 开启时重算位置（需要当前geo数据）
    if(userData.jd) updatePositions();
  }
});}

// ── Render Loop ────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  OCtrl.update();
  idleSpin+=dt*0.05;
  earthG.rotation.y=(currentLST*DEG)+idleSpin;
  // 星体自转
  Object.values(pMesh).forEach((mesh,i)=>{if(mesh&&mesh.rotation) mesh.rotation.y+=dt*(0.08+i*0.018);});
  // 流星
  updateMeteors(dt);
  composer.render(dt);
  lblR.render(scene,camera);
}

// ── Boot ───────────────────────────────────
Promise.all(texPromises).then(()=>{
  buildAllPlanets();
  const ov=document.getElementById('loading-overlay');
  ov.classList.add('hide'); setTimeout(()=>ov.style.display='none',700);
  animate();
}).catch(()=>{
  buildAllPlanets();
  document.getElementById('loading-overlay').style.display='none';
  animate();
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  bloom.setSize(innerWidth,innerHeight);
  lblR.setSize(innerWidth,innerHeight);
});
