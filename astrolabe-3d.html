<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星象座標系 · 立體天球儀</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F0C96A;--gold-d:#D4A843;--blue:#63A3ED;--blue-l:#90C4FF;
  --bg:#03020A;--red:#FF6B6B;--green:#7DE09A;--purple:#C084FC;--cream:#F0EAD6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Noto Sans TC',sans-serif;user-select:none;-webkit-user-select:none}

/* Canvas wraps */
#three-canvas{position:absolute;inset:0;z-index:1}

/* ── TOP BAR ── */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:30;pointer-events:none;
  padding:14px 22px 36px;
  background:linear-gradient(to bottom,rgba(3,2,10,.95) 0%,transparent 100%);
  display:flex;align-items:flex-start;gap:20px
}
#tb-title{font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:var(--gold);
  text-shadow:0 0 28px rgba(240,201,106,.55);letter-spacing:.18em}
#tb-sub{font-size:.53rem;color:rgba(255,255,255,.32);letter-spacing:.28em;margin-top:3px}
.tb-right{margin-left:auto;text-align:right}
#tb-name{font-family:'Ma Shan Zheng',cursive;font-size:1.15rem;color:var(--cream);letter-spacing:.1em}
#tb-date{font-size:.62rem;color:rgba(255,255,255,.42);letter-spacing:.12em;margin-top:2px}
#tb-place{font-size:.52rem;color:var(--blue);opacity:.75;margin-top:3px;letter-spacing:.08em}

/* ── SIDE PANELS ── */
.side-panel{
  position:absolute;top:70px;z-index:20;width:210px;
  display:flex;flex-direction:column;gap:8px;pointer-events:auto
}
#lp{left:14px}#rp{right:14px}

.pc{
  background:rgba(3,2,10,.87);backdrop-filter:blur(24px) saturate(1.5);
  border:1px solid rgba(99,163,237,.16);border-radius:10px;padding:13px 15px
}
.pc:hover{border-color:rgba(99,163,237,.32)}
.pc-t{font-size:.5rem;color:var(--blue);letter-spacing:.22em;text-transform:uppercase;
  margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid rgba(99,163,237,.1)}

/* planet rows */
.pr{display:flex;align-items:center;gap:7px;padding:4px 2px;
  border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;
  border-radius:4px;transition:.18s}
.pr:last-child{border-bottom:none}
.pr:hover{background:rgba(99,163,237,.07);padding-left:5px}
.pr-ic{font-size:1.05rem;width:20px;text-align:center;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-n{font-size:.62rem;color:rgba(255,255,255,.76)}
.pr-s{font-size:.5rem;color:rgba(255,255,255,.33);margin-top:1px}
.pr-d{font-size:.62rem;color:var(--gold);font-family:'Noto Serif TC',serif;flex-shrink:0}

/* house grid */
.hg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.hc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:5px;padding:5px 7px;cursor:pointer;transition:.18s}
.hc:hover{background:rgba(240,201,106,.06);border-color:rgba(240,201,106,.22)}
.hc-n{font-size:.46rem;color:rgba(255,255,255,.25);letter-spacing:.05em}
.hc-s{font-size:.72rem;color:var(--gold);margin-top:1px}
.hc-p{font-size:.6rem;color:var(--blue-l);margin-top:2px;letter-spacing:0.1em}

/* analysis */
.al{font-size:.61rem;color:rgba(255,255,255,.62);padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);line-height:1.7}
.al:last-child{border-bottom:none}
.at{display:inline-block;font-size:.48rem;padding:1px 5px;border-radius:3px;
  background:rgba(99,163,237,.14);color:var(--blue-l);margin-right:4px}
.av{color:var(--gold);font-family:'Noto Serif TC',serif}

/* ── BOTTOM LEGEND ── */
#legend{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:20;pointer-events:none;
  background:rgba(3,2,10,.8);backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.08);border-radius:30px;
  padding:6px 22px;display:flex;gap:18px;align-items:center
}
.li{display:flex;align-items:center;gap:5px;font-size:.56rem;color:rgba(255,255,255,.42)}
.ld{width:7px;height:7px;border-radius:50%}

/* ── CTRL BAR ── */
#ctrl-bar{
  position:absolute;bottom:16px;right:14px;z-index:20;
  display:flex;flex-direction:column;gap:6px;pointer-events:auto
}
.cb{width:37px;height:37px;border-radius:50%;
  background:rgba(99,163,237,.07);border:1px solid rgba(99,163,237,.25);
  color:rgba(144,196,255,.78);font-size:.88rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.22s;position:relative}
.cb:hover{background:rgba(99,163,237,.18);box-shadow:0 0 14px rgba(99,163,237,.28)}
.cb.on{background:rgba(99,163,237,.2);border-color:var(--blue-l);box-shadow:0 0 16px rgba(99,163,237,.4)}
.cb[title]:hover::after{
  content:attr(title);position:absolute;right:44px;top:50%;transform:translateY(-50%);
  white-space:nowrap;background:rgba(3,2,10,.94);border:1px solid rgba(99,163,237,.28);
  color:var(--blue-l);font-size:.56rem;padding:4px 9px;border-radius:4px;
  font-family:'Noto Sans TC',sans-serif;pointer-events:none
}

/* ── TIME BAR ── */
#time-bar{
  position:absolute;bottom:62px;left:50%;transform:translateX(-50%);
  z-index:20;pointer-events:auto;
  background:rgba(3,2,10,.84);backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.09);border-radius:30px;
  padding:7px 20px;display:none;gap:12px;align-items:center;min-width:340px
}
#time-bar.show{display:flex}
#time-lbl{font-size:.6rem;color:var(--gold);white-space:nowrap;min-width:106px;text-align:center}
#time-range{flex:1;accent-color:var(--blue)}
.tbtn{background:none;border:1px solid rgba(99,163,237,.3);color:var(--blue-l);
  font-size:.66rem;padding:3px 10px;border-radius:14px;cursor:pointer;transition:.18s;white-space:nowrap}
.tbtn:hover{background:rgba(99,163,237,.14)}

/* ── TOOLTIP ── */
#tip{
  position:absolute;z-index:50;pointer-events:none;
  background:rgba(5,3,16,.94);border:1px solid rgba(240,201,106,.25);
  border-radius:8px;padding:11px 15px;display:none;max-width:200px;
  box-shadow:0 8px 32px rgba(0,0,0,.7)
}
#tip h4{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;color:var(--gold);margin-bottom:5px}
#tip p{font-size:.63rem;color:rgba(255,255,255,.63);line-height:1.72}

/* ── MODAL ── */
#mw{position:absolute;inset:0;z-index:60;
  background:rgba(0,0,0,.74);backdrop-filter:blur(7px);
  display:flex;align-items:center;justify-content:center;transition:opacity .6s}
#modal{
  background:rgba(5,3,18,.97);border:1px solid rgba(99,163,237,.3);
  border-radius:14px;padding:38px 34px;width:92%;max-width:406px;
  box-shadow:0 48px 96px rgba(0,0,0,.92),0 0 80px rgba(99,163,237,.1),
             inset 0 0 30px rgba(99,163,237,.03)
}
.ml{font-family:'Ma Shan Zheng',cursive;font-size:2.2rem;color:var(--blue-l);
  text-align:center;text-shadow:0 0 36px rgba(99,163,237,.55);letter-spacing:.14em}
.ms{font-size:.58rem;color:rgba(255,255,255,.32);text-align:center;
  letter-spacing:.2em;margin:4px 0 26px}
.fl{font-size:.5rem;color:var(--blue);letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:5px;margin-top:12px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
input[type=text],input[type=number]{
  width:100%;padding:11px 13px;background:rgba(0,0,0,.56);
  border:1px solid rgba(99,163,237,.2);color:#fff;border-radius:6px;
  font-family:'Noto Sans TC',sans-serif;font-size:.88rem;outline:none;transition:.25s
}
input:focus{border-color:var(--blue-l);background:rgba(99,163,237,.09);box-shadow:0 0 14px rgba(99,163,237,.2)}
input::placeholder{color:rgba(255,255,255,.17)}
#st-hint{font-size:.58rem;color:var(--gold);margin-top:6px;padding:7px 11px;
  background:rgba(212,168,67,.07);border-left:2px solid var(--gold-d);display:none;border-radius:0 4px 4px 0}
.sbtn{width:100%;padding:15px;margin-top:16px;
  background:rgba(99,163,237,.1);border:1px solid var(--blue);
  color:var(--blue-l);border-radius:6px;
  font-family:'Noto Sans TC',sans-serif;font-size:.9rem;letter-spacing:.42em;cursor:pointer;transition:.3s}
.sbtn:hover{background:var(--blue);color:#000;box-shadow:0 0 32px rgba(99,163,237,.55)}
.demo{text-align:center;margin-top:11px;font-size:.56rem;color:rgba(255,255,255,.28);cursor:pointer;transition:.18s}
.demo:hover{color:var(--blue-l)}

/* CSS2D Labels */
.lbl{pointer-events:none;font-family:'Noto Sans TC',sans-serif}
.lecl{color:#FFD700;font-size:.72rem;font-weight:600;text-shadow:0 0 14px #D4A843,0 0 5px #000}
.leq{color:#90C4FF;font-size:.72rem;font-weight:500;text-shadow:0 0 12px #63A3ED,0 0 5px #000}
.lman{color:rgba(180,255,200,.88);font-size:.61rem;text-shadow:0 0 8px rgba(125,224,154,.5),0 0 3px #000; letter-spacing:0.05em;}
.lzod{color:#F0C96A;font-size:.86rem;font-weight:700;text-shadow:0 0 16px #D4A843,0 0 5px #000}
.lpl{display:flex;flex-direction:column;align-items:center;gap:1px}
.lpl-ic{font-family:'Ma Shan Zheng',cursive;font-size:1.52rem;text-shadow:0 0 16px currentColor}
.lpl-nm{font-size:.5rem;opacity:.88;text-shadow:0 0 8px currentColor}
.lax{color:rgba(255,255,255,.42);font-size:.57rem;letter-spacing:.12em;text-shadow:0 0 5px #000}

/* 專屬高亮 ASC / DSC */
.lasc{color:var(--red);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--red),0 0 5px #000; letter-spacing:0.1em;}
.ldsc{color:var(--blue-l);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--blue-l),0 0 5px #000; letter-spacing:0.1em;}
</style>

<body>

<!-- MODAL -->
<div id="mw">
<div id="modal">
  <div class="ml">星象座標系</div>
  <div class="ms">立體天球儀 · ASTROLABE · 二十八宿</div>
  <div class="fl">命主姓名</div>
  <input type="text" id="f-nm" placeholder="姓名（可留空）">
  <div class="fl">出生日期（公曆）</div>
  <div class="r3">
    <input type="number" id="f-y" placeholder="年" min="1900" max="2100" oninput="hst()">
    <input type="number" id="f-m" placeholder="月" min="1" max="12" oninput="hst()">
    <input type="number" id="f-d" placeholder="日" min="1" max="31" oninput="hst()">
  </div>
  <div class="fl">出生時間（24小時）</div>
  <div class="r2">
    <input type="number" id="f-h" placeholder="時 0–23" min="0" max="23" oninput="hst()">
    <input type="number" id="f-mi" placeholder="分 0–59" min="0" max="59" oninput="hst()">
  </div>
  <div class="fl">出生地經緯度與時區</div>
  <div class="r3">
    <input type="number" id="f-lg" placeholder="東經(116.4)" step="0.1" value="120" oninput="hst()">
    <input type="number" id="f-lat" placeholder="北緯(39.9)" step="0.1" value="30" oninput="hst()">
    <input type="number" id="f-tz" placeholder="時區(+8)" step="1" value="8" oninput="hst()">
  </div>
  <div id="st-hint"></div>
  <button class="sbtn" onclick="submitForm()">觀 測 星 象 能 量</button>
  <div class="demo" onclick="loadDemo()">→ 載入演示資料（J2000 · 2000年元旦正午）</div>
</div>
</div>

<!-- CANVAS -->
<div id="three-canvas"></div>

<!-- TOPBAR -->
<div id="topbar">
  <div>
    <div id="tb-title">星象座標系 · 天球儀</div>
    <div id="tb-sub">CELESTIAL SPHERE · 二十八宿 · 黃道十二宮</div>
  </div>
  <div class="tb-right" id="tb-info" style="display:none">
    <div id="tb-name"></div>
    <div id="tb-date"></div>
    <div id="tb-place"></div>
  </div>
</div>

<!-- LEFT PANEL -->
<div class="side-panel" id="lp" style="display:none">
  <div class="pc">
    <div class="pc-t">星象 · 黃道度數</div>
    <div id="plist"></div>
  </div>
  <div class="pc">
    <div class="pc-t">命盤分析摘要</div>
    <div id="abody"></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="side-panel" id="rp" style="display:none">
  <div class="pc">
    <div class="pc-t">黃道十二宮 · 宮位星曜</div>
    <div class="hg" id="hgrid"></div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="li"><div class="ld" style="background:#FFD700"></div>黃道星座</div>
  <div class="li"><div class="ld" style="background:#63A3ED"></div>赤道</div>
  <div class="li"><div class="ld" style="background:#7DE09A"></div>二十八宿</div>
  <div class="li"><div class="ld" style="background:#FF6B6B"></div>ASC/十二宮</div>
  <div class="li"><div class="ld" style="background:#FF5500"></div>七政四余</div>
</div>

<!-- CTRL BAR -->
<div id="ctrl-bar">
  <button class="cb" id="cb-spin" title="自動旋轉">⟳</button>
  <button class="cb" id="cb-sys" title="切換回歸/恆星黃道" style="font-size:0.75rem;">歸</button>
  <button class="cb on" id="cb-ecl" title="黃道環" style="color:#FFD700">◉</button>
  <button class="cb on" id="cb-eq"  title="赤道環">⊕</button>
  <button class="cb on" id="cb-man" title="二十八宿">宿</button>
  <button class="cb on" id="cb-pl"  title="七政四余">政</button>

  <button class="cb"    id="cb-tm"  title="時間推移">⏱</button>
  <button class="cb"    id="cb-tr"  title="行星軌跡">〜</button>
</div>

<!-- TIME BAR -->
<div id="time-bar">
  <button class="tbtn" id="tb-play">▶ 播放</button>
  <input type="range" id="time-range" min="-3650" max="3650" value="0" step="1">
  <div id="time-lbl">當前時間</div>
  <button class="tbtn" onclick="resetTime()">重置</button>
</div>

<!-- TOOLTIP -->
<div id="tip"><h4 id="tip-h"></h4><p id="tip-p"></p></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ══════════════════════════
//  ASTRONOMY ENGINE
// ══════════════════════════
const DEG=Math.PI/180, R2D=180/Math.PI;
const norm=d=>((d%360)+360)%360;

function jdn(y,m,d,h=12,mn=0){
  if(m<=2){y--;m+=12}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5+(h+mn/60)/24;
}
function T_jd(jd){return(jd-2451545.0)/36525}

// 太阳/月亮/五星/四余计算 (基于 J2000 历元)
function sunLon(T){
  const L0=norm(280.46646+36000.76983*T+0.0003032*T*T);
  const M=norm(357.52911+35999.05029*T-0.0001537*T*T);
  const C=(1.914602-0.004817*T)*Math.sin(M*DEG)+(0.019993)*Math.sin(2*M*DEG);
  const omega=norm(125.04-1934.136*T);
  return norm(L0+C-0.00569-0.00478*Math.sin(omega*DEG));
}
function moonLon(T){
  const D=norm(297.85036+445267.11148*T), M=norm(357.52772+35999.05034*T);
  const Mp=norm(134.96298+477198.867398*T), F=norm(93.27191+483202.017538*T);
  return norm(218.3165+481267.8813*T + 6.288774*Math.sin(Mp*DEG) + 1.274027*Math.sin((2*D-Mp)*DEG) + 0.658314*Math.sin(2*D*DEG));
}
const PE={
  mercury:{L:252.2509,dL:149472.6746,e:0.2056,w:77.457},
  venus:  {L:181.9798,dL:58517.8156, e:0.0067,w:131.56},
  mars:   {L:355.4332,dL:19140.2993, e:0.0934,w:336.04},
  jupiter:{L:34.3515, dL:3034.9056,  e:0.0483,w:14.72},
  saturn: {L:50.0774, dL:1222.1137,  e:0.0541,w:92.86},
};
function planetLon(id,T){
  const p=PE[id]; if(!p)return 0;
  const L=norm(p.L+p.dL*T/36525), Mr=(norm(L-p.w))*DEG;
  const v=Mr+(2*p.e)*Math.sin(Mr); return norm(p.w+v*R2D);
}
function rahuLon(T) {return norm(125.04452-1934.136261*T)}
function ketuLon(T) {return norm(rahuLon(T)+180)}
function yapLon(T)  {return norm(83.3532+4069.0137*T)}
function ziqiLon(T) {return norm(yapLon(T)+90)}

// 核心修复：计算 Ascendant (上升点)
function calcASC(jd, lng, lat) {
  const T = (jd - 2451545.0) / 36525.0;
  const gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T;
  const lst = norm(gmst + lng) * DEG;
  const e = (23.4392911 - 0.0130042 * T) * DEG; // 黄赤交角
  const lat_rad = lat * DEG;
  const asc_rad = Math.atan2(Math.cos(lst), -(Math.sin(lst)*Math.cos(e) + Math.tan(lat_rad)*Math.sin(e)));
  return norm(asc_rad * R2D);
}

function calcAll(T, jd, lng, lat, isSid){
  const asc = calcASC(jd, lng, lat);
  let res = {
    sun:sunLon(T),moon:moonLon(T),
    mercury:planetLon('mercury',T),venus:planetLon('venus',T),
    mars:planetLon('mars',T),jupiter:planetLon('jupiter',T),saturn:planetLon('saturn',T),
    rahu:rahuLon(T),ketu:ketuLon(T),yapo:yapLon(T),ziqi:ziqiLon(T),
    asc: asc, dsc: norm(asc + 180)
  };
  
  // 恒星黄道(Sidereal) 岁差计算 (Ayanamsa)
  if(isSid) {
    const aya = 24.03 + (jd - 2451545.0)/365.25 * (50.29/3600); // 采用Lahiri相近值
    for(let k in res) res[k] = norm(res[k] - aya);
  }
  return res;
}

// 真太陽時计算辅助
function stCorr(lng,std=120){return Math.round((lng-std)*4)}
function applyST(h,mn,c){let m=mn+c;while(m>=60){h++;m-=60}while(m<0){h--;m+=60}return{h:((h%24)+24)%24,m:((m%60)+60)%60}}

// 宮位/宿 (全称专业名词 + 经典宽度校准)
const ZCN=['白羊','金牛','雙子','巨蟹','獅子','處女','天秤','天蠍','射手','摩羯','水瓶','雙魚'];
const ZSYM=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
function zodiac(lon){return{s:ZCN[Math.floor(lon/30)],sym:ZSYM[Math.floor(lon/30)],d:(lon%30).toFixed(1)}}

const MANS_NAMES = [
  "角木蛟","亢金龍","氐土貉","房日兔","心月狐","尾火虎","箕水豹",
  "斗木獬","牛金牛","女土蝠","虛日鼠","危月燕","室火豬","壁水貐",
  "奎木狼","婁金狗","胃土雉","昴日雞","畢月烏","觜火猴","參水猿",
  "井木犴","鬼金羊","柳土獐","星日馬","張月鹿","翼火蛇","軫水蚓"
];
// 古法 365 度的绝对宽度
const klass_w = [12, 9, 15, 5, 5, 18, 11, 26, 8, 12, 10, 17, 16, 9, 16, 12, 14, 11, 16, 2, 9, 33, 4, 15, 7, 18, 18, 17];
const MANS = [];
let _acc = 0;
for(let i=0; i<28; i++){
  let w = klass_w[i] * 360 / 365; // 等比例缩放到 360 度圆周
  MANS.push({ n: MANS_NAMES[i], short: MANS_NAMES[i].charAt(0), s: _acc, w: w });
  _acc += w;
}

function getMansion(lon){
  for(const m of MANS){
    if(lon >= m.s && lon < m.s + m.w) return m.short;
  }
  return MANS[0].short;
}

function analyzeChart(lons){
  const lines=[];
  const sz=zodiac(lons.sun), mz=zodiac(lons.moon), az=zodiac(lons.asc);
  const mm=getMansion(lons.moon);
  const elong=norm(lons.moon-lons.sun);
  const phase=elong<45?'新月(朔)':elong<135?'上弦月':elong<225?'滿月(望)':elong<315?'下弦月':'晦日期';
  lines.push(`<span class="at">上升</span>命宮在<span class="av">${az.s}座 ${az.d}°</span>`);
  lines.push(`<span class="at">日主</span>太陽在<span class="av">${sz.s}座 ${sz.d}°</span>`);
  lines.push(`<span class="at">月情</span>月在<span class="av">${mz.s}·${mm}宿</span>`);
  lines.push(`<span class="at">月相</span><span class="av">${phase}</span> 距角${elong.toFixed(0)}°`);
  lines.push(`<span class="at">羅睺</span>北交點在<span class="av">${zodiac(lons.rahu).s}</span>`);
  lines.push(`<span class="at">木星</span>福星在<span class="av">${zodiac(lons.jupiter).s}</span>`);
  lines.push(`<span class="at">土星</span>剋星在<span class="av">${zodiac(lons.saturn).s}</span>`);
  return lines;
}

function placePlanets(lons){
  const R=32;
  PCONF.forEach(pc=>{
    const lon=lons[pc.id];if(lon===undefined)return;
    const a=lon*DEG, x=Math.cos(a)*R, y=Math.sin(a)*R;
    if(pMesh[pc.id])pMesh[pc.id].position.set(x,y,0);
    if(pLbl[pc.id])pLbl[pc.id].position.set(x,y,0);
    if(showTrails&&trails[pc.id]){
      const t=trails[pc.id];const i=t.ptr*3;
      t.buf[i]=x;t.buf[i+1]=y;t.buf[i+2]=0;
      t.ptr=(t.ptr+1)%TRAIL_N;
      if(!t.ptr)t.full=true;
      t.geo.attributes.position.needsUpdate=true;
      t.geo.setDrawRange(0,t.full?TRAIL_N:t.ptr);
    }
  });
  if(showAsp)buildAspects(lons);else aspG.clear();

  // 渲染 ASC/DSC 和 12 宫位分割线
  while(houseG.children.length > 0){
    const c = houseG.children[0];
    if(c.isCSS2DObject && c.element) c.element.remove();
    houseG.remove(c);
  }
  
  const asc = lons.asc;
  for(let i=0; i<12; i++){
    const a = norm(asc + i*30) * DEG;
    const isAngle = (i===0 || i===6);
    // 高亮 ASC(红色) 和 DSC(蓝色)，其他宫位白色透明
    const col = i===0 ? 0xFF4444 : (i===6 ? 0x4488FF : 0xFFFFFF);
    const op = isAngle ? 0.8 : 0.15;
    const R_in = 20, R_out = isAngle ? 38 : 31;
    
    houseG.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(Math.cos(a)*R_in, Math.sin(a)*R_in, 0),
        new THREE.Vector3(Math.cos(a)*R_out, Math.sin(a)*R_out, 0)
      ]),
      new THREE.LineBasicMaterial({color: col, transparent: true, opacity: op, linewidth: isAngle? 2 : 1})
    ));
    
    if(i===0) lbl2D(houseG, 'ASC', 'lasc', R_out+2, a);
    else if(i===6) lbl2D(houseG, 'DSC', 'ldsc', R_out+2, a);
    else lbl2D(houseG, (i+1)+'宮', 'lax', R_out+1.5, a);
  }
}

const ASP_A=[0,60,90,120,150,180];
const ASP_C=[0xFFFF00,0x44FF88,0xFF4444,0x44AAFF,0xFF8844,0xFF4444];
const ASP_IDS=['sun','moon','mercury','venus','mars','jupiter','saturn'];
function buildAspects(lons){
  aspG.clear();const R=32;
  for(let i=0;i<ASP_IDS.length;i++)for(let j=i+1;j<ASP_IDS.length;j++){
    const diff=Math.min(norm(lons[ASP_IDS[i]]-lons[ASP_IDS[j]]),
                        norm(lons[ASP_IDS[j]]-lons[ASP_IDS[i]]));
    for(let k=0;k<ASP_A.length;k++){
      if(Math.abs(diff-ASP_A[k])<8){
        const a1=lons[ASP_IDS[i]]*DEG,a2=lons[ASP_IDS[j]]*DEG;
        aspG.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(Math.cos(a1)*R,Math.sin(a1)*R,0),
            new THREE.Vector3(Math.cos(a2)*R,Math.sin(a2)*R,0)]),
          new THREE.LineBasicMaterial({color:ASP_C[k],transparent:true,opacity:.2})));
        break;
      }
    }
  }
}

  const lat=parseFloat(document.getElementById('f-lat').value)||39.9; // 默认北纬
  const tz=parseInt(document.getElementById('f-tz').value)||8; // 获取时区
  
  if(!y||!m||!d){alert('請輸入完整的年月日！');return}
  
  const st=applyST(h,mn,stCorr(lng, tz*15));
  // 核心修复：直接减去时区偏差，推算精准的 UTC 儒略日，解决上升点错位问题
  const jd_utc=jdn(y,m,d,h - tz,mn); 
  
  userData={name,y,m,d,h:st.h,mn:st.m,lng,lat,jd:jd_utc};
  launch();
};

window.loadDemo=function(){
  ['f-nm','f-y','f-m','f-d','f-h','f-mi','f-lg','f-lat','f-tz'].forEach((id,i)=>{
    document.getElementById(id).value=['演示','2000','1','1','12','0','120','30','8'][i];
  });
  window.submitForm();
};

function updatePositions() {
  if(!userData.jd) return;
  const off = parseInt(document.getElementById('time-range').value) || 0;
  const targetJD = userData.jd + off;
  const T = T_jd(targetJD);
  
  curLons = calcAll(T, targetJD, userData.lng, userData.lat, isSidereal);
  placePlanets(curLons);
  
  // 岁差旋转二十八宿
  const aya = 24.03 + (targetJD - 2451545.0)/365.25 * (50.29/3600);
  manG.rotation.z = isSidereal ? 0 : aya * DEG;

  renderPlanetList(curLons);
  renderHouseGrid(curLons);
  renderAnalysis(curLons);
  
  document.getElementById('tb-place').textContent=`東經 ${userData.lng.toFixed(1)}° · 北緯 ${userData.lat.toFixed(1)}° · ${isSidereal?'恆星黃道 (Sidereal)':'回歸黃道 (Tropical)'}`;
}

function launch(){
  updatePositions();
  document.getElementById('tb-name').textContent=userData.name+' 命主';
  document.getElementById('tb-date').textContent=`${userData.y}.${String(userData.m).padStart(2,'0')}.${String(userData.d).padStart(2,'0')} ${String(userData.h).padStart(2,'0')}:${String(userData.mn).padStart(2,'0')}`;
  document.getElementById('tb-info').style.display='block';
  document.getElementById('lp').style.display='flex';
  document.getElementById('rp').style.display='flex';
  const mw=document.getElementById('mw');
  if(mw.style.display !== 'none') {
    mw.style.transition='opacity .7s';mw.style.opacity='0';
    setTimeout(()=>mw.style.display='none',700);
    OCtrl.autoRotate=true;setTimeout(()=>OCtrl.autoRotate=false,5500);
  }
}

// ══════════════════════════
//  TIME SCRUBBER
// ══════════════════════════
const tRange=document.getElementById('time-range');
const tLbl=document.getElementById('time-lbl');

tRange.addEventListener('input',()=>{
  if(!userData.jd)return;
  updatePositions();
  const off=parseInt(tRange.value);
  const bd=new Date(Date.UTC(userData.y,userData.m-1,userData.d));
  bd.setUTCDate(bd.getUTCDate()+off);
  tLbl.textContent=`${bd.getUTCFullYear()}.${String(bd.getUTCMonth()+1).padStart(2,'0')}.${String(bd.getUTCDate()).padStart(2,'0')}`;
});

const tbPlay=document.getElementById('tb-play');
tbPlay.addEventListener('click',function(){
  if(playingTime){clearInterval(playInterval);playingTime=false;this.textContent='▶ 播放';return}
  playingTime=true;this.textContent='⏸ 暫停';
  playInterval=setInterval(()=>{
    const v=Math.min(parseInt(tRange.value)+3,3650);
    tRange.value=v;tRange.dispatchEvent(new Event('input'));
    if(v>=3650){clearInterval(playInterval);playingTime=false;tbPlay.textContent='▶ 播放'}
  },55);
});

window.resetTime=function(){
  clearInterval(playInterval);playingTime=false;tbPlay.textContent='▶ 播放';
  tRange.value=0;tRange.dispatchEvent(new Event('input'));tLbl.textContent='當前時間';
};

// ══════════════════════════
//  CONTROLS
// ══════════════════════════
function tog(id,on,off,init){
  let s=init??true;const b=document.getElementById(id);
  b.classList.toggle('on',s);
  b.addEventListener('click',()=>{s=!s;b.classList.toggle('on',s);s?on():off()});
}
tog('cb-spin',()=>OCtrl.autoRotate=true, ()=>OCtrl.autoRotate=false,false);
tog('cb-ecl', ()=>eclG.visible=true,     ()=>eclG.visible=false);
tog('cb-eq',  ()=>eqG.visible=true,      ()=>eqG.visible=false);
tog('cb-man', ()=>manG.visible=true,     ()=>manG.visible=false);
tog('cb-pl',  ()=>plG.visible=true,      ()=>plG.visible=false);
tog('cb-asp', ()=>{showAsp=true;buildAspects(curLons)}, ()=>{showAsp=false;aspG.clear()},false);
tog('cb-tm',  ()=>document.getElementById('time-bar').classList.add('show'),
               ()=>{document.getElementById('time-bar').classList.remove('show');resetTime()},false);
tog('cb-tr',  ()=>{showTrails=true;Object.values(trails).forEach(t=>t.line.visible=true)},
               ()=>{showTrails=false;Object.values(trails).forEach(t=>{
                 t.line.visible=false;t.ptr=0;t.full=false;t.buf.fill(0);
                 t.geo.attributes.position.needsUpdate=true;t.geo.setDrawRange(0,0)})},false);

// 归/恒 切换
const bSys = document.getElementById('cb-sys');
tog('cb-sys', 
    () => { isSidereal=true; bSys.textContent='恆'; bSys.classList.add('on'); if(userData.jd) updatePositions(); }, 
    () => { isSidereal=false; bSys.textContent='歸'; bSys.classList.remove('on'); if(userData.jd) updatePositions(); }, 
    false
);

// ══════════════════════════
//  METEORS
// ══════════════════════════
const meteors=[];
function spawnMeteor(){
  if(meteors.length>5)return;
  const th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI*.55;
  const r=88+Math.random()*35;
  const pos=new THREE.Vector3(Math.sin(ph)*Math.cos(th)*r,Math.cos(ph)*r,Math.sin(ph)*Math.sin(th)*r);
  const dir=pos.clone().normalize().negate().multiplyScalar(.38+Math.random()*.28);
  const len=9+Math.random()*14;
  const pts=[pos.clone(),pos.clone().add(dir.clone().multiplyScalar(len))];
  const line=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xFFFFFF,transparent:true,opacity:.88}));
  scene.add(line);
  meteors.push({line,vel:dir,life:0,maxLife:1.4+Math.random()});
}
setInterval(spawnMeteor,2400);

// ══════════════════════════
//  ANIMATION
// ══════════════════════════
const clock=new THREE.Clock();let fc=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();fc++;
  OCtrl.update();
  earthG.rotation.y+=dt*.12;
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];m.life+=dt;
    m.line.material.opacity=Math.max(0,(1-m.life/m.maxLife)*.9);
    const p=m.line.geometry.attributes.position;
    for(let k=0;k<2;k++){p.array[k*3]+=m.vel.x;p.array[k*3+1]+=m.vel.y;p.array[k*3+2]+=m.vel.z}
    p.needsUpdate=true;
    if(m.life>m.maxLife){scene.remove(m.line);m.line.geometry.dispose();meteors.splice(i,1)}
  }
  composer.render(dt);
  lblR.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  bloom.setSize(innerWidth,innerHeight);
  lblR.setSize(innerWidth,innerHeight);
});
