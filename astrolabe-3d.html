<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星象座標系 · 3D高精物理地心儀</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#F0C96A;--gold-d:#D4A843;--blue:#63A3ED;--blue-l:#90C4FF;--bg:#020204;--red:#FF6B6B;--green:#7DE09A;--cream:#F0EAD6;}
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Noto Sans TC',sans-serif;user-select:none;-webkit-user-select:none}
#three-canvas{position:absolute;inset:0;z-index:1}

/* UI 層級管理 */
#topbar{position:absolute;top:0;left:0;right:0;z-index:30;pointer-events:none;padding:14px 22px 36px;background:linear-gradient(to bottom,rgba(2,2,4,.95),transparent);display:flex;align-items:flex-start;gap:20px}
#tb-title{font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:var(--gold);text-shadow:0 0 28px rgba(240,201,106,.55);letter-spacing:.18em}
#tb-sub{font-size:.53rem;color:rgba(255,255,255,.32);letter-spacing:.28em;margin-top:3px}
.top-left-panel{position:absolute;top:30px;left:30px;pointer-events:auto;z-index:40}
.btn-back{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:rgba(99,163,237,.08);border:1px solid rgba(99,163,237,.4);color:var(--blue);text-decoration:none;font-size:1.2rem;transition:all .3s}

/* 語言切換：固定右上角 */
#global-lang-toggle{position:absolute;top:20px;right:20px;z-index:100;display:flex;gap:8px}
.mlbtn{background:rgba(99,163,237,.1);border:1px solid rgba(99,163,237,.3);font-size:.65rem;color:rgba(255,255,255,.6);cursor:pointer;padding:6px 12px;border-radius:6px;transition:.3s}
.mlbtn.active{color:var(--gold);border-color:var(--gold);background:rgba(240,201,106,.15)}

/* 側邊欄 */
.side-panel{position:absolute;top:80px;z-index:20;width:220px;display:flex;flex-direction:column;gap:8px}
#lp{left:14px} #rp{right:14px}
.pc{background:rgba(2,2,4,.92);border:1px solid rgba(99,163,237,.16);border-radius:10px;padding:13px 15px}

/* 手機底部抽屜 */
#mobile-drawer{position:fixed;bottom:0;left:0;right:0;z-index:25;background:rgba(2,2,4,.98);border-top:1px solid rgba(99,163,237,.22);border-radius:18px 18px 0 0;transform:translateY(calc(100% - 48px));transition:transform .38s cubic-bezier(.4,0,.2,1);max-height:72vh;display:none;flex-direction:column}
#mobile-drawer.open{transform:translateY(0)}
#mobile-drawer-handle{display:flex;align-items:center;justify-content:center;height:48px;cursor:pointer}
.pill{width:38px;height:4px;border-radius:2px;background:rgba(99,163,237,.4)}

/* 控制列與時間軸：抬高位置避免被抽屜遮擋 */
#ctrl-bar{position:absolute;bottom:20px;right:14px;z-index:45;display:flex;flex-direction:column;gap:6px}
#time-bar{position:absolute;bottom:65px;left:50%;transform:translateX(-50%);z-index:45;background:rgba(2,2,4,.9);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:8px 20px;display:none;gap:12px;align-items:center;min-width:360px}
#legend{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(2,2,4,.8);border-radius:30px;padding:6px 20px;display:flex;gap:15px}

@media(max-width:768px){
  .side-panel{display:none}
  #topbar{padding-left:60px}
  #global-lang-toggle{top:15px;right:15px}
  #ctrl-bar{bottom:60px} /* 抬高以躲避抽屜把手 */
  #time-bar{bottom:110px;min-width:300px;width:92%}
  #legend{top:80px;bottom:auto;flex-wrap:wrap;justify-content:center;width:90%}
}

#loading-overlay{position:fixed;inset:0;z-index:500;background:#020204;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px}
.loading-spinner{width:50px;height:50px;border:3px solid rgba(99,163,237,.2);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text-el" style="color:var(--blue);letter-spacing:2px">正在加載高清星象引擎...</div>
</div>

<div class="top-left-panel"><a href="/" class="btn-back">⟨</a></div>

<div id="global-lang-toggle">
  <button class="mlbtn active" onclick="window.switchLang('zh-TW')">繁</button>
  <button class="mlbtn" onclick="window.switchLang('zh-CN')">简</button>
  <button class="mlbtn" onclick="window.switchLang('en')">EN</button>
</div>

<div id="three-canvas"></div>

<div id="topbar">
  <div>
    <div id="tb-title">星象座標系 · 高清地心儀</div>
    <div id="tb-sub">GEOCENTRIC ASTROLABE · 物理光影宇宙</div>
  </div>
  <div class="tb-right" style="margin-left:auto; text-align:right">
    <div id="tb-info" style="display:none">
      <div id="tb-name" style="font-family:'Ma Shan Zheng'; font-size:1.2rem"></div>
      <div id="tb-date" style="font-size:0.7rem; opacity:0.6"></div>
    </div>
  </div>
</div>

<div id="ctrl-bar">
  <button class="cb" id="cb-zen" data-tt="沉浸模式">🌌</button>
  <button class="cb" id="cb-tm" data-tt="推運控制">⏱</button>
  <button class="cb on" id="cb-pl" data-tt="行星顯示">政</button>
</div>

<div id="time-bar">
  <button class="tbtn" id="tb-play">▶ 播放</button>
  <input type="range" id="time-range" min="-43800" max="43800" value="0" style="flex:1">
  <div id="time-lbl" style="font-size:0.7rem; color:var(--gold)">當前時間</div>
</div>

<div class="side-panel" id="lp" style="display:none">
  <div class="pc"><div class="pc-t" id="pct-ecl">星象度數</div><div id="plist"></div></div>
  <div class="pc"><div class="pc-t" id="pct-ana">命盤摘要</div><div id="abody"></div></div>
</div>

<div id="mobile-drawer" style="display:none">
  <div id="mobile-drawer-handle" onclick="window.toggleDrawer()">
    <div class="pill"></div>
  </div>
  <div id="mobile-drawer-content">
    <div class="pc"><div id="plist-m"></div></div>
  </div>
</div>

<div id="mw">
  <div id="modal">
    <div class="ml">星象座標系</div>
    <div class="ms">高清物理引擎 · 全星體貼圖</div>
    <div class="fl">出生日期</div>
    <div class="r3">
      <input type="number" id="f-y" placeholder="年" value="2002">
      <input type="number" id="f-m" placeholder="月" value="12">
      <input type="number" id="f-d" placeholder="日" value="24">
    </div>
    <div class="fl">經緯度</div>
    <div class="r2">
      <input type="number" id="f-lg" placeholder="經度" value="109">
      <input type="number" id="f-lat" placeholder="緯度" value="31">
    </div>
    <button class="sbtn" onclick="submitForm()">開啟星空觀測</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// 核心参数
const DEG = Math.PI / 180;
let userData = { jd: 0, lat: 31, lng: 109 };
const pMesh = {};

// 初始化场景
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 40, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById('three-canvas').appendChild(renderer.domElement);

const lblR = new CSS2DRenderer();
lblR.setSize(window.innerWidth, window.innerHeight);
lblR.domElement.style.position = 'absolute';
lblR.domElement.style.top = '0';
lblR.domElement.style.pointerEvents = 'none';
document.getElementById('three-canvas').appendChild(lblR.domElement);

// 光照控制 (解决“地球是黑的”问题)
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const mainLight = new THREE.PointLight(0xffffff, 1.5);
mainLight.position.set(50, 50, 50);
scene.add(mainLight);

// 资源加载 (解决“纯蓝色”问题)
const texLoader = new THREE.TextureLoader();
const textures = {};
const loadAsset = (name, url) => {
  return new Promise(res => {
    texLoader.load(url, tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      textures[name] = tex;
      res();
    }, undefined, () => res());
  });
};

// 地球与行星构建
let earth, birthMarker;
async function initUniverse() {
  await Promise.all([
    loadAsset('earth', 'https://unpkg.com/three@0.160.0/examples/textures/planets/earth_atmos_2048.jpg'),
    loadAsset('moon', 'https://unpkg.com/three@0.160.0/examples/textures/planets/moon_1024.jpg')
  ]);

  // 高清地球
  const earthGeo = new THREE.SphereGeometry(10, 64, 64);
  const earthMat = new THREE.MeshStandardMaterial({
    map: textures.earth || null,
    color: textures.earth ? 0xffffff : 0x2255ff,
    roughness: 0.5,
    metalness: 0.2
  });
  earth = new THREE.Mesh(earthGeo, earthMat);
  scene.add(earth);

  // 大气发光
  const atmoGeo = new THREE.SphereGeometry(10.5, 64, 64);
  const atmoMat = new THREE.MeshBasicMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.15,
    side: THREE.BackSide
  });
  scene.add(new THREE.Mesh(atmoGeo, atmoMat));

  // 定位红点 (解决“看不见”问题)
  const markerGeo = new THREE.SphereGeometry(0.3, 16, 16);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  birthMarker = new THREE.Mesh(markerGeo, markerMat);
  earth.add(birthMarker);

  document.getElementById('loading-overlay').style.display = 'none';
  animate();
}

// 坐标映射逻辑
function updateMarker(lat, lng) {
  if(!birthMarker) return;
  const phi = (90 - lat) * DEG;
  const theta = (lng + 90) * DEG;
  birthMarker.position.setFromSphericalCoords(10.2, phi, theta); // 半径10.2，确保浮在地球面
}

// 交互逻辑
const controls = new TrackballControls(camera, renderer.domElement);
controls.noPan = true;
controls.maxDistance = 400;

window.submitForm = () => {
  const y = document.getElementById('f-y').value;
  const m = document.getElementById('f-m').value;
  const d = document.getElementById('f-d').value;
  const lat = parseFloat(document.getElementById('f-lat').value);
  const lng = parseFloat(document.getElementById('f-lg').value);
  
  userData = { lat, lng, jd: 2451545 };
  updateMarker(lat, lng);
  
  document.getElementById('mw').style.display = 'none';
  document.getElementById('lp').style.display = 'block';
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  lblR.render(scene, camera);
}

// 启动
initUniverse();

// 语言切换简易实现
window.switchLang = (lang) => {
  const d = LANGS[lang];
  document.getElementById('tb-title').innerText = d.dom.tbTitle;
  // ... 其他 DOM 更新
  document.querySelectorAll('.mlbtn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
