<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZenCode · 3D 立體天球儀</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A843; --gold-b: #F0C96A; --blue: #63A3ED; --bg: #06050A;
  }
  body {
    margin: 0; overflow: hidden; background: var(--bg); color: #F0EAD6;
    font-family: 'Noto Sans TC', sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  #canvas-container {
    width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1;
  }
  
  /* ─── UI 覆蓋層 ─── */
  #ui-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
  }
  
  .top-left-panel {
    position: absolute; top: 30px; left: 30px; pointer-events: auto;
  }
  .btn-back {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(99, 163, 237, 0.08); border: 1px solid rgba(99, 163, 237, 0.3);
    color: var(--blue); text-decoration: none; font-size: 1.2rem;
    transition: all 0.3s; margin-bottom: 20px;
  }
  .btn-back:hover {
    background: rgba(99, 163, 237, 0.2); border-color: var(--blue); box-shadow: 0 0 15px rgba(99, 163, 237, 0.4);
  }
  
  .info-card {
    background: rgba(6, 5, 10, 0.6); backdrop-filter: blur(12px);
    border-left: 2px solid var(--blue); padding: 16px 20px;
    opacity: 0; transform: translateX(-20px); transition: all 0.8s ease;
  }
  .info-card.show {
    opacity: 1; transform: translateX(0);
  }
  .info-name {
    font-family: 'Ma Shan Zheng', cursive; font-size: 1.8rem; color: var(--gold);
    letter-spacing: 0.1em; margin-bottom: 4px;
  }
  .info-date {
    font-size: 0.75rem; color: rgba(240, 234, 214, 0.7); letter-spacing: 0.1em; font-family: 'Noto Serif TC', serif;
  }
  .info-geo { font-size: 0.65rem; color: rgba(99, 163, 237, 0.6); margin-top: 6px; letter-spacing: 0.05em; }

  /* ─── 數據輸入彈窗 (當沒有緩存時顯示) ─── */
  #data-modal {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(12, 11, 20, 0.85); backdrop-filter: blur(24px);
    border: 1px solid rgba(99, 163, 237, 0.3); padding: 40px; border-radius: 4px;
    width: 90%; max-width: 380px; box-shadow: 0 32px 64px rgba(0, 0, 0, 0.8), 0 0 40px rgba(99, 163, 237, 0.1);
    pointer-events: auto; display: none; /* 預設隱藏，由 JS 控制 */
    flex-direction: column; gap: 20px; z-index: 20;
    opacity: 0; transition: opacity 0.5s;
  }
  #data-modal.show { display: flex; opacity: 1; }
  .modal-title {
    font-family: 'Ma Shan Zheng', cursive; font-size: 2rem; color: var(--blue);
    text-align: center; margin-bottom: 10px; text-shadow: 0 0 20px rgba(99, 163, 237, 0.4);
  }
  .input-group { display: flex; gap: 10px; }
  .zc-input {
    width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(99, 163, 237, 0.2);
    color: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem; outline: none; border-radius: 2px;
  }
  .zc-input:focus { border-color: var(--blue); background: rgba(99, 163, 237, 0.05); }
  .zc-input::placeholder { color: rgba(255,255,255,0.2); }
  .zc-btn {
    width: 100%; padding: 14px; background: rgba(99, 163, 237, 0.1); border: 1px solid var(--blue);
    color: var(--blue); font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem; letter-spacing: 0.2em;
    cursor: pointer; transition: all 0.3s; margin-top: 10px;
  }
  .zc-btn:hover { background: var(--blue); color: #000; box-shadow: 0 0 20px rgba(99, 163, 237, 0.5); }
  .modal-hint { font-size: 0.6rem; color: rgba(255,255,255,0.3); text-align: center; line-height: 1.6; }
  .modal-hint a { color: var(--gold); text-decoration: none; }

</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
  <div class="top-left-panel">
    <a href="/" class="btn-back" title="返回主頁">⟨</a>
    <div class="info-card" id="user-info-card">
      <div class="info-name" id="ui-name">命主</div>
      <div class="info-date" id="ui-date">1994.05.15 08:30</div>
      <div class="info-geo" id="ui-geo">經度 120.2° · 緯度 30.2°</div>
    </div>
  </div>

  <div id="data-modal">
    <div class="modal-title">星象座標系</div>
    <div class="modal-hint">未檢測到緩存資料<br>請輸入公曆出生時間以生成立體天球儀</div>
    
    <input type="text" id="m-name" class="zc-input" placeholder="命主姓名">
    <div class="input-group">
      <input type="number" id="m-year" class="zc-input" placeholder="年 (YYYY)" min="1900">
      <input type="number" id="m-month" class="zc-input" placeholder="月" min="1" max="12">
      <input type="number" id="m-day" class="zc-input" placeholder="日" min="1" max="31">
    </div>
    <div class="input-group">
      <input type="number" id="m-hour" class="zc-input" placeholder="時 (0-23)" min="0" max="23">
      <input type="number" id="m-min" class="zc-input" placeholder="分" min="0" max="59">
    </div>
    
    <button class="zc-btn" id="btn-generate">生成立體星空</button>
    <div class="modal-hint">如需農曆換算或真太陽時精確校準<br>請 <a href="/">返回首頁進階排盤</a></div>
  </div>
</div>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ==========================================
  // 1. Three.js 視覺基建 (立刻執行，作為動態背景)
  // ==========================================
  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06050A); 
  scene.fog = new THREE.FogExp2(0x06050A, 0.015);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 30, 80); 

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; 
  controls.dampingFactor = 0.05;
  controls.minDistance = 20; 
  controls.maxDistance = 150;

  // 地球與中心光
  const earthGroup = new THREE.Group();
  scene.add(earthGroup);
  const earthGeo = new THREE.SphereGeometry(2, 32, 32);
  const earthMat = new THREE.MeshBasicMaterial({ color: 0x2A4B7C, wireframe: true, transparent: true, opacity: 0.6 });
  earthGroup.add(new THREE.Mesh(earthGeo, earthMat));
  earthGroup.add(new THREE.PointLight(0x63A3ED, 2, 50));

  // 赤道與黃道
  const equator = new THREE.Mesh(new THREE.TorusGeometry(30, 0.05, 16, 100), new THREE.MeshBasicMaterial({ color: 0x63A3ED, transparent: true, opacity: 0.3 }));
  equator.rotation.x = Math.PI / 2;
  scene.add(equator);

  const ecliptic = new THREE.Mesh(new THREE.TorusGeometry(30, 0.08, 16, 100), new THREE.MeshBasicMaterial({ color: 0xD4A843, transparent: true, opacity: 0.5 }));
  ecliptic.rotation.x = Math.PI / 2;
  ecliptic.rotation.y = THREE.MathUtils.degToRad(23.44);
  scene.add(ecliptic);

  // 二十八宿外環
  const mansions = [
    {n:"角",s:12},{n:"亢",s:9},{n:"氐",s:15},{n:"房",s:5},{n:"心",s:5},{n:"尾",s:18},{n:"箕",s:11},
    {n:"斗",s:26},{n:"牛",s:8},{n:"女",s:12},{n:"虛",s:10},{n:"危",s:17},{n:"室",s:16},{n:"壁",s:9},
    {n:"奎",s:16},{n:"婁",s:12},{n:"胃",s:14},{n:"昴",s:11},{n:"畢",s:16},{n:"觜",s:2},{n:"參",s:9},
    {n:"井",s:33},{n:"鬼",s:4},{n:"柳",s:15},{n:"星",s:7},{n:"張",s:18},{n:"翼",s:18},{n:"軫",s:17}
  ];
  const mansionGroup = new THREE.Group();
  let currentAngle = 0;
  mansions.forEach((m) => {
    const rad = THREE.MathUtils.degToRad(m.s);
    const ringGeo = new THREE.RingGeometry(35, 38, 16, 1, currentAngle, rad);
    const slice = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0x4a90e2, side: THREE.DoubleSide, transparent: true, opacity: 0.1, depthWrite: false }));
    slice.add(new THREE.LineSegments(new THREE.EdgesGeometry(ringGeo), new THREE.LineBasicMaterial({ color: 0x63A3ED, transparent: true, opacity: 0.3 })));
    mansionGroup.add(slice);
    currentAngle += rad;
  });
  mansionGroup.rotation.x = Math.PI / 2;
  scene.add(mansionGroup);

  // 背景星辰
  const starsGeo = new THREE.BufferGeometry();
  const posArray = new Float32Array(3000);
  for(let i = 0; i < 3000; i++) posArray[i] = (Math.random() - 0.5) * 200;
  starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ size: 0.5, color: 0xffffff, transparent: true, opacity: 0.8 })));

  // 動畫循環啟動
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    scene.rotation.y += 0.0005; // 緩慢自轉
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ==========================================
  // 2. 邏輯切換：讀取緩存 OR 顯示表單
  // ==========================================
  let astroData = null;
  const astroDataStr = sessionStorage.getItem('zc_astro_target');

  if (astroDataStr && JSON.parse(astroDataStr).year) {
    // 【情況 A】有緩存數據：直接注入
    astroData = JSON.parse(astroDataStr);
    injectDataToUI(astroData);
  } else {
    // 【情況 B】無緩存數據：顯示表單，等待用戶輸入
    const modal = document.getElementById('data-modal');
    modal.classList.add('show');
  }

  // 處理彈窗表單提交
  document.getElementById('btn-generate').addEventListener('click', () => {
    const y = parseInt(document.getElementById('m-year').value);
    const m = parseInt(document.getElementById('m-month').value);
    const d = parseInt(document.getElementById('m-day').value);
    const h = parseInt(document.getElementById('m-hour').value) || 12;
    const min = parseInt(document.getElementById('m-min').value) || 0;
    const name = document.getElementById('m-name').value.trim() || '命主';

    if(!y || !m || !d) {
      alert("請輸入完整的年月日"); return;
    }

    // 構建基本數據 (此處經緯度採用預設值，若需精確請引導回首頁)
    astroData = {
      name: name, year: y, month: m, day: d, hour: h, minute: min,
      lng: 120.2, lat: 30.2, tzOffset: 8
    };

    // 存入緩存 (防止刷新丟失)
    sessionStorage.setItem('zc_astro_target', JSON.stringify(astroData));

    // 隱藏表單，顯示 UI
    document.getElementById('data-modal').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('data-modal').classList.remove('show');
      injectDataToUI(astroData);
    }, 500);
  });

  // ==========================================
  // 3. 數據注入與後續擴展
  // ==========================================
  function injectDataToUI(data) {
    document.getElementById('ui-name').textContent = data.name;
    document.getElementById('ui-date').textContent = `${data.year}.${String(data.month).padStart(2,'0')}.${String(data.day).padStart(2,'0')} ${String(data.hour).padStart(2,'0')}:${String(data.minute).padStart(2,'0')}`;
    document.getElementById('ui-geo').textContent = `經度 ${data.lng.toFixed(2)}° · 緯度 ${data.lat.toFixed(2)}°`;
    
    const card = document.getElementById('user-info-card');
    card.style.display = 'block';
    setTimeout(() => card.classList.add('show'), 50);

    // TODO: 這裡就是未來計算星體座標，並在 3D 場景中 add(Planet) 的地方！
    console.log("Ready to calculate planets for:", data);
  }

</script>
</body>
</html>
