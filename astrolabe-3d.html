<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星象座標系 · 真日心高精天球儀</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F0C96A;--gold-d:#D4A843;--blue:#63A3ED;--blue-l:#90C4FF;
  --bg:#03020A;--red:#FF6B6B;--green:#7DE09A;--purple:#C084FC;--cream:#F0EAD6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Noto Sans TC',sans-serif;user-select:none;-webkit-user-select:none}

#three-canvas{position:absolute;inset:0;z-index:1}

/* ── Zen Mode ── */
#topbar,#lp,#rp,#legend,.top-left-panel,#time-bar{transition:opacity .5s ease}
#ctrl-bar{transition:opacity .5s ease}
body.zen-mode #topbar,
body.zen-mode #lp,
body.zen-mode #rp,
body.zen-mode #legend,
body.zen-mode .top-left-panel,
body.zen-mode #time-bar{opacity:0!important;pointer-events:none!important}
body.zen-mode #ctrl-bar{opacity:.2}
body.zen-mode #ctrl-bar:hover{opacity:1}

#topbar{
  position:absolute;top:0;left:0;right:0;z-index:30;pointer-events:none;
  padding:14px 22px 36px;
  background:linear-gradient(to bottom,rgba(3,2,10,.95) 0%,transparent 100%);
  display:flex;align-items:flex-start;gap:20px
}
#tb-title{font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:var(--gold);text-shadow:0 0 28px rgba(240,201,106,.55);letter-spacing:.18em}
#tb-sub{font-size:.53rem;color:rgba(255,255,255,.32);letter-spacing:.28em;margin-top:3px}
.tb-right{margin-left:auto;text-align:right}
#tb-name{font-family:'Ma Shan Zheng',cursive;font-size:1.15rem;color:var(--cream);letter-spacing:.1em}
#tb-date{font-size:.62rem;color:rgba(255,255,255,.42);letter-spacing:.12em;margin-top:2px}
#tb-place{font-size:.52rem;color:var(--blue);opacity:.75;margin-top:3px;letter-spacing:.08em}

.top-left-panel{position:absolute;top:30px;left:30px;pointer-events:auto;z-index:40}
.btn-back{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:rgba(99,163,237,.08);border:1px solid rgba(99,163,237,.4);color:var(--blue);text-decoration:none;font-size:1.2rem;transition:all .3s;margin-bottom:20px;box-shadow:0 0 10px rgba(99,163,237,.2)}
.btn-back:hover{background:rgba(99,163,237,.2);border-color:var(--blue-l);box-shadow:0 0 20px rgba(99,163,237,.6);color:#fff}

/* ── Global Lang Toggle ── */
#global-lang-toggle{position:fixed;top:20px;right:22px;z-index:100;display:flex;gap:10px;pointer-events:auto}
.mlbtn{background:rgba(99,163,237,.1);border:1px solid rgba(99,163,237,.3);font-size:.6rem;color:rgba(255,255,255,.6);cursor:pointer;letter-spacing:.05em;transition:.3s;padding:5px 12px;border-radius:6px;font-family:'Noto Sans TC',sans-serif}
.mlbtn:hover,.mlbtn.active{color:var(--gold);border-color:var(--gold);background:rgba(240,201,106,.15);box-shadow:0 0 12px rgba(240,201,106,.2)}

/* ── Desktop Side Panels ── */
.side-panel{
  position:absolute;top:80px;z-index:20;width:220px;
  display:flex;flex-direction:column;gap:8px;pointer-events:auto
}
#lp{left:14px}#rp{right:14px}

.pc{
  background:rgba(3,2,10,.87);backdrop-filter:blur(24px) saturate(1.5);
  border:1px solid rgba(99,163,237,.16);border-radius:10px;padding:13px 15px
}
.pc:hover{border-color:rgba(99,163,237,.32)}
.pc-t{font-size:.5rem;color:var(--blue);letter-spacing:.22em;text-transform:uppercase;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid rgba(99,163,237,.1)}

.pr{display:flex;align-items:center;gap:7px;padding:4px 2px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;border-radius:4px;transition:.18s}
.pr:last-child{border-bottom:none}
.pr:hover{background:rgba(99,163,237,.07);padding-left:5px}
.pr-ic{font-size:1.05rem;width:20px;text-align:center;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-n{font-size:.62rem;color:rgba(255,255,255,.76)}
.pr-s{font-size:.5rem;color:rgba(255,255,255,.33);margin-top:1px}
.pr-d{font-size:.62rem;color:var(--gold);font-family:'Noto Serif TC',serif;flex-shrink:0}

.hg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.hc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:5px 7px;cursor:pointer;transition:.18s;text-align:center}
.hc:hover{background:rgba(240,201,106,.06);border-color:rgba(240,201,106,.22)}
.hc-n{font-size:.46rem;color:rgba(255,255,255,.45);letter-spacing:.05em}
.hc-s{font-size:.72rem;color:var(--gold);margin-top:1px}
.hc-p{font-size:.6rem;color:var(--blue-l);margin-top:2px;letter-spacing:.1em}

.al{font-size:.61rem;color:rgba(255,255,255,.62);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.7}
.al:last-child{border-bottom:none}
.at{display:inline-block;font-size:.48rem;padding:1px 5px;border-radius:3px;background:rgba(99,163,237,.14);color:var(--blue-l);margin-right:4px}
.av{color:var(--gold);font-family:'Noto Serif TC',serif}

/* ── MOBILE Bottom Drawer ── */
@media (max-width:768px){
  .side-panel{display:none!important}

  #mobile-drawer{
    position:fixed;bottom:0;left:0;right:0;z-index:25;
    background:rgba(3,2,10,.96);backdrop-filter:blur(28px);
    border-top:1px solid rgba(99,163,237,.22);
    border-radius:18px 18px 0 0;
    transform:translateY(calc(100% - 48px));
    transition:transform .38s cubic-bezier(.4,0,.2,1);
    max-height:72vh;display:flex;flex-direction:column;
  }
  #mobile-drawer.open{transform:translateY(0)}
  #mobile-drawer-handle{
    display:flex;align-items:center;justify-content:center;
    height:48px;cursor:pointer;flex-shrink:0;gap:10px;
    border-bottom:1px solid rgba(99,163,237,.08);
  }
  #mobile-drawer-handle .pill{
    width:38px;height:4px;border-radius:2px;
    background:rgba(99,163,237,.4);transition:.2s;
  }
  #mobile-drawer.open .pill{background:var(--gold)}
  #mobile-drawer-label{font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:.2em}
  #mobile-drawer-content{
    overflow-y:auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:10px;
    -webkit-overflow-scrolling:touch;
  }

  #topbar{padding:10px 14px 24px}
  #tb-title{font-size:1.1rem}
  #tb-sub{display:none}
  #global-lang-toggle{top:12px;right:10px;gap:5px}
  .mlbtn{padding:4px 8px;font-size:.52rem}

  #legend{
    bottom:52px;left:8px;right:8px;transform:none;width:auto;
    overflow-x:auto;flex-wrap:nowrap;justify-content:flex-start;
    padding:5px 14px;gap:12px;
  }
  #ctrl-bar{bottom:52px;right:8px}
  #time-bar{bottom:100px;min-width:280px;width:90%}
}

#legend{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;
  background:rgba(3,2,10,.8);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:30px;
  padding:6px 22px;display:flex;gap:18px;align-items:center
}
.li{display:flex;align-items:center;gap:5px;font-size:.56rem;color:rgba(255,255,255,.42);white-space:nowrap}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}

#ctrl-bar{
  position:absolute;bottom:16px;right:14px;z-index:20;display:flex;flex-direction:column;gap:6px;pointer-events:auto
}
.cb{width:37px;height:37px;border-radius:50%;background:rgba(99,163,237,.07);border:1px solid rgba(99,163,237,.25);color:rgba(144,196,255,.78);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.22s;position:relative}
.cb:hover{background:rgba(99,163,237,.18);box-shadow:0 0 14px rgba(99,163,237,.28)}
.cb.on{background:rgba(99,163,237,.2);border-color:var(--blue-l);box-shadow:0 0 16px rgba(99,163,237,.4)}
.cb[data-title]:hover::after{content:attr(data-title);position:absolute;right:44px;top:50%;transform:translateY(-50%);white-space:nowrap;background:rgba(3,2,10,.94);border:1px solid rgba(99,163,237,.28);color:var(--blue-l);font-size:.56rem;padding:4px 9px;border-radius:4px;pointer-events:none}

#time-bar{
  position:absolute;bottom:62px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:auto;
  background:rgba(3,2,10,.84);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.09);border-radius:30px;
  padding:7px 20px;display:none;gap:12px;align-items:center;min-width:340px
}
#time-bar.show{display:flex}
#time-lbl{font-size:.6rem;color:var(--gold);white-space:nowrap;min-width:116px;text-align:center}
#time-range{flex:1;accent-color:var(--blue)}
.tbtn{background:none;border:1px solid rgba(99,163,237,.3);color:var(--blue-l);font-size:.66rem;padding:3px 10px;border-radius:14px;cursor:pointer;transition:.18s;white-space:nowrap}
.tbtn:hover{background:rgba(99,163,237,.14)}

#tip{position:absolute;z-index:50;pointer-events:none;background:rgba(5,3,16,.94);border:1px solid rgba(240,201,106,.25);border-radius:8px;padding:11px 15px;display:none;max-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.7)}
#tip h4{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;color:var(--gold);margin-bottom:5px}
#tip p{font-size:.63rem;color:rgba(255,255,255,.63);line-height:1.72}

/* ── MODAL ── */
#mw{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.74);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;transition:opacity .6s;overflow-y:auto}
#modal{background:rgba(5,3,18,.97);border:1px solid rgba(99,163,237,.3);border-radius:14px;padding:38px 34px;width:92%;max-width:406px;box-shadow:0 48px 96px rgba(0,0,0,.92),0 0 80px rgba(99,163,237,.1),inset 0 0 30px rgba(99,163,237,.03);position:relative;margin:auto}
@media(max-width:768px){
  #modal{padding:24px 18px;margin:16px}
  #mw{align-items:flex-start;padding-top:10px}
}
.ml{font-family:'Ma Shan Zheng',cursive;font-size:2.2rem;color:var(--blue-l);text-align:center;text-shadow:0 0 36px rgba(99,163,237,.55);letter-spacing:.14em}
.ms{font-size:.58rem;color:rgba(255,255,255,.32);text-align:center;letter-spacing:.15em;margin:4px 0 26px}
.fl{font-size:.5rem;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
input[type=text],input[type=number]{width:100%;padding:11px 13px;background:rgba(0,0,0,.56);border:1px solid rgba(99,163,237,.2);color:#fff;border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;outline:none;transition:.25s}
input:focus{border-color:var(--blue-l);background:rgba(99,163,237,.09);box-shadow:0 0 14px rgba(99,163,237,.2)}
input::placeholder{color:rgba(255,255,255,.17)}
#st-hint{font-size:.58rem;color:var(--gold);margin-top:6px;padding:7px 11px;background:rgba(212,168,67,.07);border-left:2px solid var(--gold-d);display:none;border-radius:0 4px 4px 0}
.sbtn{width:100%;padding:15px;margin-top:16px;background:rgba(99,163,237,.1);border:1px solid var(--blue);color:var(--blue-l);border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;letter-spacing:.3em;cursor:pointer;transition:.3s}
.sbtn:hover{background:var(--blue);color:#000;box-shadow:0 0 32px rgba(99,163,237,.55)}
.demo{text-align:center;margin-top:11px;font-size:.56rem;color:rgba(255,255,255,.28);cursor:pointer;transition:.18s}
.demo:hover{color:var(--blue-l)}

/* CSS2D Labels */
.lbl{pointer-events:none;font-family:'Noto Sans TC',sans-serif}
.lecl{color:#FFD700;font-size:.72rem;font-weight:600;text-shadow:0 0 14px #D4A843,0 0 5px #000}
.leq{color:#90C4FF;font-size:.72rem;font-weight:500;text-shadow:0 0 12px #63A3ED,0 0 5px #000}
.lman{color:rgba(180,255,200,.88);font-size:.61rem;text-shadow:0 0 8px rgba(125,224,154,.5),0 0 3px #000;letter-spacing:.05em}
.lzod{color:#F0C96A;font-size:.86rem;font-weight:700;text-shadow:0 0 16px #D4A843,0 0 5px #000}
.lpl{display:flex;flex-direction:column;align-items:center;gap:1px}
.lpl-ic{font-family:'Ma Shan Zheng',cursive;font-size:1.52rem;text-shadow:0 0 16px currentColor}
.lpl-nm{font-size:.5rem;opacity:.88;text-shadow:0 0 8px currentColor;white-space:nowrap}
.lax{color:rgba(255,255,255,.65);font-size:.75rem;letter-spacing:.1em;text-shadow:0 0 8px #000;font-weight:bold}
.lasc{color:var(--red);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--red),0 0 5px #000;letter-spacing:.05em}
.ldsc{color:var(--blue-l);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--blue-l),0 0 5px #000;letter-spacing:.05em}

/* Loading overlay */
#loading-overlay{position:fixed;inset:0;z-index:55;background:rgba(3,2,10,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .6s}
#loading-overlay.hide{opacity:0;pointer-events:none}
.loading-spinner{width:48px;height:48px;border:2px solid rgba(99,163,237,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.65rem;color:var(--blue);letter-spacing:.25em}
</style>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">載入星象引擎 (真日心高精版)…</div>
</div>

<div class="top-left-panel">
  <a href="/" class="btn-back" title="返回主頁">⟨</a>
</div>

<div id="global-lang-toggle">
  <button class="mlbtn" data-lang="zh-TW" onclick="window.switchLang('zh-TW')">繁</button>
  <button class="mlbtn" data-lang="zh-CN" onclick="window.switchLang('zh-CN')">简</button>
  <button class="mlbtn" data-lang="en" onclick="window.switchLang('en')">EN</button>
  <button class="mlbtn" data-lang="ko" onclick="window.switchLang('ko')">KR</button>
</div>

<div id="three-canvas"></div>

<div id="topbar">
  <div>
    <div id="tb-title" data-i18n="ui.tb_t">星象座標系 · 天球儀</div>
    <div id="tb-sub" data-i18n="ui.tb_s">CELESTIAL SPHERE · 二十八宿 · 黃道十二宮</div>
  </div>
  <div class="tb-right">
    <div id="tb-info" style="display:none">
      <div id="tb-name"></div>
      <div id="tb-date"></div>
      <div id="tb-place"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="mw">
<div id="modal">
  <div class="ml" data-i18n="ui.title">星象座標系</div>
  <div class="ms" data-i18n="ui.sub">立體天球儀 · ASTROLABE · 二十八宿</div>
  <div class="fl" data-i18n="ui.name">命主姓名</div>
  <input type="text" id="f-nm" data-i18n-ph="ui.ph_name">
  <div class="fl" data-i18n="ui.date">出生日期（公曆）</div>
  <div class="r3">
    <input type="number" id="f-y" data-i18n-ph="ui.ph_y" min="1900" max="2100" oninput="hst()">
    <input type="number" id="f-m" data-i18n-ph="ui.ph_m" min="1" max="12" oninput="hst()">
    <input type="number" id="f-d" data-i18n-ph="ui.ph_d" min="1" max="31" oninput="hst()">
  </div>
  <div class="fl" data-i18n="ui.time">出生時間（24小時）</div>
  <div class="r2">
    <input type="number" id="f-h" data-i18n-ph="ui.ph_h" min="0" max="23" oninput="hst()">
    <input type="number" id="f-mi" data-i18n-ph="ui.ph_mi" min="0" max="59" oninput="hst()">
  </div>
  <div class="fl" data-i18n="ui.geo">出生地經緯度與時區</div>
  <div class="r3">
    <input type="number" id="f-lg" data-i18n-ph="ui.ph_lg" step="0.1" value="120" oninput="hst()">
    <input type="number" id="f-lat" data-i18n-ph="ui.ph_lat" step="0.1" value="30" oninput="hst()">
    <input type="number" id="f-tz" data-i18n-ph="ui.ph_tz" step="1" value="8" oninput="hst()">
  </div>
  <div id="st-hint"></div>
  <button class="sbtn" onclick="submitForm()" data-i18n="ui.btn">觀 測 星 象 能 量</button>
  <div class="demo" onclick="loadDemo()" data-i18n="ui.demo">→ 載入演示資料（J2000 · 2000年元旦正午）</div>
</div>
</div>

<!-- Desktop Side Panels -->
<div class="side-panel" id="lp" style="display:none">
  <div class="pc">
    <div class="pc-t" data-i18n="ui.p_zod">星象 · 視黃道度數</div>
    <div id="plist"></div>
  </div>
  <div class="pc">
    <div class="pc-t" data-i18n="ui.p_sum">命盤分析摘要</div>
    <div id="abody"></div>
  </div>
</div>
<div class="side-panel" id="rp" style="display:none">
  <div class="pc">
    <div class="pc-t" data-i18n="ui.p_asc">黃道十二宮 · 宮位星曜</div>
    <div class="hg" id="hgrid"></div>
  </div>
</div>

<!-- Mobile Bottom Drawer -->
<div id="mobile-drawer" style="display:none">
  <div id="mobile-drawer-handle" onclick="toggleDrawer()">
    <div class="pill"></div>
    <div id="mobile-drawer-label">星象資料</div>
    <div class="pill"></div>
  </div>
  <div id="mobile-drawer-content">
    <div class="pc">
      <div class="pc-t" data-i18n="ui.p_zod">星象 · 視黃道度數</div>
      <div id="plist-m"></div>
    </div>
    <div class="pc">
      <div class="pc-t" data-i18n="ui.p_sum">命盤分析摘要</div>
      <div id="abody-m"></div>
    </div>
    <div class="pc">
      <div class="pc-t" data-i18n="ui.p_asc">黃道十二宮 · 宮位星曜</div>
      <div class="hg" id="hgrid-m"></div>
    </div>
  </div>
</div>

<div id="legend">
  <div class="li"><div class="ld" style="background:#FFD700"></div><span data-i18n="ui.p_zod">黃道星座</span></div>
  <div class="li"><div class="ld" style="background:#63A3ED"></div><span data-i18n="ui.eq">赤道</span></div>
  <div class="li"><div class="ld" style="background:#7DE09A"></div><span data-i18n="ui.c_man">二十八宿</span></div>
  <div class="li"><div class="ld" style="background:#FF6B6B"></div><span data-i18n="ui.p_asc">ASC/十二宮</span></div>
  <div class="li"><div class="ld" style="background:#FF5500"></div><span data-i18n="ui.p_pl">星體</span></div>
</div>

<div id="ctrl-bar">
  <button class="cb" id="cb-zen" data-i18n-title="ui.c_zen" style="font-size:.9rem">🌌</button>
  <button class="cb" id="cb-spin" data-i18n-title="ui.c_spin">⟳</button>
  <button class="cb" id="cb-sys" data-i18n-title="ui.c_sys" style="font-size:.75rem"></button>
  <button class="cb" id="cb-out" data-i18n-title="ui.c_out" data-i18n-txt="ui.out_b" style="font-size:.75rem">王</button>
  <button class="cb on" id="cb-ecl" data-i18n-title="ui.c_ecl" style="color:#FFD700">◉</button>
  <button class="cb on" id="cb-eq"  data-i18n-title="ui.c_eq">⊕</button>
  <button class="cb on" id="cb-man" data-i18n-title="ui.c_man" data-i18n-txt="ui.s_man">宿</button>
  <button class="cb on" id="cb-pl"  data-i18n-title="ui.c_pl" data-i18n-txt="ui.s_pl">政</button>
  <button class="cb"    id="cb-asp" data-i18n-title="ui.c_asp">⋆</button>
  <button class="cb"    id="cb-tm"  data-i18n-title="ui.c_tm">⏱</button>
  <button class="cb"    id="cb-orb" data-i18n-title="ui.c_orb">◎</button>
</div>

<div id="time-bar">

// ══════════════════════════
//  ASTRONOMY ENGINE (HELIOCENTRIC & GEOCENTRIC)
// ══════════════════════════
const DEG = Math.PI / 180, R2D = 180 / Math.PI;
const norm = d => ((d % 360) + 360) % 360;

function jdn(y, m, d, h = 12, mn = 0) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5 + (h + mn / 60) / 24;
}
function T_jd(jd) { return (jd - 2451545.0) / 36525; }

function solveKepler(M, e) {
  let E = M;
  for (let i = 0; i < 10; i++) {
    const dE = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-6) break;
  }
  return E;
}

const PE = {
  earth:   {L:100.464,a:1.0000,e:0.0167,i:0.0000,w:102.940,Node:0.0,  n:0.9856091}, // Approximated relative to Sun
  mercury: {L:252.250,a:0.3871,e:0.2056,i:7.0049,w:77.456, Node:48.331,n:4.0923173},

  mars:    {L:355.453,a:1.5237,e:0.0934,i:1.8506,w:336.040,Node:49.557,n:0.5240208},
  jupiter: {L:34.404, a:5.2026,e:0.0485,i:1.3030,w:14.754, Node:100.454,n:0.0830853},
  saturn:  {L:50.077, a:9.5371,e:0.0555,i:2.4845,w:92.432, Node:113.663,n:0.0334442},
  uranus:  {L:313.232,a:19.189,e:0.0463,i:0.7733,w:170.964,Node:74.006, n:0.0117258},
  neptune: {L:304.880,a:30.070,e:0.0090,i:1.7700,w:44.971, Node:131.784,n:0.0059951},
  pluto:   {L:238.929,a:39.482,e:0.2488,i:17.140,w:224.067,Node:110.303,n:0.0039648}

function getHeliocentric(id, d) {
  const p = PE[id];
  const M = norm(p.L + p.n * d - p.w);
  const E = solveKepler(M * DEG, p.e);
  const xv = p.a * (Math.cos(E) - p.e);
  const yv = p.a * (Math.sqrt(1 - p.e * p.e) * Math.sin(E));
  const r = Math.sqrt(xv * xv + yv * yv);
  const l = norm(Math.atan2(yv, xv) * R2D + p.w);
  const lat = p.i * Math.sin((l - p.Node) * DEG);
  const z = r * Math.sin(lat * DEG);
  const r_xy = r * Math.cos(lat * DEG);
  return { l, r: r_xy, z };
}

function calcAll(T, jd, lng, lat, isSid) {
  const d = jd - 2451545.0;
  let geo = {};
  let helio = {};

  // Earth Heliocentric (Sun's Geocentric is Earth Helio + 180)
  const earth_helio = getHeliocentric('earth', d); // Using earth params roughly
  // To be precise astrologically, we calculate Earth's helio based on exact solar formula:
  const L_sun = norm(280.460 + 0.9856474 * d);
  const g_sun = norm(357.528 + 0.9856003 * d);
  const sunGeo = norm(L_sun + 1.915 * Math.sin(g_sun * DEG) + 0.020 * Math.sin(2 * g_sun * DEG));
  
  geo.sun = sunGeo;
  geo.sun_lat = 0;
  
  // Heliocentric Earth is SunGeo + 180
  helio.earth = { l: norm(sunGeo + 180), r: 1.0, z: 0 };
  const xe = helio.earth.r * Math.cos(helio.earth.l * DEG);
  const ye = helio.earth.r * Math.sin(helio.earth.l * DEG);

  const D  = norm(297.85036 + 12.190749 * d);
  const M  = norm(357.52772 + 0.985600 * d);
  const Mp = norm(134.96298 + 13.064992 * d);
  const F  = norm(93.27191  + 13.229350 * d);
  geo.moon = norm(218.3165 + 13.176396 * d
    + 6.289 * Math.sin(Mp * DEG)
    + 1.274 * Math.sin((2 * D - Mp) * DEG)
    + 0.658 * Math.sin(2 * D * DEG)
    + 0.214 * Math.sin(2 * Mp * DEG)
    - 0.186 * Math.sin(M * DEG)

    // Convert to Geocentric for astrology panels
    const xp = h.r * Math.cos(h.l * DEG);
    const yp = h.r * Math.sin(h.l * DEG);
    const X = xp - xe;
    const Y = yp - ye;
    const Z = h.z;
    geo[id] = norm(Math.atan2(Y, X) * R2D);
    geo[id+'_lat'] = Math.atan2(Z, Math.sqrt(X*X + Y*Y)) * R2D;
  });

  const ascNode = norm(125.04452 - 0.0529538 * d);
  geo.ketu = ascNode;          
  geo.rahu = norm(ascNode + 180); 
  geo.moon_lat = 5.145 * Math.sin((geo.moon - geo.ketu) * DEG);
  geo.rahu_lat = 0; geo.ketu_lat = 0;
  
  geo.yapo = norm(83.3532465 + 0.11140353 * d + 180);
  geo.yapo_lat = 5.145 * Math.sin((geo.yapo - geo.ketu) * DEG);

  // 【紫炁高精测算】基于可配置基准度数 ZIQI_BASE
  geo.ziqi = norm(ZIQI_BASE + 0.0351978 * d); 
  geo.ziqi_lat = 0;

  const gmst = 280.46061837 + 360.98564736629 * d + 0.000387933 * T * T;
  const lst = norm(gmst + lng) * DEG;
  const obliq = (23.4392911 - 0.0130042 * T) * DEG;
  const lat_rad = lat * DEG;
  const asc_rad = Math.atan2(Math.cos(lst), -(Math.sin(lst) * Math.cos(obliq) + Math.tan(lat_rad) * Math.sin(obliq)));
  geo.asc = norm(asc_rad * R2D);
  geo.dsc = norm(geo.asc + 180);

  if (isSid) {
    const aya = 24.03 + d * (50.29 / 36525);
    for (let k in geo) { if(typeof geo[k]==='number') geo[k] = norm(geo[k] - aya); }
    for (let k in helio) { if(typeof helio[k].l==='number') helio[k].l = norm(helio[k].l - aya); }
  }
  return { geo, helio, lst };
}

function stCorr(lng, std = 120) { return Math.round((lng - std) * 4); }
function applyST(h, mn, c) {
  let m = mn + c;
  while (m >= 60) { h++; m -= 60; }
  while (m < 0) { h--; m += 60; }
  return { h: ((h % 24) + 24) % 24, m: ((m % 60) + 60) % 60 };
}

const ZSYM = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
function zodiac(lon) {
  return { s: LANGS[currLang].zod[Math.floor(lon / 30)], sym: ZSYM[Math.floor(lon / 30)], d: (lon % 30).toFixed(1) };
}

const klass_w = [12,9,15,5,5,18,11,26,8,12,10,17,16,9,16,12,14,11,16,2,9,33,4,15,7,18,18,17];
const MANS = [];
let _acc = 180;
for (let i = 0; i < 28; i++) {
  const w = klass_w[i] * 360 / 365;
  MANS.push({ id: i, s: _acc, w });
  _acc += w;
}

function getMansion(lon, isSid, jd) {
  let sidLon = lon;
  if (!isSid && jd) {
    const d = jd - 2451545.0;
    const aya = 24.03 + d * (50.29 / 36525);
    sidLon = norm(lon - aya);
  }
  for (const m of MANS) {
    const s = m.s % 360, e = (m.s + m.w) % 360;
    if (s < e) { if (sidLon >= s && sidLon < e) return LANGS[currLang].man[m.id]; }
    else { if (sidLon >= s || sidLon < e) return LANGS[currLang].man[m.id]; }
  }
  return LANGS[currLang].man[0];
}

function analyzeChart(geo, isSid, jd) {
  const d = LANGS[currLang];
  const lines = [];
  const sz = zodiac(geo.sun), mz = zodiac(geo.moon), az = zodiac(geo.asc);
  const mm = getMansion(geo.moon, isSid, jd);
  const elong = norm(geo.moon - geo.sun);
  const phase = elong < 45 ? d.al.p1 : elong < 135 ? d.al.p2 : elong < 225 ? d.al.p3 : elong < 315 ? d.al.p4 : d.al.p5;
  lines.push(`<span class="at">${d.ui.asc}</span>${d.al.asc} <span class="av">${az.s} ${az.d}°</span>`);
  lines.push(`<span class="at">${d.pl.sun}</span>${d.al.sun} <span class="av">${sz.s} ${sz.d}°</span>`);
  lines.push(`<span class="at">${d.pl.moon}</span>${d.al.moon} <span class="av">${mz.s}·${mm}${d.ui.mansion}</span>`);
  lines.push(`<span class="at">${d.al.phase}</span><span class="av">${phase}</span> ${d.al.deg} ${elong.toFixed(0)}°`);
  lines.push(`<span class="at">${d.pl.rahu}</span>${d.al.rahu} <span class="av">${zodiac(geo.rahu).s}</span>`);
  lines.push(`<span class="at">${d.pl.jupiter}</span>${d.al.jup} <span class="av">${zodiac(geo.jupiter).s}</span>`);
  lines.push(`<span class="at">${d.pl.saturn}</span>${d.al.sat} <span class="av">${zodiac(geo.saturn).s}</span>`);
  return lines;
}

function buildPlanetMesh(pc) {

    mat = new THREE.MeshBasicMaterial({ color: pc.col });

      emissive: new THREE.Color(0xFFaa44),

    });

    // 【物理材质】不再发光，接受太阳光源照射产生真实昼夜线
    mat = new THREE.MeshStandardMaterial({
      map: tex || null,

      roughness: 0.8,
      metalness: 0.1,
    });
  }

  const sphere = new THREE.Mesh(new THREE.SphereGeometry(pc.sz, 64, 64), mat);

  if (pc.type === 'fict') {
    sphere.add(new THREE.Mesh(
      new THREE.TorusGeometry(pc.sz * 1.85, .1, 8, 32),
      new THREE.MeshBasicMaterial({ color: pc.col, transparent: true, opacity: .4 })

      new THREE.SphereGeometry(pc.sz * 1.05, 32, 32),
      new THREE.MeshBasicMaterial({ color: pc.col, transparent: true, opacity: .08, blending: THREE.AdditiveBlending, side: THREE.BackSide })
    ));
  }

  if (pc.id === 'saturn') {
    const ringMat = new THREE.MeshStandardMaterial({
      map: saturnRingProcedural,
      color: 0xFFFFFF,
      transparent: true,
      opacity: 0.95,

function placePlanets(geo, helio, lst) {
  currentLST = lst;
  
  // 地球自转更新 (匹配当前地方恒星时)
  if(pMesh['earth']) pMesh['earth'].rotation.y = lst * DEG;

  PCONF.forEach(pc => {
    const isVis = (!pc.isOut || showOut);
    let x=0, y=0, z=0;

    // --- 真物理空间布局 ---
    if (pc.id === 'sun') {
        x = 0; y = 0; z = 0;
    } else if (pc.id === 'earth') {
        // 地球在日心轨道上的位置
        const l_earth = helio.earth.l * DEG;
        x = Math.cos(l_earth) * pc.R;
        y = Math.sin(l_earth) * pc.R;
        z = 0;
    } else if (pc.type === 'planet') {
        // 其他行星在日心轨道上的位置
        const h = helio[pc.id];
        if (h) {
            x = Math.cos(h.l * DEG) * pc.R;
            y = Math.sin(h.l * DEG) * pc.R;
            z = Math.sin(h.lat || (PE[pc.id].i * Math.sin((h.l - PE[pc.id].Node)*DEG)) * DEG) * pc.R;
        }
    } else if (pc.type === 'sat' || pc.type === 'fict') {
        // 卫星和虚拟星体（视点）永远伴随地球，显示地心黄经
        const g_lon = geo[pc.id] * DEG;
        const g_lat = (geo[pc.id+'_lat'] || 0) * DEG;
        const base = pMesh['earth'].position;
        const rp = Math.cos(g_lat) * pc.R;
        x = base.x + Math.cos(g_lon) * rp;
        y = base.y + Math.sin(g_lon) * rp;
        z = base.z + Math.sin(g_lat) * pc.R;
    }

    if (pMesh[pc.id]) pMesh[pc.id].position.set(x, y, z);
    if (pLbl[pc.id]) pLbl[pc.id].position.set(x, y, z);
    if (pMesh[pc.id]) pMesh[pc.id].visible = isVis;
    if (pLbl[pc.id]) pLbl[pc.id].element.style.display = isVis ? 'flex' : 'none';

    // 生成真物理轨道
    if (pc.orbLine) {
        pc.orbLine.visible = isVis && showOrb && pc.id !== 'sun';
        if (pc.orbLine.visible) {
            const pts = [];
            if (pc.id === 'earth' || pc.type === 'planet') {
                // 绕日轨道
                const inc = (pc.id === 'earth') ? 0 : PE[pc.id].i;
                const node = (pc.id === 'earth') ? 0 : PE[pc.id].Node;
                for(let i=0; i<=128; i++) {
                    const ang = (i/128) * Math.PI * 2;
                    const lat = inc * Math.sin(ang - node * DEG) * DEG;
                    const rp = Math.cos(lat) * pc.R;
                    pts.push(new THREE.Vector3(Math.cos(ang)*rp, Math.sin(ang)*rp, Math.sin(lat)*pc.R));
                }
            } else if (pc.type === 'sat' || pc.type === 'fict') {
                // 绕地轨道
                const base = pMesh['earth'].position;
                const inc = (pc.id === 'moon') ? 5.145 : 0;
                const node = (pc.id === 'moon') ? geo.ketu : 0;
                for(let i=0; i<=128; i++) {
                    const ang = (i/128) * Math.PI * 2;
                    const lat = inc * Math.sin(ang - node * DEG) * DEG;
                    const rp = Math.cos(lat) * pc.R;
                    pts.push(new THREE.Vector3(base.x + Math.cos(ang)*rp, base.y + Math.sin(ang)*rp, base.z + Math.sin(lat)*pc.R));
                }
            }
            pc.orbLine.geometry.setFromPoints(pts);
        }
    }
  });

  if (showAsp) buildAspects(geo); else aspG.clear();

  // 动态连接：地球看向各个星体的地心视线，便于对应星座环度数
  while (houseG.children.length > 0) {
    const c = houseG.children[0];
    if (c.isCSS2DObject && c.element) c.element.remove();
    houseG.remove(c);
  }
  
  // 绘制十二宫从地球发出的射线
  const asc = geo.asc;
  for (let i = 0; i < 12; i++) {
    const a = norm(asc + i * 30) * DEG;
    const isAngle = (i === 0 || i === 6);
    const col = i === 0 ? 0xFF4444 : (i === 6 ? 0x4488FF : 0xFFFFFF);
    houseG.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(Math.cos(a) * 18, Math.sin(a) * 18, 0),
        new THREE.Vector3(Math.cos(a) * (isAngle ? 42.5 : 40), Math.sin(a) * (isAngle ? 42.5 : 40), 0)
      ]),
      new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: isAngle ? .6 : .1 })
    ));
    if (i === 0) lbl2D(houseG, 'lasc', 45, a, 'ui', 'asc');
    else if (i === 6) lbl2D(houseG, 'ldsc', 45, a, 'ui', 'dsc');
    else lbl2D(houseG, 'lax', 42.5, a, 'raw', i + 1);
  }
}

const ASP_A = [0, 60, 90, 120, 150, 180];
const ASP_C = [0xFFFF00, 0x44FF88, 0xFF4444, 0x44AAFF, 0xFF8844, 0xFF4444];

function buildAspects(geo) {
  aspG.clear();
  const base_asp = ['sun','moon','mercury','venus','mars','jupiter','saturn'];
  if (showOut) base_asp.push('uranus','neptune','pluto');
  
  // 相位线从地球中心发射更清晰
  for (let i = 0; i < base_asp.length; i++) for (let j = i + 1; j < base_asp.length; j++) {
    const id1 = base_asp[i], id2 = base_asp[j];
    const diff = Math.min(norm(geo[id1] - geo[id2]), norm(geo[id2] - geo[id1]));
    for (let k = 0; k < ASP_A.length; k++) {
      if (Math.abs(diff - ASP_A[k]) < 8) {
        const p1 = pMesh[id1] ? pMesh[id1].position.clone() : new THREE.Vector3();
        const p2 = pMesh[id2] ? pMesh[id2].position.clone() : new THREE.Vector3();
        aspG.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([p1, p2]),
          new THREE.LineBasicMaterial({ color: ASP_C[k], transparent: true, opacity: .45 })
        ));
        break;
      }
    }
  }
}

function renderPlanetList(geo, isSid, jd, suffix = '') {
  const el = document.getElementById('plist' + suffix);
  if (!el) return;
  el.innerHTML = '';
  // UI面板显示地心数据
  PCONF.filter(pc => pc.id !== 'earth' && (!pc.isOut || showOut)).forEach(pc => {
    const lon = geo[pc.id]; if (lon === undefined) return;
    const z = zodiac(lon), man = getMansion(lon, isSid, jd);
    const hex = '#' + pc.col.toString(16).padStart(6, '0');
    const row = document.createElement('div'); row.className = 'pr';
    row.innerHTML = `<div class="pr-ic" style="color:${hex}">${pc.ic}</div>
      <div class="pr-info"><div class="pr-n">${LANGS[currLang].pl[pc.id]}</div><div class="pr-s">${man}${LANGS[currLang].ui.mansion}·${z.s}</div></div>
      <div class="pr-d">${lon.toFixed(1)}°</div>`;
    row.addEventListener('mouseenter', e => showTip(e, `${pc.ic} ${LANGS[currLang].pl[pc.id]}`, 
      `${LANGS[currLang].ui.ecl}：${lon.toFixed(2)}°<br>${z.sym}${z.s} ${z.d}°<br>${man}${LANGS[currLang].ui.mansion}<br>${LANGS[currLang].wx[pc.id] || ''}`));
    row.addEventListener('mouseleave', () => hideTip());
    el.appendChild(row);
  });
}

function renderHouseGrid(geo, suffix = '') {
  const g = document.getElementById('hgrid' + suffix);
  if (!g) return;
  g.innerHTML = '';
  const asc = geo.asc;
  for (let i = 0; i < 12; i++) {
    const cLon = norm(asc + i * 30), z = zodiac(cLon);
    const ph = PCONF.filter(pc => pc.id !== 'earth' && (!pc.isOut || showOut) && geo[pc.id] !== undefined && Math.floor(norm(geo[pc.id] - asc) / 30) === i)
      .map(p => `<span style="color:#${p.col.toString(16).padStart(6,'0')}">${p.ic}</span>`).join('');
    const cell = document.createElement('div'); cell.className = 'hc';
    cell.innerHTML = `<div class="hc-n">${i + 1}</div><div class="hc-s">${z.sym}${z.s}</div>${ph ? `<div class="hc-p">${ph}</div>` : ''}`;
    cell.addEventListener('mouseenter', e => showTip(e, `${i + 1}${LANGS[currLang].ui.house}·${z.s}`, `${cLon.toFixed(1)}°`));
    cell.addEventListener('mouseleave', () => hideTip());
    g.appendChild(cell);
  }
}

function renderAnalysis(geo, isSid, jd, suffix = '') {
  const el = document.getElementById('abody' + suffix);
  if (!el) return;
  el.innerHTML = analyzeChart(geo, isSid, jd).map(l => `<div class="al">${l}</div>`).join('');
}

function showTip(e, h, p) {
  document.getElementById('tip-h').textContent = h;
  document.getElementById('tip-p').innerHTML = p;
  const t = document.getElementById('tip'); t.style.display = 'block';
  t.style.left = Math.min(e.clientX + 16, innerWidth - 215) + 'px';
  t.style.top = Math.max(e.clientY - 14, 8) + 'px';
}
function hideTip() { document.getElementById('tip').style.display = 'none'; }

// ══════════════════════════
//  FORM & CALCULATION
// ══════════════════════════
window.hst = function() {
  const lng = parseFloat(document.getElementById('f-lg').value);
  const tz = parseInt(document.getElementById('f-tz').value) || 8;
  const h = parseInt(document.getElementById('f-h').value) || 0;
  const mn = parseInt(document.getElementById('f-mi').value) || 0;
  const hint = document.getElementById('st-hint');
  if (!isNaN(lng)) {
    const c = stCorr(lng, tz * 15);
    const st = applyST(h, mn, c);
    hint.textContent = `✦ 真太陽時：偏差${c >= 0 ? '+' : ''}${c}分 → 校正後 ${String(st.h).padStart(2,'0')}:${String(st.m).padStart(2,'0')}`;
    hint.style.display = 'block';
  } else hint.style.display = 'none';
};

window.submitForm = function() {
  const name = document.getElementById('f-nm').value.trim() || LANGS[currLang].ui.name;
  const y = parseInt(document.getElementById('f-y').value);
  const m = parseInt(document.getElementById('f-m').value);
  const d = parseInt(document.getElementById('f-d').value);
  let h = parseInt(document.getElementById('f-h').value);
  let mn = parseInt(document.getElementById('f-mi').value);

  if (isNaN(h) || h < 0 || h > 23) h = 12;
  if (isNaN(mn) || mn < 0 || mn > 59) mn = 0;

  const lng = parseFloat(document.getElementById('f-lg').value) || 120;
  const lat = parseFloat(document.getElementById('f-lat').value) || 30;
  const tz = parseInt(document.getElementById('f-tz').value) || 8;

  if (!y || !m || !d || isNaN(y) || isNaN(m) || isNaN(d)) {
    alert('請輸入完整的年月日！');
    return;
  }

  const utcH = h - tz;
  const jd_utc = jdn(y, m, d, utcH, mn);
  const st = applyST(h, mn, stCorr(lng, tz * 15));

  userData = { name, y, m, d, h: st.h, mn: st.m, lng, lat, tz, jd: jd_utc };
  launch();
};

window.loadDemo = function() {
  ['f-nm','f-y','f-m','f-d','f-h','f-mi','f-lg','f-lat','f-tz'].forEach((id, i) => {
    document.getElementById(id).value = ['演示','2000','1','1','12','0','120','30','8'][i];
  });
  window.submitForm();
};

function updatePositions() {
  if (!userData.jd) return;
  // 時間偏移精確到小時
  const offHours = parseInt(document.getElementById('time-range').value) || 0;
  const targetJD = userData.jd + (offHours / 24);
  const T = T_jd(targetJD);

  const res = calcAll(T, targetJD, userData.lng, userData.lat, isSidereal);
  curGeo = res.geo; curHelio = res.helio;
  
  placePlanets(curGeo, curHelio, res.lst);

  const aya = 24.03 + (targetJD - 2451545.0) / 365.25 * (50.29 / 3600);
  manG.rotation.z = isSidereal ? 0 : aya * DEG;

  renderPlanetList(curGeo, isSidereal, targetJD, '');
  renderHouseGrid(curGeo, '');
  renderAnalysis(curGeo, isSidereal, targetJD, '');
  renderPlanetList(curGeo, isSidereal, targetJD, '-m');
  renderHouseGrid(curGeo, '-m');
  renderAnalysis(curGeo, isSidereal, targetJD, '-m');

  document.getElementById('tb-place').textContent = `lng ${userData.lng.toFixed(1)}° · lat ${userData.lat.toFixed(1)}° · ${isSidereal ? LANGS[currLang].al.sid : LANGS[currLang].al.trop}`;
}

function launch() {
  updatePositions();
  document.getElementById('tb-name').textContent = userData.name;
  document.getElementById('tb-date').textContent = `${userData.y}.${String(userData.m).padStart(2,'0')}.${String(userData.d).padStart(2,'0')} ${String(userData.h).padStart(2,'0')}:${String(userData.mn).padStart(2,'0')}`;
  document.getElementById('tb-info').style.display = 'block';

  if (isMobile) {
    document.getElementById('mobile-drawer').style.display = 'flex';
  } else {
    document.getElementById('lp').style.display = 'flex';
    document.getElementById('rp').style.display = 'flex';
  }

  const mw = document.getElementById('mw');
  if (mw.style.display !== 'none') {
    mw.style.transition = 'opacity .7s';
    mw.style.opacity = '0';
    setTimeout(() => { mw.style.display = 'none'; }, 700);
    OCtrl.autoRotate = true;
    setTimeout(() => OCtrl.autoRotate = false, 5500);
  }
}

// ── Time Scrubber ──
const tRange = document.getElementById('time-range');
const tLbl = document.getElementById('time-lbl');   
tRange.addEventListener('input', () => {
  if (!userData.jd) return;
  updatePositions();
  const offHours = parseInt(tRange.value);
  const baseDate = new Date(Date.UTC(userData.y, userData.m - 1, userData.d, userData.h, userData.mn));
  const targetDate = new Date(baseDate.getTime() + offHours * 3600000);
  tLbl.textContent = `${targetDate.getUTCFullYear()}.${String(targetDate.getUTCMonth()+1).padStart(2,'0')}.${String(targetDate.getUTCDate()).padStart(2,'0')} ${String(targetDate.getUTCHours()).padStart(2,'0')}:00`;
});

const tbPlay = document.getElementById('tb-play');
tbPlay.addEventListener('click', function() {
  if (playingTime) {
    clearInterval(playInterval); playingTime = false;
    this.textContent = LANGS[currLang].ui.t_play; return;
  }
  playingTime = true; this.textContent = LANGS[currLang].ui.t_pause;
  playInterval = setInterval(() => {
    const v = Math.min(parseInt(tRange.value) + 12, 87600);
    tRange.value = v; tRange.dispatchEvent(new Event('input'));
    if (v >= 87600) { clearInterval(playInterval); playingTime = false; tbPlay.textContent = LANGS[currLang].ui.t_play; }
  }, 45);
});

window.resetTime = function() {
  clearInterval(playInterval); playingTime = false; tbPlay.textContent = LANGS[currLang].ui.t_play;
  tRange.value = 0; tRange.dispatchEvent(new Event('input')); tLbl.textContent = LANGS[currLang].ui.t_curr;
};

// ── Controls ──
function tog(id, on, off, init) {
  let s = init ?? true; const b = document.getElementById(id);
  b.classList.toggle('on', s);
  b.addEventListener('click', () => { s = !s; b.classList.toggle('on', s); s ? on() : off(); });
}
tog('cb-zen', () => document.body.classList.add('zen-mode'), () => document.body.classList.remove('zen-mode'), false);
tog('cb-spin', () => OCtrl.autoRotate = true, () => OCtrl.autoRotate = false, false);
tog('cb-ecl', () => eclG.visible = true, () => eclG.visible = false);
tog('cb-eq',  () => eqG.visible = true,  () => eqG.visible = false);
tog('cb-man', () => manG.visible = true,  () => manG.visible = false);
tog('cb-pl',  () => plG.visible = true,   () => plG.visible = false);
tog('cb-asp', () => { showAsp = true; buildAspects(curGeo); }, () => { showAsp = false; aspG.clear(); }, false);
tog('cb-tm',  () => document.getElementById('time-bar').classList.add('show'), () => { document.getElementById('time-bar').classList.remove('show'); resetTime(); }, false);
tog('cb-orb', () => { showOrb = true; if(userData.jd) updatePositions(); },
               () => { showOrb = false; PCONF.forEach(pc => { if (pc.orbLine) pc.orbLine.visible = false; }); }, false);

const bSys = document.getElementById('cb-sys');
tog('cb-sys',
  () => { isSidereal = true; bSys.classList.add('on'); if (userData.jd) updatePositions(); },
  () => { isSidereal = false; bSys.classList.remove('on'); if (userData.jd) updatePositions(); }, false);

const bOut = document.getElementById('cb-out');
tog('cb-out',
  () => { showOut = true; bOut.classList.add('on'); if (userData.jd) updatePositions(); },
  () => { showOut = false; bOut.classList.remove('on'); if (userData.jd) updatePositions(); }, false);

// ── Planet rotation animation ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  OCtrl.update();
  
  // 地球基础自转（附加动画自转）
  if (pMesh.earth) pMesh.earth.rotation.y += dt * .12;

  if (pMesh.sun) pMesh.sun.rotation.y += dt * 0.04;
  if (pMesh.jupiter) pMesh.jupiter.rotation.y += dt * 0.18;
  if (pMesh.saturn) pMesh.saturn.rotation.y += dt * 0.15;
  if (pMesh.mars) pMesh.mars.rotation.y += dt * 0.08;
  if (pMesh.venus) pMesh.venus.rotation.y += dt * 0.02;
  if (pMesh.mercury) pMesh.mercury.rotation.y += dt * 0.05;
  if (pMesh.uranus) pMesh.uranus.rotation.y += dt * 0.12;
  if (pMesh.neptune) pMesh.neptune.rotation.y += dt * 0.10;

  composer.render(dt);
  lblR.render(scene, camera);
}

Promise.all(texPromises).then(() => {
  buildAllPlanets();
  const ov = document.getElementById('loading-overlay');
  ov.classList.add('hide');
  setTimeout(() => ov.style.display = 'none', 700);
  animate();
}).catch(err => {
  buildAllPlanets();
  document.getElementById('loading-overlay').style.display = 'none';
  animate();
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth, innerHeight);
  lblR.setSize(innerWidth, innerHeight);
});
