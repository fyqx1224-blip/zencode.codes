<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星象座標系 · 立體天球儀</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F0C96A;--gold-d:#D4A843;--blue:#63A3ED;--blue-l:#90C4FF;
  --bg:#03020A;--red:#FF6B6B;--green:#7DE09A;--purple:#C084FC;--cream:#F0EAD6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Noto Sans TC',sans-serif;user-select:none;-webkit-user-select:none}

#three-canvas{position:absolute;inset:0;z-index:1}

/* 🟢 沉浸模式 (Zen Mode) 平滑過渡 */
#topbar, #lp, #rp, #legend, .top-left-panel, #time-bar { transition: opacity 0.5s ease; }
#ctrl-bar { transition: opacity 0.5s ease; }

body.zen-mode #topbar,
body.zen-mode #lp,
body.zen-mode #rp,
body.zen-mode #legend,
body.zen-mode .top-left-panel,
body.zen-mode #time-bar { opacity: 0 !important; pointer-events: none !important; }
body.zen-mode #ctrl-bar { opacity: 0.2; }
body.zen-mode #ctrl-bar:hover { opacity: 1; }

#topbar{
  position:absolute;top:0;left:0;right:0;z-index:30;pointer-events:none;
  padding:14px 22px 36px;
  background:linear-gradient(to bottom,rgba(3,2,10,.95) 0%,transparent 100%);
  display:flex;align-items:flex-start;gap:20px
}
#tb-title{font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:var(--gold);text-shadow:0 0 28px rgba(240,201,106,.55);letter-spacing:.18em}
#tb-sub{font-size:.53rem;color:rgba(255,255,255,.32);letter-spacing:.28em;margin-top:3px}
.tb-right{margin-left:auto;text-align:right}
#tb-name{font-family:'Ma Shan Zheng',cursive;font-size:1.15rem;color:var(--cream);letter-spacing:.1em}
#tb-date{font-size:.62rem;color:rgba(255,255,255,.42);letter-spacing:.12em;margin-top:2px}
#tb-place{font-size:.52rem;color:var(--blue);opacity:.75;margin-top:3px;letter-spacing:.08em}

.top-left-panel { position: absolute; top: 30px; left: 30px; pointer-events: auto; z-index: 40; }
.btn-back { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(99, 163, 237, 0.08); border: 1px solid rgba(99, 163, 237, 0.4); color: var(--blue); text-decoration: none; font-size: 1.2rem; transition: all 0.3s; margin-bottom: 20px; box-shadow: 0 0 10px rgba(99, 163, 237, 0.2); }
.btn-back:hover { background: rgba(99, 163, 237, 0.2); border-color: var(--blue-l); box-shadow: 0 0 20px rgba(99, 163, 237, 0.6); color: #fff;}

#global-lang-toggle{display:flex;gap:10px;pointer-events:auto;justify-content:flex-end;margin-bottom:12px}
.mlbtn{background:rgba(99,163,237,.1);border:1px solid rgba(99,163,237,.3);font-size:.6rem;color:rgba(255,255,255,.6);cursor:pointer;letter-spacing:.05em;transition:.3s;padding:5px 12px;border-radius:6px;font-family:'Noto Sans TC',sans-serif;}
.mlbtn:hover,.mlbtn.active{color:var(--gold);border-color:var(--gold);background:rgba(240,201,106,.15);box-shadow:0 0 12px rgba(240,201,106,.2)}

.side-panel{
  position:absolute;top:80px;z-index:20;width:220px;
  display:flex;flex-direction:column;gap:8px;pointer-events:auto
}
#lp{left:14px}#rp{right:14px}

.pc{
  background:rgba(3,2,10,.87);backdrop-filter:blur(24px) saturate(1.5);
  border:1px solid rgba(99,163,237,.16);border-radius:10px;padding:13px 15px
}
.pc:hover{border-color:rgba(99,163,237,.32)}
.pc-t{font-size:.5rem;color:var(--blue);letter-spacing:.22em;text-transform:uppercase;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid rgba(99,163,237,.1)}

.pr{display:flex;align-items:center;gap:7px;padding:4px 2px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;border-radius:4px;transition:.18s}
.pr:last-child{border-bottom:none}
.pr:hover{background:rgba(99,163,237,.07);padding-left:5px}
.pr-ic{font-size:1.05rem;width:20px;text-align:center;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-n{font-size:.62rem;color:rgba(255,255,255,.76)}
.pr-s{font-size:.5rem;color:rgba(255,255,255,.33);margin-top:1px}
.pr-d{font-size:.62rem;color:var(--gold);font-family:'Noto Serif TC',serif;flex-shrink:0}

.hg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.hc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:5px 7px;cursor:pointer;transition:.18s; text-align:center;}
.hc:hover{background:rgba(240,201,106,.06);border-color:rgba(240,201,106,.22)}
.hc-n{font-size:.46rem;color:rgba(255,255,255,.45);letter-spacing:.05em}
.hc-s{font-size:.72rem;color:var(--gold);margin-top:1px}
.hc-p{font-size:.6rem;color:var(--blue-l);margin-top:2px;letter-spacing:0.1em}

.al{font-size:.61rem;color:rgba(255,255,255,.62);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.7}
.al:last-child{border-bottom:none}
.at{display:inline-block;font-size:.48rem;padding:1px 5px;border-radius:3px;background:rgba(99,163,237,.14);color:var(--blue-l);margin-right:4px}
.av{color:var(--gold);font-family:'Noto Serif TC',serif}

#legend{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;
  background:rgba(3,2,10,.8);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:30px;
  padding:6px 22px;display:flex;gap:18px;align-items:center
}
.li{display:flex;align-items:center;gap:5px;font-size:.56rem;color:rgba(255,255,255,.42)}
.ld{width:7px;height:7px;border-radius:50%}

#ctrl-bar{
  position:absolute;bottom:16px;right:14px;z-index:20;display:flex;flex-direction:column;gap:6px;pointer-events:auto
}
.cb{width:37px;height:37px;border-radius:50%;background:rgba(99,163,237,.07);border:1px solid rgba(99,163,237,.25);color:rgba(144,196,255,.78);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.22s;position:relative}
.cb:hover{background:rgba(99,163,237,.18);box-shadow:0 0 14px rgba(99,163,237,.28)}
.cb.on{background:rgba(99,163,237,.2);border-color:var(--blue-l);box-shadow:0 0 16px rgba(99,163,237,.4)}
.cb[data-title]:hover::after{content:attr(data-title);position:absolute;right:44px;top:50%;transform:translateY(-50%);white-space:nowrap;background:rgba(3,2,10,.94);border:1px solid rgba(99,163,237,.28);color:var(--blue-l);font-size:.56rem;padding:4px 9px;border-radius:4px;pointer-events:none}

#time-bar{
  position:absolute;bottom:62px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:auto;
  background:rgba(3,2,10,.84);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.09);border-radius:30px;
  padding:7px 20px;display:none;gap:12px;align-items:center;min-width:340px
}
#time-bar.show{display:flex}
#time-lbl{font-size:.6rem;color:var(--gold);white-space:nowrap;min-width:106px;text-align:center}
#time-range{flex:1;accent-color:var(--blue)}
.tbtn{background:none;border:1px solid rgba(99,163,237,.3);color:var(--blue-l);font-size:.66rem;padding:3px 10px;border-radius:14px;cursor:pointer;transition:.18s;white-space:nowrap}
.tbtn:hover{background:rgba(99,163,237,.14)}

#tip{position:absolute;z-index:50;pointer-events:none;background:rgba(5,3,16,.94);border:1px solid rgba(240,201,106,.25);border-radius:8px;padding:11px 15px;display:none;max-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.7)}
#tip h4{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;color:var(--gold);margin-bottom:5px}
#tip p{font-size:.63rem;color:rgba(255,255,255,.63);line-height:1.72}

#mw{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.74);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;transition:opacity .6s}
#modal{background:rgba(5,3,18,.97);border:1px solid rgba(99,163,237,.3);border-radius:14px;padding:38px 34px;width:92%;max-width:406px;box-shadow:0 48px 96px rgba(0,0,0,.92),0 0 80px rgba(99,163,237,.1),inset 0 0 30px rgba(99,163,237,.03);position:relative}
.ml{font-family:'Ma Shan Zheng',cursive;font-size:2.2rem;color:var(--blue-l);text-align:center;text-shadow:0 0 36px rgba(99,163,237,.55);letter-spacing:.14em}
.ms{font-size:.58rem;color:rgba(255,255,255,.32);text-align:center;letter-spacing:.15em;margin:4px 0 26px}
.fl{font-size:.5rem;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
input[type=text],input[type=number]{width:100%;padding:11px 13px;background:rgba(0,0,0,.56);border:1px solid rgba(99,163,237,.2);color:#fff;border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;outline:none;transition:.25s}
input:focus{border-color:var(--blue-l);background:rgba(99,163,237,.09);box-shadow:0 0 14px rgba(99,163,237,.2)}
input::placeholder{color:rgba(255,255,255,.17)}
#st-hint{font-size:.58rem;color:var(--gold);margin-top:6px;padding:7px 11px;background:rgba(212,168,67,.07);border-left:2px solid var(--gold-d);display:none;border-radius:0 4px 4px 0}
.sbtn{width:100%;padding:15px;margin-top:16px;background:rgba(99,163,237,.1);border:1px solid var(--blue);color:var(--blue-l);border-radius:6px;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;letter-spacing:.3em;cursor:pointer;transition:.3s}
.sbtn:hover{background:var(--blue);color:#000;box-shadow:0 0 32px rgba(99,163,237,.55)}
.demo{text-align:center;margin-top:11px;font-size:.56rem;color:rgba(255,255,255,.28);cursor:pointer;transition:.18s}
.demo:hover{color:var(--blue-l)}

/* CSS2D Labels */
.lbl{pointer-events:none;font-family:'Noto Sans TC',sans-serif}
.lecl{color:#FFD700;font-size:.72rem;font-weight:600;text-shadow:0 0 14px #D4A843,0 0 5px #000}
.leq{color:#90C4FF;font-size:.72rem;font-weight:500;text-shadow:0 0 12px #63A3ED,0 0 5px #000}
.lman{color:rgba(180,255,200,.88);font-size:.61rem;text-shadow:0 0 8px rgba(125,224,154,.5),0 0 3px #000;letter-spacing:0.05em}
.lzod{color:#F0C96A;font-size:.86rem;font-weight:700;text-shadow:0 0 16px #D4A843,0 0 5px #000}
.lpl{display:flex;flex-direction:column;align-items:center;gap:1px}
.lpl-ic{font-family:'Ma Shan Zheng',cursive;font-size:1.52rem;text-shadow:0 0 16px currentColor}
.lpl-nm{font-size:.5rem;opacity:.88;text-shadow:0 0 8px currentColor}
.lax{color:rgba(255,255,255,.65);font-size:.75rem;letter-spacing:.1em;text-shadow:0 0 8px #000; font-weight: bold;}
.lasc{color:var(--red);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--red),0 0 5px #000;letter-spacing:0.05em}
.ldsc{color:var(--blue-l);font-size:.8rem;font-weight:bold;text-shadow:0 0 12px var(--blue-l),0 0 5px #000;letter-spacing:0.05em}
</style>

<body>

<div class="top-left-panel">
  <a href="/" class="btn-back" title="返回主頁">⟨</a>
</div>

<div id="three-canvas"></div>

<!-- 頂部資訊與語言切換 -->
<div id="topbar">
  <div>
    <div id="tb-title" data-i18n="ui.tb_t">星象座標系 · 天球儀</div>
    <div id="tb-sub" data-i18n="ui.tb_s">CELESTIAL SPHERE · 二十八宿 · 黃道十二宮</div>
  </div>
  <div class="tb-right">
    <div id="global-lang-toggle">
      <button class="mlbtn" data-lang="zh-TW" onclick="window.switchLang('zh-TW')">繁</button>
      <button class="mlbtn" data-lang="zh-CN" onclick="window.switchLang('zh-CN')">简</button>
      <button class="mlbtn" data-lang="en" onclick="window.switchLang('en')">EN</button>
      <button class="mlbtn" data-lang="ko" onclick="window.switchLang('ko')">KR</button>
    </div>
    <div id="tb-info" style="display:none">
      <div id="tb-name"></div>
      <div id="tb-date"></div>
      <div id="tb-place"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="mw">
<div id="modal">
  <div class="ml" data-i18n="ui.title">星象座標系</div>
  <div class="ms" data-i18n="ui.sub">立體天球儀 · ASTROLABE · 二十八宿</div>
  <div class="fl" data-i18n="ui.name">命主姓名</div>
  <input type="text" id="f-nm" data-i18n-ph="ui.ph_name">
  <div class="fl" data-i18n="ui.date">出生日期（公曆）</div>
  <div class="r3">
    <input type="number" id="f-y" data-i18n-ph="ui.ph_y" min="1900" max="2100" oninput="hst()">
    <input type="number" id="f-m" data-i18n-ph="ui.ph_m" min="1" max="12" oninput="hst()">
    <input type="number" id="f-d" data-i18n-ph="ui.ph_d" min="1" max="31" oninput="hst()">
  </div>
  <div class="fl" data-i18n="ui.time">出生時間（24小時）</div>
  <div class="r2">
    <input type="number" id="f-h" data-i18n-ph="ui.ph_h" min="0" max="23" oninput="hst()">
    <input type="number" id="f-mi" data-i18n-ph="ui.ph_mi" min="0" max="59" oninput="hst()">
  </div>
  <div class="fl" data-i18n="ui.geo">出生地經緯度與時區</div>
  <div class="r3">
    <input type="number" id="f-lg" data-i18n-ph="ui.ph_lg" step="0.1" value="120" oninput="hst()">
    <input type="number" id="f-lat" data-i18n-ph="ui.ph_lat" step="0.1" value="30" oninput="hst()">
    <input type="number" id="f-tz" data-i18n-ph="ui.ph_tz" step="1" value="8" oninput="hst()">
  </div>
  <div id="st-hint"></div>
  <button class="sbtn" onclick="submitForm()" data-i18n="ui.btn">觀 測 星 象 能 量</button>
  <div class="demo" onclick="loadDemo()" data-i18n="ui.demo">→ 載入演示資料（J2000 · 2000年元旦正午）</div>
</div>
</div>

<!-- SIDE PANELS -->
<div class="side-panel" id="lp" style="display:none">
  <div class="pc">
    <div class="pc-t" data-i18n="ui.p_zod">星象 · 黃道度數</div>
    <div id="plist"></div>
  </div>
  <div class="pc">
    <div class="pc-t" data-i18n="ui.p_sum">命盤分析摘要</div>
    <div id="abody"></div>
  </div>
</div>
<div class="side-panel" id="rp" style="display:none">
  <div class="pc">
    <div class="pc-t" data-i18n="ui.p_asc">黃道十二宮 · 宮位星曜</div>
    <div class="hg" id="hgrid"></div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="li"><div class="ld" style="background:#FFD700"></div><span data-i18n="ui.p_zod">黃道星座</span></div>
  <div class="li"><div class="ld" style="background:#63A3ED"></div><span data-i18n="ui.eq">赤道</span></div>
  <div class="li"><div class="ld" style="background:#7DE09A"></div><span data-i18n="ui.c_man">二十八宿</span></div>
  <div class="li"><div class="ld" style="background:#FF6B6B"></div><span data-i18n="ui.p_asc">ASC/十二宮</span></div>
  <div class="li"><div class="ld" style="background:#FF5500"></div><span data-i18n="ui.p_pl">星體</span></div>
</div>

<!-- CTRL BAR -->
<div id="ctrl-bar">
  <!-- 🟢 沉浸星空按鈕 -->
  <button class="cb" id="cb-zen" data-title="沉浸星空" data-i18n-title="ui.c_zen" style="font-size:0.9rem;">🌌</button>
  <button class="cb" id="cb-spin" data-title="自動旋轉" data-i18n-title="ui.c_spin">⟳</button>
  <button class="cb" id="cb-sys" data-title="切換回歸/恆星黃道" data-i18n-title="ui.c_sys" style="font-size:0.75rem;" data-i18n="ui.sys_t">歸</button>
  <button class="cb" id="cb-out" data-title="三王星 (天海冥)" data-i18n-title="ui.c_out" style="font-size:0.75rem;" data-i18n="ui.out_b">王</button>
  <button class="cb on" id="cb-ecl" data-title="黃道環" data-i18n-title="ui.c_ecl" style="color:#FFD700">◉</button>
  <button class="cb on" id="cb-eq"  data-title="赤道環" data-i18n-title="ui.c_eq">⊕</button>
  <button class="cb on" id="cb-man" data-title="二十八宿" data-i18n-title="ui.c_man" data-i18n="ui.s_man">宿</button>
  <button class="cb on" id="cb-pl"  data-title="星體顯示" data-i18n-title="ui.c_pl" data-i18n="ui.s_pl">政</button>
  <button class="cb"    id="cb-asp" data-title="相位連線" data-i18n-title="ui.c_asp">⋆</button>
  <button class="cb"    id="cb-tm"  data-title="時間推移" data-i18n-title="ui.c_tm">⏱</button>
  <button class="cb"    id="cb-tr"  data-title="行星軌跡" data-i18n-title="ui.c_tr">〜</button>
</div>

<!-- TIME BAR -->
<div id="time-bar">
  <button class="tbtn" id="tb-play" data-i18n="ui.t_play">▶ 播放</button>
  <input type="range" id="time-range" min="-3650" max="3650" value="0" step="1">
  <div id="time-lbl" data-i18n="ui.t_curr">當前時間</div>
  <button class="tbtn" onclick="resetTime()" data-i18n="ui.t_reset">重置</button>
</div>
<div id="tip"><h4 id="tip-h"></h4><p id="tip-p"></p></div>

  });
  
  const bSys = document.getElementById('cb-sys');
  bSys.textContent = isSidereal ? d.ui.sys_s : d.ui.sys_t;

  if(userData.jd) updatePositions();
};

// ══════════════════════════
//  ASTRONOMY ENGINE (VSOP87 Geo-centric)
// ══════════════════════════
const DEG=Math.PI/180, R2D=180/Math.PI;
const norm=d=>((d%360)+360)%360;

function jdn(y,m,d,h=12,mn=0){
  if(m<=2){y--;m+=12}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5+(h+mn/60)/24;
}
function T_jd(jd){return(jd-2451545.0)/36525}

function solveKepler(M, e) {
    let E = M;
    let F, dE;
    for (let i = 0; i < 10; i++) {
        F = E - e * Math.sin(E) - M;
        dE = F / (1 - e * Math.cos(E));
        E -= dE;
        if (Math.abs(dE) < 1e-6) break;
    }
    return E;
}

const PE = {
    sun:     {L:280.460, a:1.0000, e:0.0167, i:0.0000, w:282.940, Node:0.0, n:0.9856091},
    mercury: {L:252.250, a:0.3871, e:0.2056, i:7.0049, w:77.456,  Node:48.331, n:4.0923173},
    venus:   {L:181.979, a:0.7233, e:0.0068, i:3.3947, w:131.533, Node:76.680, n:1.6021302},
    mars:    {L:355.453, a:1.5237, e:0.0934, i:1.8506, w:336.040, Node:49.557, n:0.5240208},
    jupiter: {L:34.404,  a:5.2026, e:0.0485, i:1.3030, w:14.754,  Node:100.454,n:0.0830853},
    saturn:  {L:50.077,  a:9.5371, e:0.0555, i:2.4845, w:92.432,  Node:113.663,n:0.0334442},
    uranus:  {L:313.232, a:19.189, e:0.0463, i:0.7733, w:170.964, Node:74.006, n:0.0117258},
    neptune: {L:304.880, a:30.070, e:0.0090, i:1.7700, w:44.971,  Node:131.784,n:0.0059951},
    pluto:   {L:238.929, a:39.482, e:0.2488, i:17.140, w:224.067, Node:110.303,n:0.0039648}
};

function getHeliocentric(id, d) {
    const p = PE[id];
    let M = norm(p.L + p.n * d - p.w);
    let E = solveKepler(M * DEG, p.e);
    let xv = p.a * (Math.cos(E) - p.e);
    let yv = p.a * (Math.sqrt(1 - p.e * p.e) * Math.sin(E));
    let v = Math.atan2(yv, xv) * R2D;
    let r = Math.sqrt(xv * xv + yv * yv);
    let l_heliocentric = norm(v + p.w);
    return { l: l_heliocentric, r: r };
}

function calcAll(T, jd, lng, lat, isSid) {
    const d = jd - 2451545.0; 
    let res = {};

    const earth = getHeliocentric('sun', d); 
    const sunGeo = norm(earth.l); 
    res.sun = sunGeo;
    const xe = earth.r * Math.cos((sunGeo + 180) * DEG);
    const ye = earth.r * Math.sin((sunGeo + 180) * DEG);

    const D = norm(297.85036 + 12.190749 * d); 
    const M = norm(357.52772 + 0.985600 * d);  
    const Mp = norm(134.96298 + 13.064992 * d); 
    const F = norm(93.27191 + 13.229350 * d);  
    res.moon = norm(218.3165 + 13.176396 * d 
        + 6.289 * Math.sin(Mp*DEG) 
        + 1.274 * Math.sin((2*D-Mp)*DEG) 
        + 0.658 * Math.sin(2*D*DEG)
        + 0.214 * Math.sin(2*Mp*DEG)
        - 0.186 * Math.sin(M*DEG)
        - 0.114 * Math.sin(2*F*DEG)
    );

    const planets = ['mercury', 'venus', 'mars', 'jupiter', 'saturn', 'uranus', 'neptune', 'pluto'];
    planets.forEach(id => {
        let helio = getHeliocentric(id, d);
        let xp = helio.r * Math.cos(helio.l * DEG);
        let yp = helio.r * Math.sin(helio.l * DEG);
        
        let xg = xp - xe;
        let yg = yp - ye;
        res[id] = norm(Math.atan2(yg, xg) * R2D);
    });

    const ascNode = norm(125.04452 - 0.0529538 * d);
    res.ketu = ascNode; 
    res.rahu = norm(ascNode + 180); 
    
    res.yapo = norm(83.3532 + 0.11140 * d);
    res.ziqi = norm(res.yapo + 90);

    const gmst = 280.46061837 + 360.98564736629 * d + 0.000387933 * T * T;
    const lst = norm(gmst + lng) * DEG;
    const obliq = (23.4392911 - 0.0130042 * T) * DEG; 
    const lat_rad = lat * DEG;
    const asc_rad = Math.atan2(Math.cos(lst), -(Math.sin(lst)*Math.cos(obliq) + Math.tan(lat_rad)*Math.sin(obliq)));
    res.asc = norm(asc_rad * R2D);
    res.dsc = norm(res.asc + 180);

    if (isSid) {
        const aya = 24.03 + d * (50.29/36525);
        for(let k in res) res[k] = norm(res[k] - aya);
    }
    
    return res;
}

function applyST(h,mn,c){let m=mn+c;while(m>=60){h++;m-=60}while(m<0){h--;m+=60}return{h:((h%24)+24)%24,m:((m%60)+60)%60}}

const klass_w=[12,9,15,5,5,18,11, 26,8,12,10,17,16,9, 16,12,14,11,16,2,9, 33,4,15,7,18,18,17];
const MANS=[];
let _acc = 180; 
for(let i=0; i<28; i++){
  let w = klass_w[i] * 360 / 365; 
  MANS.push({ id: i, s: _acc, w: w });
  _acc += w;
}

function getMansion(lon, isSid, jd){
  let sidLon = lon;
  if (!isSid && jd) {
    const d = jd - 2451545.0;
    const aya = 24.03 + d * (50.29/36525);
    sidLon = norm(lon - aya);
  }
  for(const m of MANS){
    let s = m.s % 360;
    let e = (m.s + m.w) % 360;
    if(s < e) {
      if(sidLon >= s && sidLon < e) return LANGS[currLang].man[m.id];
    } else {
      if(sidLon >= s || sidLon < e) return LANGS[currLang].man[m.id];
    }
  }
  return LANGS[currLang].man[0];
}

  const lines=[];
  const sz=zodiac(lons.sun), mz=zodiac(lons.moon), az=zodiac(lons.asc);
  const mm=getMansion(lons.moon, isSid, jd);
  const elong=norm(lons.moon-lons.sun);
  const phase=elong<45?d.al.p1:elong<135?d.al.p2:elong<225?d.al.p3:elong<315?d.al.p4:d.al.p5;
  lines.push(`<span class="at">${d.ui.asc}</span>${d.al.asc} <span class="av">${az.s} ${az.d}°</span>`);
  lines.push(`<span class="at">${d.pl.sun}</span>${d.al.sun} <span class="av">${sz.s} ${sz.d}°</span>`);

function placePlanets(lons){
  const R=32;
  PCONF.forEach(pc=>{
    // 🔴 核心修復：無論是否隱藏，都必須先計算並設置正確的三維座標
    const lon=lons[pc.id];
    if(lon!==undefined){
      const a=lon*DEG, x=Math.cos(a)*R, y=Math.sin(a)*R;
      if(pMesh[pc.id])pMesh[pc.id].position.set(x,y,0);
      if(pLbl[pc.id])pLbl[pc.id].position.set(x,y,0);
    }
    
    const isVis = (!pc.isOut || showOut);
    if(pMesh[pc.id]) pMesh[pc.id].visible = isVis;
    if(pLbl[pc.id]) pLbl[pc.id].element.style.display = isVis ? 'flex' : 'none';
    
    if(!isVis) {
      if(trails[pc.id] && trails[pc.id].line) trails[pc.id].line.visible = false;
      return; 
    }
      
    if(lon!==undefined && showTrails&&trails[pc.id]){
      const a=lon*DEG, x=Math.cos(a)*R, y=Math.sin(a)*R;
      const t=trails[pc.id];const i=t.ptr*3;
      t.buf[i]=x;t.buf[i+1]=y;t.buf[i+2]=0;
      t.ptr=(t.ptr+1)%TRAIL_N;
      if(!t.ptr)t.full=true;
      t.geo.attributes.position.needsUpdate=true;
      t.geo.setDrawRange(0,t.full?TRAIL_N:t.ptr);
    }
  });
  if(showAsp)buildAspects(lons);else aspG.clear();

  while(houseG.children.length > 0){
    const c = houseG.children[0];
    if(c.isCSS2DObject && c.element) c.element.remove();
    houseG.remove(c);
  }
  
  const asc = lons.asc;
  for(let i=0; i<12; i++){
    const a = norm(asc + i*30) * DEG;
    const isAngle = (i===0 || i===6);
    const col = i===0 ? 0xFF4444 : (i===6 ? 0x4488FF : 0xFFFFFF);
    const op = isAngle ? 0.8 : 0.15;
    const R_in = 20, R_out = isAngle ? 38 : 31;
    
    houseG.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(Math.cos(a)*R_in, Math.sin(a)*R_in, 0),
        new THREE.Vector3(Math.cos(a)*R_out, Math.sin(a)*R_out, 0)
      ]),
      new THREE.LineBasicMaterial({color: col, transparent: true, opacity: op, linewidth: isAngle? 2 : 1})
    ));
    
    // 🔴 核心修復：強制使用英文簡稱 ASC/DSC + 動態數字宮位
    if(i===0) lbl2D(houseG, 'lasc', R_out+2, a, 'raw', 'ASC');
    else if(i===6) lbl2D(houseG, 'ldsc', R_out+2, a, 'raw', 'DSC');
    else lbl2D(houseG, 'lax', R_out+1.5, a, 'raw', i + 1); 
  }
}

const ASP_A=[0,60,90,120,150,180];
const ASP_C=[0xFFFF00,0x44FF88,0xFF4444,0x44AAFF,0xFF8844,0xFF4444];

function buildAspects(lons){
  aspG.clear();const R=32;
  const base_asp = ['sun','moon','mercury','venus','mars','jupiter','saturn'];
  if(showOut) base_asp.push('uranus','neptune','pluto'); 
  
  for(let i=0;i<base_asp.length;i++)for(let j=i+1;j<base_asp.length;j++){
    const diff=Math.min(norm(lons[base_asp[i]]-lons[base_asp[j]]),
                        norm(lons[base_asp[j]]-lons[base_asp[i]]));
    for(let k=0;k<ASP_A.length;k++){
      if(Math.abs(diff-ASP_A[k])<8){
        const a1=lons[base_asp[i]]*DEG,a2=lons[base_asp[j]]*DEG;
        aspG.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(Math.cos(a1)*R,Math.sin(a1)*R,0),
            new THREE.Vector3(Math.cos(a2)*R,Math.sin(a2)*R,0)]),
          new THREE.LineBasicMaterial({color:ASP_C[k],transparent:true,opacity:.2})));
        break;
      }
    }
  }
}

function updatePositions() {
  if(!userData.jd) return;
  const off = parseInt(document.getElementById('time-range').value) || 0;
  const targetJD = userData.jd + off;
  const T = T_jd(targetJD);
  
  curLons = calcAll(T, targetJD, userData.lng, userData.lat, isSidereal);
  placePlanets(curLons);
  
  const aya = 24.03 + (targetJD - 2451545.0)/365.25 * (50.29/3600);
  manG.rotation.z = isSidereal ? 0 : aya * DEG;

  renderPlanetList(curLons, isSidereal, targetJD);
  renderHouseGrid(curLons);
  renderAnalysis(curLons, isSidereal, targetJD);
  
  document.getElementById('tb-place').textContent=`lng ${userData.lng.toFixed(1)}° · lat ${userData.lat.toFixed(1)}° · ${isSidereal?LANGS[currLang].al.sid:LANGS[currLang].al.trop}`;
}

function launch(){
  updatePositions();
  document.getElementById('tb-name').textContent=userData.name;
  document.getElementById('tb-date').textContent=`${userData.y}.${String(userData.m).padStart(2,'0')}.${String(userData.d).padStart(2,'0')} ${String(userData.h).padStart(2,'0')}:${String(userData.mn).padStart(2,'0')}`;
  document.getElementById('tb-info').style.display='block';
  document.getElementById('lp').style.display='flex';
  document.getElementById('rp').style.display='flex';
  const mw=document.getElementById('mw');
  if(mw.style.display !== 'none') {
    mw.style.transition='opacity .7s';mw.style.opacity='0';
    setTimeout(()=>mw.style.display='none',700);
    OCtrl.autoRotate=true;setTimeout(()=>OCtrl.autoRotate=false,5500);
  }
}

// ══════════════════════════
//  TIME SCRUBBER
// ══════════════════════════
const tRange=document.getElementById('time-range');
const tLbl=document.getElementById('time-lbl');

tRange.addEventListener('input',()=>{
  if(!userData.jd)return;
  updatePositions();
  const off=parseInt(tRange.value);
  const bd=new Date(Date.UTC(userData.y,userData.m-1,userData.d));
  bd.setUTCDate(bd.getUTCDate()+off);
  tLbl.textContent=`${bd.getUTCFullYear()}.${String(bd.getUTCMonth()+1).padStart(2,'0')}.${String(bd.getUTCDate()).padStart(2,'0')}`;
});

const tbPlay=document.getElementById('tb-play');
tbPlay.addEventListener('click',function(){
  if(playingTime){clearInterval(playInterval);playingTime=false;this.textContent=LANGS[currLang].ui.t_play;return}
  playingTime=true;this.textContent=LANGS[currLang].ui.t_pause;
  playInterval=setInterval(()=>{
    const v=Math.min(parseInt(tRange.value)+3,3650);
    tRange.value=v;tRange.dispatchEvent(new Event('input'));
    if(v>=3650){clearInterval(playInterval);playingTime=false;tbPlay.textContent=LANGS[currLang].ui.t_play}
  },55);
});

window.resetTime=function(){
  clearInterval(playInterval);playingTime=false;tbPlay.textContent=LANGS[currLang].ui.t_play;
  tRange.value=0;tRange.dispatchEvent(new Event('input'));tLbl.textContent=LANGS[currLang].ui.t_curr;
};

// ══════════════════════════
//  CONTROLS
// ══════════════════════════
function tog(id,on,off,init){
  let s=init??true;const b=document.getElementById(id);
  b.classList.toggle('on',s);
  b.addEventListener('click',()=>{s=!s;b.classList.toggle('on',s);s?on():off()});
}
// 🟢 沉浸星空模式
tog('cb-zen', 
    () => { document.body.classList.add('zen-mode'); }, 
    () => { document.body.classList.remove('zen-mode'); }, 
    false
);

tog('cb-spin',()=>OCtrl.autoRotate=true, ()=>OCtrl.autoRotate=false,false);
tog('cb-ecl', ()=>eclG.visible=true,     ()=>eclG.visible=false);
tog('cb-eq',  ()=>eqG.visible=true,      ()=>eqG.visible=false);
tog('cb-man', ()=>manG.visible=true,     ()=>manG.visible=false);
tog('cb-pl',  ()=>plG.visible=true,      ()=>plG.visible=false);
tog('cb-asp', ()=>{showAsp=true;buildAspects(curLons)}, ()=>{showAsp=false;aspG.clear()},false);
tog('cb-tm',  ()=>document.getElementById('time-bar').classList.add('show'),
               ()=>{document.getElementById('time-bar').classList.remove('show');resetTime()},false);
tog('cb-tr',  ()=>{showTrails=true;Object.values(trails).forEach(t=>t.line.visible=true)},
               ()=>{showTrails=false;Object.values(trails).forEach(t=>{
                 t.line.visible=false;t.ptr=0;t.full=false;t.buf.fill(0);
                 t.geo.attributes.position.needsUpdate=true;t.geo.setDrawRange(0,0)})},false);

const bSys = document.getElementById('cb-sys');
tog('cb-sys', 
    () => { isSidereal=true; bSys.classList.add('on'); if(userData.jd) updatePositions(); }, 
    () => { isSidereal=false; bSys.classList.remove('on'); if(userData.jd) updatePositions(); }, 
    false
);

const bOut = document.getElementById('cb-out');
tog('cb-out', 
    () => { showOut=true; bOut.classList.add('on'); if(userData.jd) updatePositions(); }, 
    () => { showOut=false; bOut.classList.remove('on'); if(userData.jd) updatePositions(); }, 
    false
);

// ══════════════════════════
//  METEORS
// ══════════════════════════
const meteors=[];
function spawnMeteor(){
  if(meteors.length>5)return;
  const th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI*.55;
  const r=88+Math.random()*35;
  const pos=new THREE.Vector3(Math.sin(ph)*Math.cos(th)*r,Math.cos(ph)*r,Math.sin(ph)*Math.sin(th)*r);
  const dir=pos.clone().normalize().negate().multiplyScalar(.38+Math.random()*.28);
  const len=9+Math.random()*14;
  const pts=[pos.clone(),pos.clone().add(dir.clone().multiplyScalar(len))];
  const line=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xFFFFFF,transparent:true,opacity:.88}));
  scene.add(line);
  meteors.push({line,vel:dir,life:0,maxLife:1.4+Math.random()});
}
setInterval(spawnMeteor,2400);

// ══════════════════════════
//  ANIMATION
// ══════════════════════════
const clock=new THREE.Clock();let fc=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();fc++;
  OCtrl.update();
  earthG.rotation.y+=dt*.12;
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];m.life+=dt;
    m.line.material.opacity=Math.max(0,(1-m.life/m.maxLife)*.9);
    const p=m.line.geometry.attributes.position;
    for(let k=0;k<2;k++){p.array[k*3]+=m.vel.x;p.array[k*3+1]+=m.vel.y;p.array[k*3+2]+=m.vel.z}
    p.needsUpdate=true;
    if(m.life>m.maxLife){scene.remove(m.line);m.line.geometry.dispose();meteors.splice(i,1)}
  }
  composer.render(dt);
  lblR.render(scene,camera);
}

// 啟動翻譯
window.switchLang(currLang);
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  bloom.setSize(innerWidth,innerHeight);
  lblR.setSize(innerWidth,innerHeight);
});
