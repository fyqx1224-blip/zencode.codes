<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destiny Archives · 星命典藏</title>

  <style>
    :root {
      /* 深渊星空底色：不是死黑，而是带有极深蓝紫倾向的宇宙黑 */
      --bg-deep: #030407; 
      --bg-center: #0b0e17;
      
      /* 高级霓虹五行色系：提高饱和度，降低一点明度以压住辉光 */
      --wood: #34D399;  
      --fire: #FB7185;  
      --earth: #FBBF24; 
      --metal: #E2E8F0; 
      --water: #38BDF8; 
      --sun: #F59E0B;   
      --moon: #BAE6FD;  
      
      --axis-asc: #FB7185;
      --axis-dsc: #38BDF8;
      --axis-mc:  #34D399;
      --axis-ic:  #FBBF24;

      /* 典藏暗金：拉开明暗层次 */
      --gold: #D4AF37; /* 经典真金色 */
      --gold-light: #FCE69A; /* 高光金 */
      --gold-dim: rgba(212, 175, 55, 0.45); 
      --gold-faint: rgba(212, 175, 55, 0.12); 
      
      --text-main: #E2E8F0;
      --text-muted: #64748B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      /* 高级感核心：极具深度的径向背景，托起全息发光线条 */
      background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-deep) 75%),
                  url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27400%27 height=%27400%27 viewBox=%270 0 800 800%27%3E%3Cg fill-opacity=%270.06%27%3E%3Ccircle fill=%27%23ffffff%27 cx=%27100%27 cy=%27100%27 r=%271.5%27/%3E%3Ccircle fill=%27%23D4AF37%27 cx=%27600%27 cy=%27200%27 r=%271%27/%3E%3Ccircle fill=%27%2334D399%27 cx=%27300%27 cy=%27600%27 r=%271.5%27/%3E%3Ccircle fill=%27%23FB7185%27 cx=%27700%27 cy=%27400%27 r=%272%27/%3E%3C/g%3E%3C/svg%3E');
      color: var(--text-main); font-family: 'Noto Serif SC', serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; padding: 10px; 
    }

    header { text-align: center; margin-bottom: 5px; z-index: 10; }
    /* 标题采用多层发光，模拟金属反光 */
    .title-main { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold-light); letter-spacing: 0.3em; text-shadow: 0 0 8px rgba(212,175,55,0.6), 0 0 1px #fff; }
    
    .control-panel { background: rgba(5,6,10,0.7); border: 1px solid var(--gold-faint); border-radius: 8px; padding: 10px 15px; width: 100%; max-width: 950px; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); backdrop-filter: blur(12px); display: flex; flex-direction: column; gap: 10px; z-index: 20; position: relative; }
    /* 控制面板顶部的高光修饰线 */
    .control-panel::before { content: ''; position: absolute; top: 0; left: 10%; width: 80%; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }

    .input-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .field { display: flex; align-items: center; gap: 6px; }
    .field label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; white-space: nowrap; }
    .field input { background: rgba(0,0,0,0.5); border: 1px solid var(--gold-faint); color: var(--gold-light); padding: 5px 8px; border-radius: 4px; font-family: inherit; font-size: 11px; outline: none; transition: 0.3s; width: 100px; }
    .field input:focus { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.25); }
    
    .toolbar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .btn-toggle { background: rgba(0,0,0,0.3); border: 1px solid var(--gold-faint); color: var(--text-muted); padding: 5px 12px; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 4px; }
    .btn-toggle:hover { border-color: var(--gold-dim); color: var(--gold-light); box-shadow: 0 0 8px rgba(212,175,55,0.15); }
    .btn-toggle.active { border-color: var(--gold); color: #000; background: linear-gradient(135deg, var(--gold), #B8860B); box-shadow: 0 0 15px rgba(212,175,55,0.35); font-weight: 600; text-shadow: none; }
    .btn-toggle.warn-active { border-color: var(--fire); color: #000; background: linear-gradient(135deg, var(--fire), #E11D48); box-shadow: 0 0 15px rgba(251,113,133,0.35); }
    
    .chart-wrapper { position: relative; width: 100%; height: 100%; max-height: 85vh; display: flex; justify-content: center; align-items: center; flex-grow: 1; perspective: 1000px; }
    
    svg { width: 100%; height: 100%; max-width: 960px; overflow: visible; }
    
    /* 精确控制的发光层：外层漫射 + 内层锐利高光 */
    .glow-soft { filter: drop-shadow(0 0 3px currentColor); }
    .glow-strong { filter: drop-shadow(0 0 5px currentColor) drop-shadow(0 0 10px currentColor); }
    
    @keyframes flowLight { to { stroke-dashoffset: -40; } }
    .flow-applying { stroke-dasharray: 4 6; animation: flowLight 1s linear infinite; }
    .flow-separating { stroke-dasharray: 2 6; animation: flowLight 2.5s linear infinite reverse; }
    
    .tooltip { position: absolute; background: rgba(5,6,10,0.95); border: 1px solid var(--gold-dim); padding: 12px; font-size: 11px; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 30; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.9), inset 0 0 15px rgba(212,175,55,0.05); line-height: 1.8; backdrop-filter: blur(4px); }
    .tooltip strong { color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 14px; display: block; margin-bottom: 4px; border-bottom: 1px solid var(--gold-faint); padding-bottom: 4px; text-shadow: 0 0 5px rgba(212,175,55,0.5); }
    .tooltip .sub { color: var(--text-main); opacity: 0.8; }
    
    .planet-node { cursor: pointer; transition: transform 0.2s ease; }
    /* 悬浮时爆发出星体能量感：底层纯黑隔离线段，中层色彩漫射，表层纯白高光 */
    .planet-node:hover text { 
        animation: pulseText 1.5s infinite; 
        text-shadow: 0 0 15px currentColor, 0 0 25px currentColor, 0 0 2px #fff; 
        font-weight: 700; 
        transform-origin: center; 
    }
    @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  </style>

const R2D = 180 / Math.PI;

let STATE = { mode: 'natal', aspects: true, firdaria: true, zAxis: true, nodeSwap: false, J: 0, returnJ: 0 };

function jdn(y, m, d, h) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + h / 24 + B - 1524.5;
}

function solveKepler(M, e) {
  let E = M;
  for (let i = 0; i < 10; i++) {
    const dE = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-6) break;
  }
  return E;
}

function getHelio(id, d) {
  const p = PE[id];
  const M = norm(p.L + p.n * d - p.w);
  const E = solveKepler(M * DEG, p.e);
  const xv = p.a * (Math.cos(E) - p.e), yv = p.a * Math.sqrt(1 - p.e * p.e) * Math.sin(E);
  const l_j2000 = Math.atan2(yv, xv) * R2D + p.w;
  const precession = 3.82394E-5 * d;
  const l = norm(l_j2000 + precession);
  const lat = p.i * Math.sin((l_j2000 - p.Node) * DEG);
  return { l, r: Math.sqrt(xv * xv + yv * yv), lat };
}

function calcPlanets(J) {
  const d = J - 2451545.0;
  const pos = {};
  
  const L_sun = norm(280.460 + 0.9856474 * d);
  const g_sun = norm(357.528 + 0.9856003 * d);
  pos.sun = { lon: norm(L_sun + 1.915 * Math.sin(g_sun * DEG) + 0.020 * Math.sin(2 * g_sun * DEG)), lat: 0 };
  
  const xe = Math.cos(norm(pos.sun.lon + 180) * DEG), ye = Math.sin(norm(pos.sun.lon + 180) * DEG);
  
  const D = norm(297.850 + 12.1907 * d), M = norm(357.527 + 0.9856 * d);
  const Mp = norm(134.962 + 13.0649 * d);
  const moonLon = norm(218.316 + 13.176396 * d + 6.289 * Math.sin(Mp * DEG) + 1.274 * Math.sin((2*D - Mp) * DEG));
  
  const ascNode = norm(125.044 - 0.05295 * d);
  const descNode = norm(ascNode + 180);
  
  pos.moon = { lon: moonLon, lat: 5.14 * Math.sin((moonLon - ascNode)*DEG) };
  
  ['mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto'].forEach(id => {
    const h = getHelio(id, d);
    const rProj = h.r * Math.cos(h.lat * DEG);
    const X = rProj * Math.cos(h.l * DEG) - xe, Y = rProj * Math.sin(h.l * DEG) - ye;
    const z = h.r * Math.sin(h.lat * DEG);
    pos[id] = { lon: norm(Math.atan2(Y, X) * R2D), lat: Math.atan2(z, Math.sqrt(X*X + Y*Y)) * R2D };
  });
  
  if (STATE.nodeSwap) {
    pos.luohu = { lon: descNode, lat: 0 }; 
    pos.jidu  = { lon: ascNode,  lat: 0 }; 
  } else {
    pos.luohu = { lon: ascNode,  lat: 0 }; 
    pos.jidu  = { lon: descNode, lat: 0 }; 
  }
  
  pos.lilith = { lon: norm(83.353 + 0.111 * d + 180), lat: -5.14 * Math.cos((moonLon - ascNode)*DEG) };
  pos.ziqi = { lon: norm(359.5 + 0.018 * d), lat: 0 };
  
  return pos;
}

function calcAngles(J, lat, lon) {
  const d = J - 2451545.0;
  const LST = norm(280.46 + 360.985647 * d + lon);
  const eps = (23.439 - 0.0000004 * d) * DEG;
  const rmc = LST * DEG, tL = Math.tan(lat * DEG);
  const asc = norm(Math.atan2(Math.cos(rmc), -(Math.sin(rmc) * Math.cos(eps) + tL * Math.sin(eps))) / DEG);
  const mc = norm(Math.atan2(Math.sin(rmc), Math.cos(rmc) * Math.cos(eps)) / DEG);
  return { asc, mc, dsc: norm(asc + 180), ic: norm(mc + 180) };
}

function resolveTextCollisions(plData, asc) {
  let list = Object.keys(plData).map(k => ({
    id: k, data: plData[k], rawAng: l2a(plData[k].lon, asc), drawAng: l2a(plData[k].lon, asc)
  }));
  list.sort((a, b) => a.rawAng - b.rawAng);
  for(let iter=0; iter<5; iter++) {
    for(let i=0; i<list.length; i++) {
      let nxt = (i+1)%list.length;
      let diff = list[nxt].drawAng - list[i].drawAng;
      if (diff < 0) diff += 360;
      if (diff < 6 && Math.abs(list[i].data.lat - list[nxt].data.lat) < 1.5) { 
        list[i].drawAng = norm(list[i].drawAng - 1.5);
        list[nxt].drawAng = norm(list[nxt].drawAng + 1.5);
      }
    }
    list.sort((a, b) => a.drawAng - b.drawAng);
  }
  return list;
}

const CX = 480, CY = 480;
const R_FIR_OUT = 450, R_FIR_MID = 425, R_FIR_IN = 405; 
const R_ZOD_OUT = 370, R_ZOD_IN = 320;                  
const R_BR_IN   = 290;

const R_RET_PL  = 200, R_NAT_PL = 150;                  
const R_HOUSE   = 100;

function polar(r, angle) { const a = (angle - 90) * DEG; return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) }; }
function l2a(lon, asc) { return norm(asc - lon + 270); }

function drawArc(rIn, rOut, aStart, aEnd, fill, stroke, width=0.5) {
  const p1 = polar(rIn, aStart), p2 = polar(rOut, aStart);
  const p3 = polar(rOut, aEnd), p4 = polar(rIn, aEnd);
  const large = (aEnd - aStart + 360) % 360 > 180 ? 1 : 0;
  return `<path d="M${p1.x},${p1.y} L${p2.x},${p2.y} A${rOut},${rOut},0,${large},1,${p3.x},${p3.y} L${p4.x},${p4.y} A${rIn},${rIn},0,${large},0,${p1.x},${p1.y}" fill="${fill}" stroke="${stroke}" stroke-width="${width}"/>`;
}

function getAspectState(p1, p2, l1, l2, targetAngle) {
  const s1 = PLANET_CFG[p1].speed, s2 = PLANET_CFG[p2].speed;
  let diff = Math.abs(l1 - l2); if (diff > 180) diff = 360 - diff;
  let nextL1 = norm(l1 + s1), nextL2 = norm(l2 + s2);
  let nextDiff = Math.abs(nextL1 - nextL2); if (nextDiff > 180) nextDiff = 360 - nextDiff;
  const currOrb = Math.abs(diff - targetAngle);
  const nextOrb = Math.abs(nextDiff - targetAngle);
  if (currOrb < 0.5) return 'exact';
  return nextOrb < currOrb ? 'applying' : 'separating';
}

function renderChart() {
  const [y, m, d] = document.getElementById('inp-date').value.split('-').map(Number);
  const [h, mi] = document.getElementById('inp-time').value.split(':').map(Number);
  const lon = +document.getElementById('inp-lon').value;
  const lat = +document.getElementById('inp-lat').value;
  
  STATE.J = jdn(y, m, d, (h + mi/60) - 8);
  const plNatal = calcPlanets(STATE.J);
  const angles = calcAngles(STATE.J, lat, lon);
  const asc = angles.asc;
  
  if (STATE.mode !== 'natal') {
    const returnYr = +document.getElementById('inp-return').value;
    STATE.returnJ = STATE.J + (returnYr - y) * 365.2422; 
  }
  const plReturn = STATE.mode !== 'natal' ? calcPlanets(STATE.returnJ) : null;

  // 基础底环，加深虚线
  let svgBgRings = `<circle cx="${CX}" cy="${CY}" r="${R_FIR_OUT}" fill="none" stroke="var(--gold-faint)" stroke-width="1.5" opacity="0.6"/>`;
  let svgAspects = '';
  let svgPlanets = '';
  let svgAxes = '';

  if (STATE.firdaria) {
    const isDay = (h >= 6 && h < 18);
    const seq = isDay ? FIRDARIA_DAY : FIRDARIA_NIGHT;
    const currentAge = (Date.now() / 86400000 + 2440587.5 - STATE.J) / 365.2422;
    let currAngle = 0;
    
    seq.forEach((per, idx) => {
      const sweep = (per.y / 75) * 360;
      const endAngle = currAngle + sweep;
      const a1 = norm(270 - endAngle), a2 = norm(270 - currAngle); 
      
      const isActiveMajor = currentAge >= currAngle*75/360 && currentAge < endAngle*75/360;
      const fill = isActiveMajor ? 'rgba(212,175,55,0.08)' : 'transparent';
      const stroke = isActiveMajor ? 'var(--gold)' : 'var(--gold-faint)';
      
      svgBgRings += drawArc(R_FIR_MID, R_FIR_OUT, a1, a2, fill, stroke);
      const midMaj = polar((R_FIR_MID + R_FIR_OUT)/2, (a1 + a2)/2);
      // 星限高光
      svgBgRings += `<text x="${midMaj.x}" y="${midMaj.y}" text-anchor="middle" dominant-baseline="central" font-size="16" class="${isActiveMajor?'glow-soft':''}" fill="${isActiveMajor ? 'var(--gold-light)' : 'var(--text-muted)'}" style="${isActiveMajor ? 'text-shadow: 0 0 8px var(--gold);' : ''}">${PLANET_CFG[per.p].sym}</text>`;
      
      const minorSweep = sweep / 7;
      for(let i=0; i<7; i++) {
        const minorPlanet = seq[(idx + i) % seq.length].p;
        const mStart = currAngle + i * minorSweep;
        const mEnd = currAngle + (i + 1) * minorSweep;
        const m_a1 = norm(270 - mEnd), m_a2 = norm(270 - mStart);
        
        const isActiveMinor = currentAge >= mStart*75/360 && currentAge < mEnd*75/360;
        const minorFill = isActiveMinor ? 'var(--gold)' : 'transparent';
        const minorColor = isActiveMinor ? '#000' : 'var(--text-muted)';
        
        svgBgRings += drawArc(R_FIR_IN, R_FIR_MID, m_a1, m_a2, minorFill, stroke, 0.5);
        const midMin = polar((R_FIR_IN + R_FIR_MID)/2, (m_a1 + m_a2)/2);
        svgBgRings += `<text x="${midMin.x}" y="${midMin.y}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="${minorColor}">${PLANET_CFG[minorPlanet].sym}</text>`;
      }
      currAngle += sweep;
    });
  }

  for (let i = 0; i < 12; i++) {
    const a1 = l2a(i * 30, asc), a2 = l2a((i + 1) * 30, asc);
    const mid = l2a(i * 30 + 15, asc);
    svgBgRings += drawArc(R_ZOD_IN, R_ZOD_OUT, a2, a1, i%2 ? 'rgba(255,255,255,0.02)' : 'transparent', 'var(--gold-dim)');
    const smZod = polar((R_ZOD_IN + R_ZOD_OUT)/2, mid);
    // 星座发光线条
    svgBgRings += `<g transform="translate(${smZod.x}, ${smZod.y}) scale(1.6)">
              <path d="${ZODIAC_PATHS[i]}" fill="none" stroke="var(--gold-light)" stroke-width="1" class="glow-soft" stroke-linecap="round" stroke-linejoin="round"/>
            </g>`;
    svgBgRings += drawArc(R_BR_IN, R_ZOD_IN, a2, a1, 'transparent', 'var(--gold-faint)');
    const smBr = polar((R_BR_IN + R_ZOD_IN)/2, mid);
    const brData = BRANCHES[i];
    svgBgRings += `<text x="${smBr.x}" y="${smBr.y}" text-anchor="middle" dominant-baseline="central" font-size="14" fill="${ELEM_COLORS[brData.e]}" class="glow-soft">${brData.n}</text>`;
  }

  MANSIONS.forEach((m, i) => {
    const nextS = MANSIONS[(i+1)%28].s;
    let span = nextS - m.s; if (span < 0) span += 360;
    const a1 = l2a(m.s, asc), a2 = l2a(m.s + span, asc);
    const mid = l2a(m.s + span/2, asc);
    const elemColor = ELEM_COLORS[MAN_ELEMS[i % 7]];
    svgBgRings += drawArc(R_MAN_IN, R_MAN_OUT, a2, a1, 'transparent', 'var(--gold-faint)');
    const pStart1 = polar(R_MAN_IN, a1), pStart2 = polar(R_MAN_OUT, a1);
    svgBgRings += `<line x1="${pStart1.x}" y1="${pStart1.y}" x2="${pStart2.x}" y2="${pStart2.y}" stroke="${elemColor}" stroke-width="1.5" class="glow-soft" opacity="0.4"/>`;
    const sm = polar((R_MAN_IN + R_MAN_OUT)/2, mid);
    svgBgRings += `<text x="${sm.x}" y="${sm.y}" text-anchor="middle" dominant-baseline="central" font-size="13" fill="${elemColor}" class="glow-soft" opacity="0.95">${m.n}</text>`;
  });

  for (let i = 0; i < 12; i++) {
    const drawAng = l2a(asc + i*30, asc);
    if (i%3 !== 0) { 
      const pIn = polar(R_HOUSE - 10, drawAng);
      const pOut = polar(R_HOUSE + 15, drawAng);
      svgBgRings += `<line x1="${pIn.x}" y1="${pIn.y}" x2="${pOut.x}" y2="${pOut.y}" stroke="var(--gold-dim)" stroke-width="1.2"/>`;
    }
    const midAng = l2a(asc + i*30 + 15, asc);
    const pNum = polar(R_HOUSE - 20, midAng);
    svgBgRings += `<text x="${pNum.x}" y="${pNum.y}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="var(--gold-dim)" font-family="Cinzel">${i+1}</text>`;
  }

  let natPosMap = {}; 
  
  const buildPlanets = (plData, baseRadius, isReturn) => {
    const list = resolveTextCollisions(plData, asc);
    let pStr = '';
    
    list.forEach(item => {
      const key = item.id;
      const cfg = PLANET_CFG[key];
      const pData = item.data;
      
      const latScale = 6; 
      const physicalRadius = STATE.zAxis ? (baseRadius + (pData.lat * latScale)) : baseRadius;
      
      const pActual = polar(physicalRadius, item.rawAng);
      const pBase = polar(baseRadius, item.rawAng);
      const pText = polar(physicalRadius, item.drawAng); 

      if(!isReturn) natPosMap[key] = pActual; 

      const opac = isReturn ? 0.9 : 1;
      const size = isReturn ? 19 : 24; 
      
      pStr += `<g class="planet-node" data-id="${key}" data-lon="${pData.lon}" data-lat="${pData.lat}" data-type="${isReturn?'返照':'本命'}">`;
      
      if (STATE.zAxis && Math.abs(pData.lat) > 0.1) {
        // 投影线的全息光泽
        pStr += `<line x1="${pBase.x}" y1="${pBase.y}" x2="${pActual.x}" y2="${pActual.y}" stroke="${cfg.col}" stroke-width="1.5" stroke-dasharray="2,4" opacity="0.65" class="glow-soft"/>`;
        pStr += `<circle cx="${pBase.x}" cy="${pBase.y}" r="2" fill="${cfg.col}" opacity="0.8" class="glow-soft"/>`;
      }
      
      // 核心修改：文字护体阴影使用纯黑，而光晕使用 currentColor
      const textShadow = `0 0 3px #000, 0 0 6px #000, 0 0 10px ${cfg.col}`;
      pStr += `<text x="${pText.x}" y="${pText.y+1}" text-anchor="middle" dominant-baseline="central" font-size="${size}" fill="${cfg.col}" opacity="${opac}" style="text-shadow: ${textShadow};">${cfg.sym}</text></g>`;
    });
    return pStr;
  };

  // 高亮黄道基准环
  if(STATE.zAxis) {
      svgBgRings += `<circle cx="${CX}" cy="${CY}" r="${R_NAT_PL}" fill="none" stroke="var(--gold)" stroke-width="2" opacity="0.4" class="glow-strong"/>`;
  } else {
      svgBgRings += `<circle cx="${CX}" cy="${CY}" r="${R_NAT_PL}" fill="none" stroke="var(--gold-dim)" stroke-width="1" opacity="0.7"/>`;
  }
  
  svgPlanets += buildPlanets(plNatal, R_NAT_PL, false);
  
  if (plReturn) {
    if(STATE.zAxis) svgBgRings += `<circle cx="${CX}" cy="${CY}" r="${R_RET_PL}" fill="none" stroke="var(--gold-dim)" stroke-width="1.5" opacity="0.35" stroke-dasharray="4,4"/>`;
    else svgBgRings += `<circle cx="${CX}" cy="${CY}" r="${R_RET_PL}" fill="none" stroke="var(--gold-faint)" stroke-width="1" stroke-dasharray="4,4"/>`;
    
    svgPlanets += buildPlanets(plReturn, R_RET_PL, true); 
  }

  // 能量流动相位线
  if (STATE.aspects) {
    const orbs = { 60: 6, 90: 8, 120: 8, 180: 10 };
    const pKeys = Object.keys(plNatal);
    for(let i=0; i<pKeys.length; i++) {
      for(let j=i+1; j<pKeys.length; j++) {
        const k1 = pKeys[i], k2 = pKeys[j];
        const lon1 = plNatal[k1].lon, lon2 = plNatal[k2].lon;
        let diff = Math.abs(lon1 - lon2); if (diff > 180) diff = 360 - diff;
        
        for (const [aspStr, orb] of Object.entries(orbs)) {
          const aspAngle = parseInt(aspStr);
          if (Math.abs(diff - aspAngle) <= orb) {
            const state = getAspectState(k1, k2, lon1, lon2, aspAngle);
            const flowClass = state === 'applying' ? 'flow-applying' : (state === 'separating' ? 'flow-separating' : '');
            const opac = state === 'applying' ? 0.75 : (state === 'exact' ? 1 : 0.4);
            const w = state === 'exact' ? 2 : 1.2;
            const color = aspAngle === 180 ? 'var(--fire)' : (aspAngle === 90 ? 'var(--sun)' : (aspAngle === 120 ? 'var(--wood)' : 'var(--water)'));
            
            const pt1 = natPosMap[k1], pt2 = natPosMap[k2];
            if(pt1 && pt2) {
               svgAspects += `<line x1="${pt1.x}" y1="${pt1.y}" x2="${pt2.x}" y2="${pt2.y}" stroke="${color}" stroke-width="${w}" class="glow-soft ${flowClass}" opacity="${opac}"/>`;
            }
            break;
          }
        }
      }
    }
  }

  // 物理发光四轴
  const axisLines = [
    { a: angles.asc, n: 'ASC', c: 'var(--axis-asc)', prominent: true }, 
    { a: angles.dsc, n: 'DSC', c: 'var(--axis-dsc)', prominent: true },
    { a: angles.mc,  n: 'MC',  c: 'var(--axis-mc)', prominent: false },
    { a: angles.ic,  n: 'IC',  c: 'var(--axis-ic)', prominent: false }
  ];
  
  axisLines.forEach(axis => {
    const drawAng = l2a(axis.a, asc);
    const pIn = polar(25, drawAng); 
    const pOut = polar(R_FIR_OUT + 25, drawAng);
    
    pOut.x += 0.01; pOut.y += 0.01;
    
    const pText = polar(R_FIR_OUT + 45, drawAng);
    
    if (axis.prominent) {
      svgAxes += `<line x1="${pIn.x}" y1="${pIn.y}" x2="${pOut.x}" y2="${pOut.y}" stroke="${axis.c}" stroke-width="8" opacity="0.15" class="glow-strong"/>`;
      svgAxes += `<line x1="${pIn.x}" y1="${pIn.y}" x2="${pOut.x}" y2="${pOut.y}" stroke="${axis.c}" stroke-width="2" opacity="0.9"/>`;
    } else {
      svgAxes += `<line x1="${pIn.x}" y1="${pIn.y}" x2="${pOut.x}" y2="${pOut.y}" stroke="${axis.c}" stroke-width="5" opacity="0.1" class="glow-soft"/>`;
      svgAxes += `<line x1="${pIn.x}" y1="${pIn.y}" x2="${pOut.x}" y2="${pOut.y}" stroke="${axis.c}" stroke-width="1.5" stroke-dasharray="6, 6" opacity="0.8"/>`;
    }
    
    svgAxes += `<text x="${pText.x}" y="${pText.y}" text-anchor="middle" dominant-baseline="central" font-size="22" font-family="Cinzel" fill="${axis.c}" font-weight="700" class="glow-strong">${axis.n}</text>`;
  });

  // 核心机件
  svgAxes += `<circle cx="${CX}" cy="${CY}" r="28" fill="var(--bg-deep)" stroke="var(--gold-dim)" stroke-width="2" class="glow-soft"/>`;
  svgAxes += `<circle cx="${CX}" cy="${CY}" r="22" fill="none" stroke="var(--gold)" stroke-width="1" opacity="0.6"/>`;
  svgAxes += `<circle cx="${CX}" cy="${CY}" r="4" fill="var(--gold-light)" class="glow-strong"/>`;

  document.getElementById('main-svg').innerHTML = svgBgRings + svgAspects + svgPlanets + svgAxes;
  bindTooltips();
}

function setMode(mode) {
  STATE.mode = mode;
  ['natal', 'solar', 'lunar'].forEach(m => document.getElementById('btn-'+m).classList.remove('active'));
  document.getElementById('btn-'+mode).classList.add('active');
  renderChart();
}

function toggleOption(opt) {
  STATE[opt] = !STATE[opt];
  let btnId;
  if(opt === 'aspects') btnId = 'btn-asp';
  else if(opt === 'firdaria') btnId = 'btn-fir';
  else if(opt === 'zAxis') btnId = 'btn-3d';
  else if(opt === 'nodeSwap') {
    const btn = document.getElementById('btn-node');
    if(STATE[opt]) {
        btn.textContent = '交点: 罗南计北';
        btn.classList.add('warn-active');
    } else {
        btn.textContent = '交点: 罗北计南';
        btn.classList.remove('warn-active');
    }
    renderChart();
    return;
  }
  document.getElementById(btnId).classList.toggle('active', STATE[opt]);
  renderChart();
}

function bindTooltips() {
  const tt = document.getElementById('tooltip');
  document.querySelectorAll('.planet-node').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const id = e.currentTarget.getAttribute('data-id');
      const lon = parseFloat(e.currentTarget.getAttribute('data-lon'));
      const lat = parseFloat(e.currentTarget.getAttribute('data-lat'));
      const type = e.currentTarget.getAttribute('data-type');
      const cfg = PLANET_CFG[id];
      const sgn = ZODIAC_N[Math.floor(lon / 30)];
      const br = BRANCHES[Math.floor(lon / 30)].n;
      
      let manStr = MANSIONS[0].n;
      let elemStr = MAN_ELEMS[0];
      for (let i=0; i<MANSIONS.length; i++) {
        const ms = MANSIONS[i].s, me = MANSIONS[(i+1)%28].s;
        if (ms < me) { if (lon >= ms && lon < me) { manStr = MANSIONS[i].n; elemStr = MAN_ELEMS[i%7]; } }
        else { if (lon >= ms || lon < me) { manStr = MANSIONS[i].n; elemStr = MAN_ELEMS[i%7]; } }
      }
      
      const eNames = { wood:'木', metal:'金', earth:'土', fire:'火', water:'水', sun:'日', moon:'月'};
      
      tt.innerHTML = `<strong>${cfg.sym} ${cfg.nm} <span style="font-size:10px;color:var(--text-muted)">(${type})</span></strong>
                      <div class="sub">黄经：${lon.toFixed(2)}° (黄纬: ${lat > 0 ? '+'+lat.toFixed(2) : lat.toFixed(2)}°)</div>
                      <div class="sub">落入：${sgn} ${(lon%30).toFixed(2)}° (地支: ${br})</div>
                      <div class="sub">星宿：${manStr}宿 (${eNames[elemStr]})</div>`;
      tt.style.opacity = 1;
    });
    el.addEventListener('mousemove', e => {
      const wrap = document.getElementById('chart-wrap').getBoundingClientRect();
      tt.style.left = (e.clientX - wrap.left + 20) + 'px';
      tt.style.top = (e.clientY - wrap.top - 20) + 'px';
    });
    el.addEventListener('mouseleave', () => tt.style.opacity = 0);
  });
}

document.querySelectorAll('.input-grid input').forEach(inp => inp.addEventListener('change', renderChart));
window.onload = renderChart;
</script>
