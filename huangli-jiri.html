<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黃道吉日 · 每日流日命盤</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="/i18n.js"></script>
<style>
:root{
  --gold:#D4A843;--gold-b:#F0C96A;--gold-dim:rgba(212,168,67,0.18);
  --bg:#06050A;--text:#F0EAD6;--text-d:rgba(240,234,214,0.55);--text-f:rgba(240,234,214,0.22);
  --red:#C8402A;
  --teal:#319795;--teal-dim:rgba(49,151,149,0.12);
  /* ── 五行陰陽雙色系 ── */
  --jia:#5AB86C; --yi:#8ED49A; --bing:#E05030; --ding:#F09070; --wu:#C8942A;
  --ji:#D4B870; --geng:#B0B8C8; --xin:#D8DEE8; --ren:#4A8EC8; --gui:#80B4E0;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;overflow-x:hidden;min-height:100vh;}
.tg-jia{color:var(--jia);}.tg-yi {color:var(--yi);}.tg-bing{color:var(--bing);}.tg-ding{color:var(--ding);}.tg-wu {color:var(--wu);}.tg-ji {color:var(--ji);}.tg-geng{color:var(--geng);}.tg-xin{color:var(--xin);}.tg-ren{color:var(--ren);}.tg-gui{color:var(--gui);}
.dz-zi {color:#6AACDC;} .dz-chou{color:#C8A840;} .dz-yin{color:#5AB86C;} .dz-mao{color:#8ED49A;} .dz-chen{color:#B89840;} .dz-si {color:#E07050;} .dz-wu2{color:#E05030;} .dz-wei{color:#C8A060;} .dz-shen{color:#A0AABB;} .dz-you{color:#C8D0DC;} .dz-xu {color:#B08840;} .dz-hai{color:#80B4E0;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grid-ov{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(212,168,67,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,67,0.022) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);}
.scan{position:fixed;top:0;left:0;right:0;height:2px;z-index:2;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.12),rgba(212,168,67,0.4),rgba(212,168,67,0.12),transparent);animation:scan 9s linear infinite;}
@keyframes scan{0%{top:-2px}100%{top:100vh}}
.fp{position:fixed;pointer-events:none;z-index:2;border-radius:50%;animation:fu linear both;}
@keyframes fu{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:.7}90%{opacity:.3}100%{transform:translateY(-100vh) scale(.2);opacity:0}}
.page{position:relative;z-index:10;min-height:100vh;padding-bottom:80px;width:100%;max-width:900px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid rgba(212,168,67,0.1);}
.app-logo{font-family:'Ma Shan Zheng',cursive;font-size:1.4rem;letter-spacing:0.18em;background:linear-gradient(160deg,#F8EFC0 0%,#D4A843 40%,#A0680A 70%,#D4A843 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.app-sub{font-family:'Noto Sans TC',sans-serif;font-size:0.55rem;letter-spacing:0.4em;color:var(--text-f);margin-top:2px;}
.tab-nav{display:flex;gap:2px;}
.tab-btn{background:none;border:1px solid transparent;font-family:'Noto Sans TC',sans-serif;font-size:0.6rem;letter-spacing:0.2em;color:var(--text-d);cursor:pointer;padding:6px 14px;transition:all .22s;border-radius:1px;}
.tab-btn.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(212,168,67,0.06);}
.tab-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.03);}
.date-nav{display:flex;align-items:center;gap:10px;padding:16px 24px 12px;}
.nav-arrow{background:none;border:1px solid rgba(212,168,67,0.16);color:rgba(212,168,67,0.7);font-size:1.15rem;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-family:sans-serif;}
.nav-arrow:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,0.07);}
.nav-arrow:active{transform:scale(0.94);}
.date-center{text-align:center;flex:1;}
.date-solar{font-family:'Noto Serif TC',serif;font-size:1.05rem;letter-spacing:0.14em;color:var(--text);}
.date-lunar{font-family:'Noto Sans TC',sans-serif;font-size:0.62rem;letter-spacing:0.2em;color:var(--text-d);margin-top:3px;}
.date-today-btn{font-family:'Noto Sans TC',sans-serif;font-size:0.5rem;letter-spacing:0.25em;color:rgba(212,168,67,0.5);border:1px solid rgba(212,168,67,0.18);background:none;cursor:pointer;padding:3px 10px;margin-top:6px;transition:all .2s;display:inline-block;}
.date-today-btn:hover{color:var(--gold);border-color:rgba(212,168,67,0.4);background:rgba(212,168,67,0.05);}
.sect-hd{display:flex;align-items:center;gap:10px;padding:0 20px;margin-bottom:10px;}
.sect-hd::before,.sect-hd::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.18));}
.sect-hd::after{transform:scaleX(-1);}
.sect-hd-txt{font-family:'Noto Sans TC',sans-serif;font-size:0.55rem;letter-spacing:0.5em;color:rgba(212,168,67,0.55);white-space:nowrap;}
.sizhu-outer{padding:0 16px;margin-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* 5v4 完美非對稱大表格架構 */
.sizhu-main{display:grid;grid-template-columns:repeat(4,1fr) 1px repeat(5,1fr);min-width:680px;border:1px solid rgba(212,168,67,0.14);background:rgba(0,0,0,0.28);position:relative;}
.grp-row{grid-column:1/-1;display:grid;grid-template-columns:4fr 1px 1fr 1fr 1fr 1fr 1fr;}
.grp-cell{text-align:center;font-family:'Noto Sans TC',sans-serif;font-size:0.5rem;letter-spacing:0.32em;padding:5px 2px 4px;border-bottom:1px solid rgba(212,168,67,0.08);}
.grp-bazi{color:rgba(212,168,67,0.65);background:rgba(212,168,67,0.035);}
.grp-sep{background:rgba(212,168,67,0.1);padding:0;}
.grp-dayun{color:rgba(220,120,60,0.7);background:rgba(220,120,60,0.03);}
.grp-liuyear{color:rgba(150,100,220,0.7);background:rgba(150,100,220,0.03);}
.grp-liumonth{color:rgba(80,160,220,0.7);background:rgba(80,160,220,0.03);}
.grp-liuday{color:rgba(212,168,67,0.9);background:rgba(212,168,67,0.06);border-bottom:1px solid rgba(212,168,67,0.28);}
.grp-liuhour{color:rgba(49,151,149,0.9);background:var(--teal-dim);border-bottom:1px solid rgba(49,151,149,0.25);}

.sz-vsep{background:rgba(212,168,67,0.12);width:1px;grid-row:span 6;}
.sz-col{display:flex;flex-direction:column;align-items:center;border-right:1px solid rgba(212,168,67,0.07);cursor:pointer;transition:background .18s;position:relative;overflow:visible;}
.sz-col:last-child{border-right:none;}
.sz-col:hover,.sz-col.open{background:rgba(212,168,67,0.045);}
.sz-col.sz-liuday{background:rgba(212,168,67,0.04);}
.sz-col.sz-liuday:hover,.sz-col.sz-liuday.open{background:rgba(212,168,67,0.09);}
.sz-col.sz-liuhour{background:var(--teal-dim);}
.sz-col.sz-liuhour:hover,.sz-col.sz-liuhour.open{background:rgba(49,151,149,0.18);}
.sz-col.sz-rizhu{background:rgba(212,168,67,0.02);}

.sz-head{width:100%;text-align:center;font-family:'Noto Sans TC',sans-serif;font-size:0.48rem;letter-spacing:0.18em;color:var(--text-f);padding:5px 2px 4px;border-bottom:1px solid rgba(212,168,67,0.07);}
.sz-col.sz-dayun .sz-head{color:rgba(220,120,60,0.65);}
.sz-col.sz-liuyear .sz-head{color:rgba(150,100,220,0.65);}
.sz-col.sz-liumonth .sz-head{color:rgba(80,160,220,0.65);}
.sz-col.sz-liuday .sz-head{color:rgba(212,168,67,0.8);border-bottom:1px solid rgba(212,168,67,0.22);}
.sz-col.sz-liuhour .sz-head{color:rgba(49,151,149,0.8);border-bottom:1px solid rgba(49,151,149,0.22);}
.sz-col.sz-rizhu .sz-head{color:rgba(212,168,67,0.5);}

.sz-tg{font-family:'Ma Shan Zheng',cursive;font-size:1.7rem;line-height:1;padding:2px 4px 1px;}
.sz-dz{font-family:'Ma Shan Zheng',cursive;font-size:1.7rem;line-height:1;padding:1px 4px 3px;}
.sz-ten{font-family:'Noto Sans TC',sans-serif;font-size:0.48rem;letter-spacing:0.06em;padding:3px 2px;text-align:center;min-height:18px;}
.sz-nayin{font-family:'Noto Sans TC',sans-serif;font-size:0.44rem;color:rgba(240,234,214,0.18);padding:2px 3px 6px;text-align:center;line-height:1.45;}

.ten-qisha{color:#D05050;} .ten-zhengguang{color:#7080B8;} .ten-pianyin{color:#9060C0;} .ten-zhengyin{color:#A878D0;} .ten-shishen{color:#60A870;} .ten-shangguan{color:#50B880;} .ten-piancai{color:#9090C0;} .ten-zhengcai{color:#8090C0;} .ten-bijian{color:rgba(200,170,100,0.6);} .ten-jiecai{color:rgba(180,145,80,0.6);} .ten-rizhu{color:rgba(212,168,67,0.75);}
.sz-detail{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);z-index:100;width:176px;background:#0D0B18;border:1px solid rgba(212,168,67,0.22);padding:13px 14px 11px;box-shadow:0 12px 40px rgba(0,0,0,0.85),0 0 0 1px rgba(0,0,0,0.9);}
.sz-detail::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%) rotate(45deg);width:8px;height:8px;background:#0D0B18;border-top:1px solid rgba(212,168,67,0.22);border-left:1px solid rgba(212,168,67,0.22);}
.sz-col.open .sz-detail,.sz-col:focus .sz-detail{display:block;}
.sd-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.sd-lbl{font-family:'Noto Sans TC',sans-serif;font-size:0.55rem;color:var(--text-f);letter-spacing:0.08em;}
.sd-val{font-family:'Noto Sans TC',sans-serif;font-size:0.6rem;color:var(--text-d);}
.sd-div{height:1px;background:rgba(212,168,67,0.08);margin:7px 0;}
.sd-tip{font-family:'Noto Sans TC',sans-serif;font-size:0.55rem;color:var(--text-f);text-align:center;line-height:1.7;}
.sd-tip em{color:rgba(212,168,67,0.55);font-style:normal;}
.rel-outer{padding:4px 16px 10px;min-width:640px;}
.rel-badges{display:flex;gap:3px;flex-wrap:wrap;}
.rel-badge{font-family:'Noto Sans TC',sans-serif;font-size:0.5rem;padding:3px 9px;letter-spacing:0.06em;border:1px solid;white-space:nowrap;cursor:default;}
.rb-he{color:#7DE09A;border-color:rgba(125,224,154,0.28);background:rgba(125,224,154,0.04);}
.rb-chong{color:#F07840;border-color:rgba(240,120,64,0.28);background:rgba(240,120,64,0.04);}
.rb-xing{color:#D4A843;border-color:rgba(212,168,67,0.28);background:rgba(212,168,67,0.04);}
.rb-po{color:#63B3ED;border-color:rgba(99,179,237,0.28);background:rgba(99,179,237,0.04);}
.rb-hai{color:#B090D0;border-color:rgba(176,144,208,0.28);background:rgba(176,144,208,0.04);}
.divider{height:1px;margin:14px 20px;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.13),transparent);}
.verdict-box{margin:0 16px 14px;padding:14px 16px;background:rgba(8,7,14,0.85);border:1px solid rgba(212,168,67,0.13);display:flex;gap:12px;align-items:flex-start;}
.verdict-icon{font-size:1.1rem;color:var(--gold);flex-shrink:0;margin-top:2px;}
.verdict-title{font-family:'Noto Serif TC',serif;font-size:0.82rem;color:var(--gold);margin-bottom:5px;letter-spacing:0.1em;}
.verdict-body{font-family:'Noto Sans TC',sans-serif;font-size:0.65rem;color:var(--text-d);line-height:1.95;letter-spacing:0.05em;}
.shensha-outer{padding:0 16px;margin-bottom:14px;}
.ss-grid{display:flex;flex-wrap:wrap;gap:6px;}
.ss-tag{font-family:'Noto Sans TC',sans-serif;font-size:0.58rem;padding:4px 11px;letter-spacing:0.14em;border:1px solid;cursor:pointer;transition:filter .18s;}
.ss-tag:hover{filter:brightness(1.35);}
.ss-ji{color:#7DE09A;border-color:rgba(125,224,154,0.28);background:rgba(125,224,154,0.04);}
.ss-xiong{color:#F07840;border-color:rgba(240,120,64,0.28);background:rgba(240,120,64,0.04);}
.ss-zhong{color:#D4A843;border-color:rgba(212,168,67,0.22);background:rgba(212,168,67,0.03);}
.interp-list{padding:0 16px;display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.ic{background:rgba(7,6,12,0.9);border:1px solid rgba(212,168,67,0.09);padding:11px 14px;cursor:pointer;transition:border-color .2s;}
.ic:hover{border-color:rgba(212,168,67,0.25);}
.ic-head{display:flex;align-items:center;justify-content:space-between;}
.ic-title{font-family:'Noto Sans TC',sans-serif;font-size:0.65rem;color:var(--text-d);letter-spacing:0.1em;display:flex;align-items:center;gap:8px;}
.ic-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ic-arrow{font-family:'Noto Sans TC',sans-serif;font-size:0.65rem;color:var(--text-f);transition:transform .22s;line-height:1;}
.ic.open .ic-arrow{transform:rotate(180deg);}
.ic-body{font-family:'Noto Sans TC',sans-serif;font-size:0.62rem;color:var(--text-f);line-height:1.95;margin-top:8px;letter-spacing:0.05em;display:none;border-top:1px solid rgba(212,168,67,0.07);padding-top:9px;}
.ic.open .ic-body{display:block;}
.ic-api-engine {margin-top:10px;padding:10px 14px;background:rgba(212,168,67,0.04);border-left:2px solid rgba(212,168,67,0.35);font-family:'Noto Sans TC',sans-serif;font-size:0.6rem;color:rgba(240,234,214,0.7);letter-spacing:0.08em;line-height:1.8;border-radius:0 2px 2px 0;}
.ic-api-engine span.hint {display:block;margin-top:6px;font-size:0.5rem;color:rgba(212,168,67,0.4);letter-spacing:0.15em;}
.mingpan-outer{padding:0 16px;}
.info-card{background:rgba(7,6,12,0.85);border:1px solid rgba(212,168,67,0.12);padding:15px 17px;margin-bottom:12px;position:relative;}
.c-tl,.c-tr,.c-bl,.c-br{position:absolute;width:10px;height:10px;border-color:rgba(212,168,67,0.28);border-style:solid;}
.c-tl{top:6px;left:6px;border-width:1px 0 0 1px;} .c-tr{top:6px;right:6px;border-width:1px 1px 0 0;} .c-bl{bottom:6px;left:6px;border-width:0 0 1px 1px;} .c-br{bottom:6px;right:6px;border-width:0 1px 1px 0;}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-family:'Noto Sans TC',sans-serif;font-size:0.66rem;}
.info-row:last-child{margin-bottom:0;}
.ir-lbl{color:var(--text-f);letter-spacing:0.12em;}
.ir-val{color:var(--text-d);}
.ir-val.gold{color:var(--gold);}
.bazi4-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid rgba(212,168,67,0.12);background:rgba(0,0,0,0.22);min-width:0;}
.b4-grp{grid-column:span 4;text-align:center;font-family:'Noto Sans TC',sans-serif;font-size:0.5rem;letter-spacing:0.4em;color:rgba(212,168,67,0.5);padding:5px;background:rgba(212,168,67,0.03);border-bottom:1px solid rgba(212,168,67,0.08);}
.dayun-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.dy-item{display:flex;align-items:center;gap:14px;padding:9px 15px;background:rgba(7,6,12,0.7);border:1px solid rgba(212,168,67,0.07);transition:border-color .2s;cursor:pointer;}
.dy-item.current{border-color:rgba(212,168,67,0.32);background:rgba(212,168,67,0.04);}
.dy-item:hover{border-color:rgba(212,168,67,0.18);}
.dy-gz{font-family:'Ma Shan Zheng',cursive;font-size:1.25rem;display:flex;gap:2px;min-width:50px;flex-shrink:0;}
.dy-info{flex:1;min-width:0;}
.dy-age{font-family:'Noto Sans TC',sans-serif;font-size:0.62rem;color:var(--text-d);letter-spacing:0.08em;}
.dy-years{font-family:'Noto Sans TC',sans-serif;font-size:0.53rem;color:var(--text-f);margin-top:2px;}
.dy-prog-wrap{height:2px;background:rgba(212,168,67,0.07);margin-top:6px;}
.dy-prog{height:100%;background:linear-gradient(90deg,rgba(212,168,67,0.3),rgba(212,168,67,0.6));}
.dy-badge{font-family:'Noto Sans TC',sans-serif;font-size:0.48rem;letter-spacing:0.18em;color:var(--gold);border:1px solid rgba(212,168,67,0.28);padding:2px 8px;flex-shrink:0;}
@media(max-width:768px) {
  .sizhu-main { min-width: 720px; }
  .grp-row { grid-template-columns: 4fr 1px 1fr 1fr 1fr 1fr 1fr; }
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="grid-ov"></div>
<div class="scan"></div>

<div class="page">
  <div class="topbar">
    <div class="logo-wrap">
      <div class="app-logo" data-hl="logo">黃道吉日</div>
      <div class="app-sub" data-hl="sub">個人命盤 · 每日流日</div>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('jiari')" data-hl="tab_today">今日</button>
      <button class="tab-btn" onclick="switchTab('mingpan')" data-hl="tab_chart">命盤</button>
      <button class="tab-btn" onclick="switchTab('dayun')" data-hl="tab_luck">大運</button>
    </div>
  </div>

  <div id="tab-jiari">
    <div class="date-nav">
      <button class="nav-arrow" onclick="shiftDay(-1)" aria-label="Prev">&#8249;</button>
      <div class="date-center">
        <div class="date-solar" id="disp-solar"></div>
        <div class="date-lunar" id="disp-lunar"></div>
        <button class="date-today-btn" onclick="goToday()" data-hl="btn_today">回到今天</button>
      </div>
      <button class="nav-arrow" onclick="shiftDay(1)" aria-label="Next">&#8250;</button>
    </div>

    <div class="sect-hd"><span class="sect-hd-txt" data-hl="hd_pillars">命 盤 × 今 日 四 柱</span></div>
    <div class="sizhu-outer">
      <div class="sizhu-main" id="sizhu-main"></div>
      <div class="rel-outer" id="rel-outer"></div>
    </div>
    <div class="divider"></div>
    <div class="verdict-box">
      <div class="verdict-icon">✦</div>
      <div>
        <div class="verdict-title" id="verdict-title"></div>
        <div class="verdict-body" id="verdict-body"></div>
      </div>
    </div>
    <div class="sect-hd"><span class="sect-hd-txt" data-hl="hd_ss">今 日 神 煞</span></div>
    <div class="shensha-outer"><div class="ss-grid" id="ss-grid"></div></div>
    <div class="divider"></div>
    <div class="sect-hd"><span class="sect-hd-txt" data-hl="hd_interp">神 煞 解 讀</span></div>
    <div class="interp-list" id="interp-list"></div>
  </div>

  <div id="tab-mingpan" style="display:none;padding-top:16px;">
    <div class="sect-hd"><span class="sect-hd-txt" data-hl="hd_mychart">個 人 命 盤</span></div>
    <div class="mingpan-outer">
      <div class="info-card">
        <div class="c-tl"></div><div class="c-tr"></div><div class="c-bl"></div><div class="c-br"></div>
        <div class="info-row"><span class="ir-lbl" data-hl="lbl_name">命主</span><span class="ir-val gold" id="mp-name"></span></div>
        <div class="info-row"><span class="ir-lbl" data-hl="lbl_birth">出生</span><span class="ir-val" id="mp-birthday"></span></div>
        <div class="info-row"><span class="ir-lbl" data-hl="lbl_gender">性別</span><span class="ir-val" id="mp-gender"></span></div>
        <div class="info-row"><span class="ir-lbl" data-hl="lbl_dm">日主</span><span class="ir-val gold" id="mp-rizhu"></span></div>

/* ════════════════════════════════════════
   高精度分鐘交節氣處理引擎 (100% 崩潰防禦)
════════════════════════════════════════ */
function getJQPrecise(year, mIdx){
  if(JQTBL_PRECISE[year] && JQTBL_PRECISE[year][mIdx]) {
    return {day:JQTBL_PRECISE[year][mIdx][0], hour:JQTBL_PRECISE[year][mIdx][1], minute:JQTBL_PRECISE[year][mIdx][2]};
  }
  const fallbackDay = [6,4,5,4,5,5,6,7,7,8,7,6][mIdx];
  return {day: fallbackDay, hour: 12, minute: 0};
}
function correctSolarTime(hour, minute, birthplace, tzOffset=8){
  const lng = birthplace && birthplace.includes('杭州') ? 120.2 : 120.0;
  const diffMin = Math.round((lng - tzOffset * 15) * 4);
  let totalMin = hour * 60 + minute + diffMin;
  let dayOffset = 0;
  if(totalMin >= 1440) { dayOffset = 1; totalMin -= 1440; }
  else if(totalMin < 0) { dayOffset = -1; totalMin += 1440; }
  return { hour: Math.floor(totalMin / 60), minute: totalMin % 60, dayOffset };
}
function getYrGZPrecise(year, month, day, hour, minute){
  const lc = getJQPrecise(year, 1); const tgt=month*10000+day*100+(hour*60+minute);
  let y = (month<2||(month===2 && tgt<(20000+lc.day*100+lc.hour*60+lc.minute))) ? year-1 : year;
  return {tg:((y-4)%10+10)%10, dz:((y-4)%12+12)%12};
}
function getMoGZPrecise(year, month, day, hour, minute){
  const r = getJQPrecise(year, month-1); const targetMins = day*1440+hour*60+minute;
  let sm = month, sy = year; if(targetMins<(r.day*1440+r.hour*60+r.minute)){sm--; if(sm===0){sm=12; sy--;}}
  let yrTg = sm===1 ? sy-1 : sy;
  return {tg:([2,4,6,8,0][((yrTg-4)%10+10)%10 % 5]+((sm+10)%12+1)-1)%10, dz:sm%12};
}

/* ════════════════════════════════════════
   干支排盤方法
════════════════════════════════════════ */
function getHrGZ(hour, dayTg){ const dz=Math.floor((hour+1)/2)%12; return {tg:([0,2,4,6,8][dayTg%5]+dz)%10, dz}; }
function getDayun(gender,year,month,day,yrTg){
  const mGZ=getMoGZPrecise(year,month,day,12,0); const list=[];
  const fwd=(gender==='男' && yrTg%2===0)||(gender==='女' && yrTg%2!==0);
  for(let i=0; i<8; i++){const s=fwd?i+1:-(i+1); list.push({tgIdx:((mGZ.tg+s)%10+10)%10, dzIdx:((mGZ.dz+s)%12+12)%12, age:Math.max(1,Math.floor(4+i*10))});}
  return {startAge:4, fwd, list};
}
function getCurrentDayunIdx(dy,birthYear,nowYear){const age=nowYear-birthYear;let cur=null;for(let i=dy.list.length-1;i>=0;i--){if(age>=dy.list[i].age){cur=i;break;}}return cur;}

function pillarHTML(p){
  const tgName = t('tg_name')[p.tg]; const dzName = t('dz_name')[p.dz];
  const tgTenLocal = t('ten')[p.tgTenRaw] || p.tgTenRaw; const tgTenCls = TEN_CSS_MAP[p.tgTenRaw] || '';
  const dzTenLocal = t('ten')[p.dzTenRaw] || p.dzTenRaw; const dzTenCls = TEN_CSS_MAP[p.dzTenRaw] || '';
  return `<div class="sz-col ${p.colCls||''}" tabindex="0" onclick="toggleDetail(this)">
    <div class="sz-head">${p.label}</div>
    <div class="sz-ten ${tgTenCls}" style="margin-top:4px;">${tgTenLocal}</div>
    <div class="sz-tg ${TG_CSS[p.tg]}">${tgName}</div>
    <div class="sz-dz ${DZ_CSS[p.dz]}">${dzName}</div>
    <div class="sz-ten ${dzTenCls}">${dzTenLocal}</div>
    <div class="sz-nayin">${nayin(p.tg,p.dz)}</div>
    <div class="sz-detail">
      <div class="sd-row"><span class="sd-lbl">${t('lbl_stem')}</span><span class="sd-val ${TG_CSS[p.tg]}">${tgName}</span></div>
      <div class="sd-row"><span class="sd-lbl">${t('lbl_tg_ten')}</span><span class="sd-val ${tgTenCls}">${tgTenLocal}</span></div>
      <div class="sd-div"></div>
      <div class="sd-row"><span class="sd-lbl">${t('lbl_branch')}</span><span class="sd-val ${DZ_CSS[p.dz]}">${dzName}</span></div>
      <div class="sd-row"><span class="sd-lbl">${t('lbl_dz_ten')}</span><span class="sd-val ${dzTenCls}">${dzTenLocal}</span></div>
    </div>
  </div>`;
}

function renderJiari(){
  const d=curDate; const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate(),h=d.getHours(),mn=d.getMinutes();
  const main=document.getElementById('sizhu-main'); if(!main) return;
  const wkNames = t('wk_names'); const lang = (typeof ZCI18n !== 'undefined' && ZCI18n.lang) ? ZCI18n.lang() : 'zh-TW';
  
  if(lang === 'en') document.getElementById('disp-solar').textContent=`${y}-${m}-${day}`;
  else document.getElementById('disp-solar').textContent=`${y}年${m}月${day}日 · 週${wkNames[d.getDay()]}`;
  document.getElementById('disp-lunar').textContent=`${approxLunar(d)}年`;

  const bst = correctSolarTime(USER.hour, USER.minute, USER.birthplace);
  const yGZ=getYrGZPrecise(USER.year, USER.month, USER.day, bst.hour, bst.minute);
  const mGZ=getMoGZPrecise(USER.year, USER.month, USER.day, bst.hour, bst.minute);
  const dGZ=getDayGZ(USER.year, USER.month, USER.day);
  const hGZ=getHrGZ(bst.hour, dGZ.tg); const ri=dGZ.tg;

  const dyData=getDayun(USER.gender, USER.year, USER.month, USER.day, yGZ.tg);
  const curDyIdx=getCurrentDayunIdx(dyData, USER.year, y);
  const curDy=curDyIdx!==null?dyData.list[curDyIdx]:null;

  const lyGZ=getYrGZPrecise(y,m,day,h,mn); const lmGZ=getMoGZPrecise(y,m,day,h,mn);
  const ldGZ=getDayGZ(y,m,day); const lhGZ=getHrGZ(h, ldGZ.tg);

  const pillars=[
    {label: t('lbl_year'), tg:yGZ.tg, dz:yGZ.dz, tgTenRaw:SS_TABLE[ri][yGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[yGZ.dz]], colCls:''},
    {label: t('lbl_month'), tg:mGZ.tg, dz:mGZ.dz, tgTenRaw:SS_TABLE[ri][mGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[mGZ.dz]], colCls:''},
    {label: t('lbl_day'), tg:dGZ.tg, dz:dGZ.dz, tgTenRaw:'日主', dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[dGZ.dz]], colCls:'sz-rizhu'},
    {label: t('lbl_hour'), tg:hGZ.tg, dz:hGZ.dz, tgTenRaw:SS_TABLE[ri][hGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[hGZ.dz]], colCls:''},
    {label: t('grp_luck'), tg:curDy?curDy.tgIdx:0, dz:curDy?curDy.dzIdx:0, tgTenRaw:curDy?SS_TABLE[ri][curDy.tgIdx]:'—', dzTenRaw:curDy?SS_TABLE[ri][HIDDEN_MAIN_QI[curDy.dzIdx]]:'—', colCls:'sz-dayun'},
    {label: t('grp_year'), tg:lyGZ.tg, dz:lyGZ.dz, tgTenRaw:SS_TABLE[ri][lyGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[lyGZ.dz]], colCls:'sz-liuyear'},
    {label: t('grp_month'), tg:lmGZ.tg, dz:lmGZ.dz, tgTenRaw:SS_TABLE[ri][lmGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[lmGZ.dz]], colCls:'sz-liumonth'},
    {label: t('grp_day'), tg:ldGZ.tg, dz:ldGZ.dz, tgTenRaw:SS_TABLE[ri][ldGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[ldGZ.dz]], colCls:'sz-liuday'},
    {label: t('grp_hour'), tg:lhGZ.tg, dz:lhGZ.dz, tgTenRaw:SS_TABLE[ri][lhGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[lhGZ.dz]], colCls:'sz-liuhour'},
  ];

  main.innerHTML=`
    <div class="grp-row" id="grp-row">
      <div class="grp-cell grp-bazi">${t('grp_base')}</div><div class="grp-cell grp-sep"></div>
      <div class="grp-cell grp-dayun">${t('grp_luck')}</div><div class="grp-cell grp-liuyear">${t('grp_year')}</div>
      <div class="grp-cell grp-liumonth">${t('grp_month')}</div><div class="grp-cell grp-liuday">${t('grp_day')}</div>
      <div class="grp-cell grp-liuhour">${t('grp_hour')}</div>
    </div>`;
  pillars.slice(0,4).forEach(p=>main.insertAdjacentHTML('beforeend',pillarHTML(p)));
  main.insertAdjacentHTML('beforeend','<div class="sz-vsep"></div>');
  pillars.slice(4).forEach(p=>main.insertAdjacentHTML('beforeend',pillarHTML(p)));

  const rels=checkRels(pillars);
  const relOuter = document.getElementById('rel-outer');
  if(relOuter) relOuter.innerHTML = rels.length ? `<div class="rel-badges">${rels.map(r=>`<span class="rel-badge ${r.cls}">${r.txt}</span>`).join('')}</div>` : '';

  const ss=calcShensha(ri, ldGZ.dz, ldGZ.tg, lyGZ.dz, lmGZ.dz);
  const ssGrid = document.getElementById('ss-grid');
  if(ssGrid) ssGrid.innerHTML=ss.map(s=>`<span class="ss-tag ss-${s.type}" onclick="scrollToInterp('ic-${s.apiKey}')">${t(s.key).n}</span>`).join('');

  const vdt=genVerdict(ri,ldGZ.tg,ldGZ.dz,ss);
  if(document.getElementById('verdict-title')) document.getElementById('verdict-title').textContent=`${t('vd_title')} ${vdt.lvl}`;
  if(document.getElementById('verdict-body')) document.getElementById('verdict-body').textContent=vdt.body;

  const interpList = document.getElementById('interp-list');
  if (interpList) {
    interpList.innerHTML=ss.map(s=>{
      const info = t(s.key);
      return `<div class="ic" id="ic-${s.apiKey}" onclick="this.classList.toggle('open')">
        <div class="ic-head"><div class="ic-title"><span class="ic-dot" style="background:${s.type==='ji'?'#7DE09A':s.type==='xiong'?'#F07840':'#D4A843'}"></span>${info.n}</div><span class="ic-arrow">∨</span></div>
        <div class="ic-body"><div>${info.d}</div><div class="ic-api-engine">${getDynamicReading(s.type, SS_TABLE[ri][ldGZ.tg])}<span class="hint">${t('api_hint_replaced')}</span></div></div>
      </div>`;
    }).join('');
  }
}

function renderMingpan(){
  const bst = correctSolarTime(USER.hour, USER.minute, USER.birthplace);
  const yGZ=getYrGZPrecise(USER.year, USER.month, USER.day, bst.hour, bst.minute);
  const mGZ=getMoGZPrecise(USER.year, USER.month, USER.day, bst.hour, bst.minute);
  const dGZ=getDayGZ(USER.year, USER.month, USER.day);
  const hGZ=getHrGZ(bst.hour, dGZ.tg); const ri=dGZ.tg;

  const supports = {'木':['木','水'],'火':['火','木'],'土':['土','火'],'金':['金','土'],'水':['水','金']}[WXT[ri]];
  let score = 0;
  [yGZ.tg, yGZ.dz, mGZ.tg, mGZ.dz, dGZ.tg, dGZ.dz, hGZ.tg, hGZ.dz].forEach((item, i) => {
    if(supports.includes(i % 2 === 0 ? WXT[item] : WXD[item])) score += [1, 1.2, 1, 3, 1, 1.2, 1, 1.2][i];
  });
  const strengthKey = score > 5.83 ? 'str_strong' : (score < 4.77 ? 'str_weak' : 'str_bal');
  
  let gejuTenGod = (WXT[mGZ.tg] === WXD[mGZ.dz]) ? SS_TABLE[ri][mGZ.tg] : ((WXT[yGZ.tg] === WXD[mGZ.dz]) ? SS_TABLE[ri][yGZ.tg] : SS_TABLE[ri][HIDDEN_MAIN_QI[mGZ.dz]]);
  let gejuStr = ['比肩','劫財'].includes(gejuTenGod) ? t(gejuTenGod==='比肩'?'pat_jianlu':'pat_yangren') : t('ten')[gejuTenGod]+t('pat_suffix');

  // 安全聲明數組，徹底清除運行時卡死
  const tgWeightArr = [1.2, 0.9, 1.0, 0.7, 0.8, 0.9, 0.8, 0.6, 1.1, 0.9];
  const dzWeightArr = [1.6, 0.6, 0.7, 1.0, 0.9, 1.6, 1.0, 0.8, 0.8, 0.9, 0.6, 1.5];
  const totalBone = tgWeightArr[yGZ.tg] + dzWeightArr[yGZ.dz] + tgWeightArr[mGZ.tg] + dzWeightArr[mGZ.dz] + tgWeightArr[dGZ.tg] + dzWeightArr[dGZ.dz] + tgWeightArr[hGZ.tg] + dzWeightArr[hGZ.dz];

  if(document.getElementById('mp-name')) document.getElementById('mp-name').textContent=USER.name;
  if(document.getElementById('mp-birthday')) document.getElementById('mp-birthday').textContent=`${USER.year}年${USER.month}月${USER.day}日 ${USER.hour}時${USER.minute}分`;
  if(document.getElementById('mp-gender')) document.getElementById('mp-gender').textContent = USER.gender === '男' ? t('val_male') : t('val_female');
  if(document.getElementById('mp-rizhu')) document.getElementById('mp-rizhu').textContent=`${t('tg_name')[dGZ.tg]}${t('dz_name')[dGZ.dz]}`;
  if(document.getElementById('mp-geju')) document.getElementById('mp-geju').textContent=gejuStr;
  if(document.getElementById('mp-qiangruo')) document.getElementById('mp-qiangruo').textContent=t(strengthKey);
  if(document.getElementById('mp-bone')) document.getElementById('mp-bone').textContent=`${Math.floor(totalBone)}${t('bw_liang')}${Math.round((totalBone-Math.floor(totalBone))*10)}${t('bw_qian')}`;

  const g4=document.getElementById('bazi4-grid');
  if (g4) {
    g4.innerHTML=`<div class="b4-grp">${t('b4_grp')}</div>`;
    [
      {label:t('lbl_year'),tg:yGZ.tg,dz:yGZ.dz,tgTenRaw:SS_TABLE[ri][yGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[yGZ.dz]]},
      {label:t('lbl_month'),tg:mGZ.tg,dz:mGZ.dz,tgTenRaw:SS_TABLE[ri][mGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[mGZ.dz]]},
      {label:t('lbl_day'),tg:dGZ.tg,dz:dGZ.dz,tgTenRaw:'日主', dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[dGZ.dz]],colCls:'sz-rizhu'},
      {label:t('lbl_hour'),tg:hGZ.tg,dz:hGZ.dz,tgTenRaw:SS_TABLE[ri][hGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[hGZ.dz]]},
    ].forEach(p=>g4.insertAdjacentHTML('beforeend',pillarHTML(p)));
  }
}

function renderDayun(){
  const bst = correctSolarTime(USER.hour, USER.minute, USER.birthplace);
  const yGZ=getYrGZPrecise(USER.year, USER.month, USER.day, bst.hour, bst.minute);
  const dGZ=getDayGZ(USER.year, USER.month, USER.day); const ri=dGZ.tg;
  const dy=getDayun(USER.gender, USER.year, USER.month, USER.day, yGZ.tg);
  const nowY=new Date().getFullYear(); const curIdx=getCurrentDayunIdx(dy, USER.year, nowY);
  const cur=curIdx!==null?dy.list[curIdx]:null;

  if(document.getElementById('dy-startage')) document.getElementById('dy-startage').textContent=dy.startAge + t('age_start');
  if(document.getElementById('dy-dir')) document.getElementById('dy-dir').textContent=dy.fwd ? t('dir_fwd') : t('dir_rev');
  
  if(cur && document.getElementById('dy-current')){
    document.getElementById('dy-current').textContent=`${t('tg_name')[cur.tgIdx]}${t('dz_name')[cur.dzIdx]} · ${cur.age}${t('age_unit')}`;
  }
  const dyList = document.getElementById('dayun-list');
  if (dyList) {
    dyList.innerHTML=dy.list.map((item,i)=>{
      return `<div class="dy-item${i===curIdx?' current':''}">
        <div class="dy-gz"><span>${t('tg_name')[item.tgIdx]}</span><span>${t('dz_name')[item.dzIdx]}</span></div>
        <div class="dy-info"><div>${item.age}${t('age_unit')} · ${t('ten')[SS_TABLE[ri][item.tgIdx]]}</div></div>
      </div>`;
    }).join('');
  }
}

function switchTab(tab){
  ['jiari','mingpan','dayun'].forEach(t=>{ if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).style.display=t===tab?'block':'none'; });
  if(tab==='mingpan') renderMingpan(); if(tab==='dayun') renderDayun();
}

(function(){const c=document.getElementById('bg-canvas');if(!c)return;const ctx=c.getContext('2d');let W,H,stars=[];function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();addEventListener('resize',resize);for(let i=0;i<60;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2});function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(232,211,153,0.7)';stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();});requestAnimationFrame(draw);}draw();})();

setTimeout(() => { updateStaticUI(); renderJiari(); }, 120);
</script>
