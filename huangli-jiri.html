<style>
:root{--gold:#D4A843;--gold-b:#F0C96A;--gold-dim:rgba(212,168,67,0.18);--bg:#06050A;--text:#F0EAD6;--text-d:rgba(240,234,214,0.95);--text-f:rgba(240,234,214,0.75);--teal:#319795;--teal-dim:rgba(49,151,149,0.12);--jia:#5AB86C;--yi:#8ED49A;--bing:#E05030;--ding:#F09070;--wu:#C8942A;--ji:#D4B870;--geng:#B0B8C8;--xin:#D8DEE8;--ren:#4A8EC8;--gui:#80B4E0;}

.tg-jia{color:var(--jia);}.tg-yi{color:var(--yi);}.tg-bing{color:var(--bing);}.tg-ding{color:var(--ding);}.tg-wu{color:var(--wu);}.tg-ji{color:var(--ji);}.tg-geng{color:var(--geng);}.tg-xin{color:var(--xin);}.tg-ren{color:var(--ren);}.tg-gui{color:var(--gui);}
.dz-zi{color:#6AACDC;}.dz-chou{color:#C8A840;}.dz-yin{color:#5AB86C;}.dz-mao{color:#8ED49A;}.dz-chen{color:#B89840;}.dz-si{color:#E07050;}.dz-wu2{color:#E05030;}.dz-wei{color:#C8A060;}.dz-shen{color:#A0AABB;}.dz-you{color:#C8D0DC;}.dz-xu{color:#B08840;}.dz-hai{color:#80B4E0;}
#bg-canvas,.grid-ov,.scan{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grid-ov{z-index:1;background-image:linear-gradient(rgba(212,168,67,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,67,0.02) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);}
.scan{height:2px;z-index:2;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.4),transparent);animation:scan 9s linear infinite;}
@keyframes scan{0%{top:-2px}100%{top:100vh}}
.fp{position:fixed;pointer-events:none;z-index:2;border-radius:50%;animation:fu linear both;}
@keyframes fu{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:.7}90%{opacity:.3}100%{transform:translateY(-100vh) scale(.2);opacity:0}}
#landing-view { position:relative; z-index:50; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
.lp-box { background:rgba(7,6,12,0.9); border:1px solid rgba(212,168,67,0.2); padding:35px 30px; border-radius:4px; max-width:460px; width:100%; box-shadow:0 15px 40px rgba(0,0,0,0.6); }
.lp-title { font-family:'Ma Shan Zheng',cursive; font-size:2.2rem; color:var(--gold); text-align:center; margin-bottom:5px; }
.lp-sub { font-size:0.7rem; color:var(--text-f); text-align:center; letter-spacing:0.2em; margin-bottom:25px; }
.lp-box label { display:block; font-size:0.7rem; color:var(--gold); margin-bottom:5px; letter-spacing:0.1em; }
.lp-box input, .lp-box select { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(212,168,67,0.2); color:var(--text); padding:10px; font-size:0.9rem; outline:none; margin-bottom:15px; border-radius:2px; }
.lp-box input:focus, .lp-box select:focus { border-color:var(--gold); }
.lp-row { display:flex; gap:10px; }
.lp-row > div { flex:1; }
.lp-btn { width:100%; background:linear-gradient(160deg, #A0680A 0%, #D4A843 100%); color:#000; border:none; padding:12px; font-size:0.9rem; font-weight:bold; cursor:pointer; margin-top:10px; letter-spacing:0.2em; border-radius:2px; }
.page{position:relative;z-index:10;min-height:100vh;padding-bottom:80px;width:100%;max-width:900px;margin:0 auto; display:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid rgba(212,168,67,0.1); flex-wrap:wrap; gap:12px;}
.logo-wrap { flex-shrink: 0; }
.app-logo{font-family:'Ma Shan Zheng',cursive;font-size:1.4rem;letter-spacing:0.18em;background:linear-gradient(160deg,#F8EFC0 0%,#D4A843 40%,#A0680A 70%,#D4A843 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; white-space:nowrap;}
.app-sub{font-size:0.55rem;letter-spacing:0.4em;color:var(--text-f);margin-top:2px; white-space:nowrap;}
.top-controls{display:flex;align-items:center;gap:12px; flex-wrap:wrap;}
.tab-nav{display:flex;gap:2px;}
.tab-btn{background:none;border:1px solid transparent;font-size:0.6rem;letter-spacing:0.2em;color:var(--text-d);cursor:pointer;padding:6px 14px;transition:all .22s;border-radius:1px;}
.tab-btn.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(212,168,67,0.06);}
.lang-select{background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.2);color:var(--gold);font-family:'Noto Serif TC',serif;font-size:0.55rem;padding:5px 8px;border-radius:3px;outline:none;cursor:pointer;letter-spacing:0.1em;}
.lang-select option{background:#0D0B18;color:var(--text);}
.settings-btn{background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.2);color:var(--gold);padding:4px 8px;border-radius:3px;cursor:pointer;font-size:0.65rem;}

.date-today-btn{font-size:0.5rem;letter-spacing:0.25em;color:rgba(212,168,67,0.5);border:1px solid rgba(212,168,67,0.18);background:none;cursor:pointer;padding:3px 10px;margin-top:6px;transition:all .2s;display:inline-block;}
.sect-hd{display:flex;align-items:center;gap:10px;padding:0 20px;margin-bottom:10px;}
.sect-hd::before,.sect-hd::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.18));}
.sect-hd::after{transform:scaleX(-1);}
.sect-hd-txt{font-size:0.55rem;letter-spacing:0.5em;color:rgba(212,168,67,0.55);white-space:nowrap;}
.sizhu-outer{padding:0 16px;margin-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-webkit-mask-image:linear-gradient(to right,transparent,black 20px,black calc(100% - 20px),transparent);}
.sizhu-outer::-webkit-scrollbar{display:none;}
.sizhu-main{display:grid;grid-template-columns:repeat(4,1fr) 1px repeat(5,1fr);min-width:680px;border:1px solid rgba(212,168,67,0.14);background:rgba(0,0,0,0.28);position:relative;}
.grp-row{grid-column:1/-1;display:grid;grid-template-columns:4fr 1px 1fr 1fr 1fr 1fr 1fr;}
.grp-cell{text-align:center;font-size:0.5rem;letter-spacing:0.32em;padding:5px 2px 4px;border-bottom:1px solid rgba(212,168,67,0.08);}
.grp-bazi{color:rgba(212,168,67,0.65);background:rgba(212,168,67,0.035);}
.grp-sep{background:rgba(212,168,67,0.1);padding:0;}
.grp-dayun{color:rgba(220,120,60,0.7);background:rgba(220,120,60,0.03);}
.grp-liuyear{color:rgba(150,100,220,0.7);background:rgba(150,100,220,0.03);}
.grp-liumonth{color:rgba(80,160,220,0.7);background:rgba(80,160,220,0.03);}

.grp-liuhour{color:rgba(49,151,149,0.9);background:var(--teal-dim);border-bottom:1px solid rgba(49,151,149,0.25);}
.sz-vsep{background:rgba(212,168,67,0.12);width:1px;grid-row:span 6;}
.sz-col{display:flex;flex-direction:column;align-items:center;border-right:1px solid rgba(212,168,67,0.07);cursor:pointer;transition:background .18s;position:relative;}
.sz-col:last-child{border-right:none;}
.sz-col:hover,.sz-col.open{background:rgba(212,168,67,0.045);}
.sz-col.sz-liuhour{background:var(--teal-dim);}
.sz-col.sz-liuhour:hover,.sz-col.sz-liuhour.open{background:rgba(49,151,149,0.18);}
.sz-head{width:100%;text-align:center;font-size:0.48rem;letter-spacing:0.18em;color:var(--text-f);padding:5px 2px 4px;border-bottom:1px solid rgba(212,168,67,0.07);}
.sz-tg,.sz-dz{font-family:'Ma Shan Zheng',cursive;font-size:1.7rem;line-height:1;}
.sz-tg{padding:2px 4px 1px;} .sz-dz{padding:1px 4px 3px;}
.sz-ten{font-size:0.48rem;letter-spacing:0.06em;padding:3px 2px;text-align:center;min-height:18px;}
.sz-nayin{font-size:0.44rem;color:var(--text-f);padding:2px 3px 6px;text-align:center;}
.ten-qisha{color:#D05050;} .ten-zhengguang{color:#7080B8;} .ten-pianyin{color:#9060C0;} .ten-zhengyin{color:#A878D0;} .ten-shishen{color:#60A870;} .ten-shangguan{color:#50B880;} .ten-piancai{color:#9090C0;} .ten-zhengcai{color:#8090C0;} .ten-bijian{color:rgba(200,170,100,0.6);} .ten-jiecai{color:rgba(180,145,80,0.6);} .ten-rizhu{color:rgba(212,168,67,0.75);}

.sz-col.open .sz-detail{display:block;}

.sd-val{font-size:0.6rem;color:var(--text-d);}
.sd-div{height:1px;background:rgba(212,168,67,0.08);margin:7px 0;}
.rel-outer{padding:4px 16px 10px;min-width:640px;}
.rel-badges{display:flex;gap:3px;flex-wrap:wrap;}
.rel-badge{font-size:0.5rem;padding:3px 9px;border:1px solid;}
.rb-he{color:#7DE09A;border-color:rgba(125,224,154,0.28);background:rgba(125,224,154,0.04);}
.rb-chong{color:#F07840;border-color:rgba(240,120,64,0.28);background:rgba(240,120,64,0.04);}
.rb-hai{color:#B090D0;border-color:rgba(176,144,208,0.28);background:rgba(176,144,208,0.04);}

.ss-grid{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 14px;}
.ss-tag{font-size:0.58rem;padding:4px 11px;border:1px solid;cursor:pointer;color:var(--text-d);}
.ss-ji{border-color:rgba(125,224,154,0.35);background:rgba(125,224,154,0.08);}
.ss-xiong{border-color:rgba(240,120,64,0.35);background:rgba(240,120,64,0.08);}
.ss-zhong{border-color:rgba(212,168,67,0.35);background:rgba(212,168,67,0.08);}
.interp-list{padding:0 16px;display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}

.ic.open .ic-body{display:block;}

.divider{height:1px;margin:14px 20px;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.13),transparent);}
.datepicker-bar{display:flex;align-items:center;gap:6px;padding:10px 16px 8px;background:rgba(0,0,0,0.18);border-bottom:1px solid rgba(212,168,67,0.07);}
.dp-label{font-size:0.52rem;color:rgba(212,168,67,0.45);letter-spacing:0.3em;flex-shrink:0;}
.dp-drums{display:flex;gap:2px;flex:1;justify-content:center;}
.dp-drum-wrap{display:flex;flex-direction:column;align-items:center;}
.dp-drum-lbl{font-size:0.42rem;color:var(--text-f);margin-bottom:2px;}
.dp-drum-box{position:relative;height:72px;width:48px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.12);}
.dp-drum{height:100%;width:100%;overflow-y:auto;scroll-snap-type:y mandatory;overscroll-behavior-y:contain;scrollbar-width:none;-ms-overflow-style:none;}
.dp-drum::-webkit-scrollbar{display:none;}
.dp-drum-inner{padding:24px 0;display:flex;flex-direction:column;}
.dp-drum-item{height:24px;min-height:24px;display:flex;align-items:center;justify-content:center;font-size:0.78rem;color:var(--text-f);scroll-snap-align:center;}
.dp-drum-item.active{color:var(--gold);font-weight:500;}
.dp-drum-item.near{color:var(--text-f);opacity:0.8;}
.dp-drum-hl{position:absolute;top:24px;left:0;right:0;height:24px;border-top:1px solid rgba(212,168,67,0.2);border-bottom:1px solid rgba(212,168,67,0.2);background:rgba(212,168,67,0.04);pointer-events:none;}
.dp-goto-today{font-size:0.48rem;color:rgba(212,168,67,0.6);border:1px solid rgba(212,168,67,0.14);background:none;padding:4px 10px;cursor:pointer;}

.ht-head{background:rgba(212,168,67,0.04);}
.ht-hcell{font-size:0.48rem;color:var(--text-f);padding:6px 4px;text-align:center;}
.ht-row.ht-cur{background:rgba(212,168,67,0.04);}

.ht-gz{font-family:'Ma Shan Zheng',cursive;font-size:0.85rem;}

.info-row:last-child{margin-bottom:0;}
.ir-lbl{color:rgba(240,234,214,0.75); font-weight:500;} 
.ir-val{color:var(--text-d);} 
.ir-val.gold{color:var(--gold);}
.bazi4-grid{margin:0 16px 16px;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid rgba(212,168,67,0.12);background:rgba(0,0,0,0.22);}
.b4-grp{grid-column:span 4;text-align:center;font-size:0.5rem;color:rgba(212,168,67,0.6);padding:5px;background:rgba(212,168,67,0.03);border-bottom:1px solid rgba(212,168,67,0.08);}
.dayun-list{margin:0 16px;display:flex;flex-direction:column;gap:5px;}
.dy-item{display:flex;align-items:center;gap:14px;padding:9px 15px;background:rgba(7,6,12,0.7);border:1px solid rgba(212,168,67,0.07);}

.dy-info{flex:1;} .dy-age{font-size:0.62rem;color:var(--text-d);} .dy-years{font-size:0.53rem;color:var(--text-f);margin-top:2px;}
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(6,5,10,0.95); z-index:9999; padding:24px; overflow-y:auto; backdrop-filter:blur(5px); }

.modal-sub { color:var(--text-f); font-size:0.65rem; text-align:center; letter-spacing:0.1em; margin-bottom: 25px; }

.modal-box input, .modal-box select { width:100%; padding:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(212,168,67,0.2); color:#fff; font-size:0.9rem; outline:none; border-radius:2px; margin-bottom: 15px; }

<body>
<canvas id="bg-canvas"></canvas>
<div class="grid-ov"></div><div class="scan"></div>

<div id="landing-view">
  <div class="lp-box">
    <div class="lp-title" data-hl="lp_title">排盤建檔</div>
    <div class="lp-sub" data-hl="lp_sub">輸入您的出生資訊以生成真太陽時命盤</div>
    <form id="landingForm" onsubmit="submitLandingForm(event)">
      <div>
        <label data-hl="modal_name">姓名 / 暱稱</label>
        <input type="text" id="lp-name" required placeholder="例如：陳先生">
      </div>
      <div>
        <label data-hl="modal_gender">性別</label>
        <select id="lp-gender">

function getDayOfYear(y, m, d) {
  const now = new Date(y, m - 1, d);
  const start = new Date(y, 0, 0);
  const diff = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  return Math.floor(diff / oneDay);
}

function getTrueSolarTime(year, month, day, hour, minute, longitude, tzOffset, isDST) {
  let minTotal = hour * 60 + minute;
  if (isDST) minTotal -= 60;
  
  const standardMeridian = tzOffset * 15;
  const lonDiff = longitude - standardMeridian;
  minTotal += lonDiff * 4;

  const n = getDayOfYear(year, month, day);
  const B = (2 * Math.PI * (n - 81)) / 365.24;
  const eot = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  minTotal += eot;

  let dayOffset = 0;
  if (minTotal >= 1440) { dayOffset = 1; minTotal -= 1440; } 
  else if (minTotal < 0) { dayOffset = -1; minTotal += 1440; }

  return { hour: Math.floor(minTotal / 60), minute: Math.round(minTotal % 60), dayOffset: dayOffset };
}

function getAdjustedSolarDate(y, m, d, h, min, lon, tz, dst) {
  const tst = getTrueSolarTime(y, m, d, h, min, lon, tz, dst);
  let adjDate = new Date(y, m - 1, d);
  adjDate.setDate(adjDate.getDate() + tst.dayOffset);
  return { year: adjDate.getFullYear(), month: adjDate.getMonth() + 1, day: adjDate.getDate(), hour: tst.hour, minute: tst.minute };
}

function getLunarMD(date) {
  try {
    const parts = new Intl.DateTimeFormat('en-US-u-ca-chinese', { month: 'numeric', day: 'numeric' }).formatToParts(date);
    let m=1, d=1;
    for (let p of parts) {
      if (p.type === 'month') m = parseInt(p.value.replace(/[^0-9]/g, ''), 10);
      if (p.type === 'day') d = parseInt(p.value, 10);
    }
    return { m: m||1, d: d||1 };
  } catch(e) { return { m:1, d:1 }; }
}

  if (startAge > 1) {
    list.push({ tgIdx: mGZ.tg, dzIdx: mGZ.dz, age: 1, ageStr: `1-${startAge - 1}${t('age_unit')}`, yrStr: `${year} — ${year + startAge - 2}` });
  }
  for (let i = 0; i < 8; i++) {
    const s = fwd ? i + 1 : -(i + 1);
    let age = startAge + i * 10;
    list.push({ tgIdx: ((mGZ.tg + s) % 10 + 10) % 10, dzIdx: ((mGZ.dz + s) % 12 + 12) % 12, age: age, ageStr: `${age}${t('age_unit')}`, yrStr: `${year + age - 1} — ${year + age + 8}` });
  }
  return { startAge, fwd, list };
}

function getCurrentDayunIdx(dy, birthYear, nowYear) {
  const age = nowYear - birthYear + 1;

  }
  return cur;
}

function getDaysInMonth(y,m){return new Date(y,m,0).getDate();}
function initDrums(){
  const d=curDate;const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate(),h=d.getHours();
  const years=[],months=[],days=[],hours=[];
  for(let i=y-5;i<=y+5;i++)years.push(i);
  for(let i=1;i<=12;i++)months.push(i);
  for(let i=1;i<=getDaysInMonth(y,m);i++)days.push(i);
  for(let i=0;i<24;i++)hours.push(i);
  
  buildDrum('drum-year-inner',years,y);
  buildDrum('drum-month-inner',months,m);
  buildDrum('drum-day-inner',days,day);
  buildDrum('drum-hour-inner',hours,h);
  
  setupDrumEvents('drum-year','drum-year-inner',years,()=>getSelectedVal('drum-year-inner'),v=>{curDate.setFullYear(v);rebuildDayDrum();renderJiari();});
  setupDrumEvents('drum-month','drum-month-inner',months,()=>getSelectedVal('drum-month-inner'),v=>{curDate.setMonth(v-1);rebuildDayDrum();renderJiari();});
  setupDrumEvents('drum-day','drum-day-inner',days,()=>getSelectedVal('drum-day-inner'),v=>{curDate.setDate(v);renderJiari();});
  setupDrumEvents('drum-hour','drum-hour-inner',hours,()=>getSelectedVal('drum-hour-inner'),v=>{curDate.setHours(v);renderJiari();});
}
function getSelectedVal(innerId){const el=document.querySelector(`#${innerId} .dp-drum-item.active`);return el?parseInt(el.dataset.val):null;}

function rebuildDayDrum(){
  const y=curDate.getFullYear(),m=curDate.getMonth()+1;
  const safeDay=Math.min(curDate.getDate(),getDaysInMonth(y,m));
  curDate.setDate(safeDay);const days=[];
  for(let i=1;i<=getDaysInMonth(y,m);i++)days.push(i);
  buildDrum('drum-day-inner',days,safeDay);
  setupDrumEvents('drum-day','drum-day-inner',days,()=>getSelectedVal('drum-day-inner'),v=>{curDate.setDate(v);renderJiari();});
}

function updateDrumHighlight(innerId, val) {
  document.querySelectorAll(`#${innerId} .dp-drum-item`).forEach(el => {
    const v = parseInt(el.dataset.val);
    el.classList.toggle('active', v === val);
    el.classList.toggle('near', v === val - 1 || v === val + 1);
  });
}

function setupDrumEvents(drumId, innerId, items, getVal, onChange) {
  const drum = document.getElementById(drumId);
  if (!drum) return;
  let scrollTimeout;
  let lastNotifiedVal = getVal(); 

  drum.addEventListener('wheel', (e) => {
    e.preventDefault(); 
    const currentIdx = Math.round(drum.scrollTop / 24);
    const targetIdx = Math.max(0, Math.min(items.length - 1, currentIdx + (e.deltaY > 0 ? 1 : -1)));
    drum.scrollTo({ top: targetIdx * 24, behavior: 'smooth' });
  }, { passive: false });

  drum.onscroll = () => {
    const idx = Math.round(drum.scrollTop / 24);
    const safeIdx = Math.max(0, Math.min(items.length - 1, idx));
    const val = items[safeIdx];

    updateDrumHighlight(innerId, val);

    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      if (lastNotifiedVal !== val) {
         lastNotifiedVal = val;
         onChange(val);
      }
    }, 150); 
  };
}

      interpList.innerHTML = combinedInterps.map(s => {

        const title = s.customTitle ? `${s.customTitle} · ${info.n || info}` : (info.n || info);
        // 若為關係解讀，隱藏「十神引擎」的提示以保持版面整潔
        const apiHtml = s.customTitle ? '' : `<div class="ic-api-engine">${getDynamicReading(s.type, SS_TABLE[ri][ldGZ.tg])}<span class="ic-hint">${t('api_hint_replaced')}</span></div>`;
        return `<div class="ic" id="ic-${s.apiKey}" onclick="this.classList.toggle('open')"><div class="ic-head"><div class="ic-title"><span class="ic-dot" style="background:${s.type==='ji'?'#7DE09A':s.type==='xiong'?'#F07840':'#D4A843'}"></span>${title}</div><span class="ic-arrow">∨</span></div><div class="ic-body"><div>${info.d||''}</div>${apiHtml}</div></div>`;
      }).join('');
    }

    const supports = {'木':['木','水'],'火':['火','木'],'土':['土','火'],'金':['金','土'],'水':['水','金']}[WXT[ri]];
    let score = 0;
    const weights = [0.5, 0.5, 1.5, 4.0, 0, 2.5, 1.0, 1.0];
    [yGZ.tg, yGZ.dz, mGZ.tg, mGZ.dz, dGZ.tg, dGZ.dz, hGZ.tg, hGZ.dz].forEach((item, i) => { if(i!==4 && supports.includes(i % 2 === 0 ? WXT[item] : WXD[item])) score += weights[i]; });
    
    renderFortuneGrid(ri, ldGZ, lmGZ, lyGZ, ss, score);
    renderHourTable(ri, ldGZ);

  } catch (e) { console.error("今日排盤拼接失敗", e); }
}

function renderMingpan(){
  try {
    const adj = getAdjustedSolarDate(USER.year, USER.month, USER.day, USER.hour, USER.minute, USER.longitude, USER.timezone, USER.isDST);
    const yGZ = getYrGZPrecise(adj.year, adj.month, adj.day, adj.hour, adj.minute);
    const mGZ = getMoGZPrecise(adj.year, adj.month, adj.day, adj.hour, adj.minute);
    const dGZ = getDayGZ(adj.year, adj.month, adj.day, adj.hour);
    const hGZ = getHrGZ(adj.hour, dGZ.tg); const ri=dGZ.tg;

    const supports = {'木':['木','水'],'火':['火','木'],'土':['土','火'],'金':['金','土'],'水':['水','金']}[WXT[ri]];
    let score = 0;
    
    const weights = [0.5, 0.5, 1.5, 4.0, 0, 2.5, 1.0, 1.0];
    [yGZ.tg, yGZ.dz, mGZ.tg, mGZ.dz, dGZ.tg, dGZ.dz, hGZ.tg, hGZ.dz].forEach((item, i) => {
      if(i === 4) return;
      if(supports.includes(i % 2 === 0 ? WXT[item] : WXD[item])) score += weights[i];
    });
    
    const strengthKey = score > 4.2 ? 'str_strong' : (score < 3.8 ? 'str_weak' : 'str_bal');
    
    let gejuTenGod = (WXT[mGZ.tg] === WXD[mGZ.dz]) ? SS_TABLE[ri][mGZ.tg] : ((WXT[yGZ.tg] === WXD[mGZ.dz]) ? SS_TABLE[ri][yGZ.tg] : SS_TABLE[ri][HIDDEN_MAIN_QI[mGZ.dz]]);
    let gejuStr = ['比肩','劫財'].includes(gejuTenGod) ? t(gejuTenGod==='比肩'?'pat_jianlu':'pat_yangren') : t('ten')[gejuTenGod]+t('pat_suffix');

    let dmWx = WXT[ri];
    let monthDz = mGZ.dz;
    let xiyongArr = [];

    if (strengthKey === 'str_strong') {
      xiyongArr = {'木':['火','土','金'],'火':['土','金','水'],'土':['金','水','木'],'金':['水','木','火'],'水':['木','火','土']}[dmWx];
    } else {
      xiyongArr = {'木':['水','木'],'火':['木','火'],'土':['火','土'],'金':['土','金'],'水':['金','水']}[dmWx];
    }
    
    if ([11, 0, 1].includes(monthDz)) { 
        if(!xiyongArr.includes('火')) xiyongArr.unshift('火'); 
    }
    if ([5, 6, 7].includes(monthDz)) { 
        if(!xiyongArr.includes('水')) xiyongArr.unshift('水'); 
    }
    if ([8, 9, 10].includes(monthDz)) {
        if (ri === 0) {
            xiyongArr = ['火', '木']; 
        } else if (ri === 1) {
            if (strengthKey === 'str_weak') { xiyongArr = ['水', '木']; }
        }
    }
    xiyongArr = [...new Set(xiyongArr)];

    let baseDate = new Date(adj.year, adj.month - 1, adj.day);
    let lunarMD = getLunarMD(baseDate);
    let yIdx = (adj.year - 4) % 60;
    if (yIdx < 0) yIdx += 60;
    
    let bwTotal = BW_Y[yIdx] + BW_M[lunarMD.m] + BW_D[lunarMD.d] + BW_H[hGZ.dz];
    let boneLiang = Math.floor(bwTotal);
    let boneQian = Math.round((bwTotal - boneLiang) * 10);
    if (boneQian >= 10) { boneLiang += 1; boneQian -= 10; }

    const tyTg = (mGZ.tg + 1) % 10;
    const tyDz = (mGZ.dz + 3) % 12;
    if(document.getElementById('mp-taiyuan')) document.getElementById('mp-taiyuan').textContent = t('tg_name')[tyTg] + t('dz_name')[tyDz];

    let offset = 10 - dGZ.tg;
    let kw1 = (dGZ.dz + offset) % 12;
    let kw2 = (kw1 + 1) % 12;
    if(document.getElementById('mp-kongwang')) document.getElementById('mp-kongwang').textContent = t('dz_name')[kw1] + t('dz_name')[kw2];

    if(document.getElementById('mp-name')) document.getElementById('mp-name').textContent=USER.name;
    
    if (currentLang === 'en') {
      document.getElementById('mp-birthday').textContent=`${adj.year}-${String(adj.month).padStart(2,'0')}-${String(adj.day).padStart(2,'0')} ${String(adj.hour).padStart(2, '0')}:${String(adj.minute).padStart(2,'0')}`;
    } else if (currentLang === 'zh-CN') {
      document.getElementById('mp-birthday').textContent=`${adj.year}年${adj.month}月${adj.day}日 ${adj.hour}时${String(adj.minute).padStart(2,'0')}分`;
    } else {
      document.getElementById('mp-birthday').textContent=`${adj.year}年${adj.month}月${adj.day}日 ${adj.hour}時${String(adj.minute).padStart(2,'0')}分`;
    }
    
    if(document.getElementById('mp-gender')) document.getElementById('mp-gender').textContent = USER.gender === '男' ? (t('val_male') || '男') : (t('val_female') || '女');
    let yyTxt = [t('yang'),t('yin'),t('yang'),t('yin'),t('yang'),t('yin'),t('yang'),t('yin'),t('yang'),t('yin')][dGZ.tg] || ''; 
    
    if(document.getElementById('mp-rizhu')) document.getElementById('mp-rizhu').textContent=`${t('tg_name')[dGZ.tg]}${t('dz_name')[dGZ.dz]} · ${yyTxt}${t('wx_'+WXT[dGZ.tg])}`;
    if(document.getElementById('mp-geju')) document.getElementById('mp-geju').textContent=gejuStr;
    
    if(document.getElementById('mp-xiyong')) document.getElementById('mp-xiyong').textContent = xiyongArr.map(x=>t('wx_'+x)).join(currentLang==='en'?', ':'、');
    if(document.getElementById('mp-qiangruo')) document.getElementById('mp-qiangruo').textContent=t(strengthKey);
    if(document.getElementById('mp-bone')) document.getElementById('mp-bone').textContent=`${boneLiang}${t('bw_liang')}${boneQian}${t('bw_qian')}`;

    const g4=document.getElementById('bazi4-grid');
    if (g4) {
      g4.innerHTML=`<div class="b4-grp">${t('b4_grp')}</div>`;
      [
        {label:t('lbl_year'),tg:yGZ.tg,dz:yGZ.dz,tgTenRaw:SS_TABLE[ri][yGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[yGZ.dz]]},
        {label:t('lbl_month'),tg:mGZ.tg,dz:mGZ.dz,tgTenRaw:SS_TABLE[ri][mGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[mGZ.dz]]},
        {label:t('lbl_day'),tg:dGZ.tg,dz:dGZ.dz,tgTenRaw:'日主', dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[dGZ.dz]],colCls:'sz-rizhu'},
        {label:t('lbl_hour'),tg:hGZ.tg,dz:hGZ.dz,tgTenRaw:SS_TABLE[ri][hGZ.tg], dzTenRaw:SS_TABLE[ri][HIDDEN_MAIN_QI[hGZ.dz]]},
      ].forEach(p=>g4.insertAdjacentHTML('beforeend',pillarHTML(p)));
    }
  } catch (e) { console.error("命盤檔案解讀崩潰", e); }
}

function renderDayun(){
  try {
    const adj = getAdjustedSolarDate(USER.year, USER.month, USER.day, USER.hour, USER.minute, USER.longitude, USER.timezone, USER.isDST);
    const yGZ = getYrGZPrecise(adj.year, adj.month, adj.day, adj.hour, adj.minute);
    const dGZ = getDayGZ(adj.year, adj.month, adj.day, adj.hour); const ri=dGZ.tg;
    
    const dy = getDayun(USER.gender, adj.year, adj.month, adj.day, yGZ.tg);
    const nowY=new Date().getFullYear(); const curIdx=getCurrentDayunIdx(dy, adj.year, nowY);
    const cur=curIdx!==null?dy.list[curIdx]:null;

    if(document.getElementById('dy-startage')) document.getElementById('dy-startage').textContent=dy.startAge + t('age_start');
    if(document.getElementById('dy-dir')) document.getElementById('dy-dir').textContent=dy.fwd ? t('dir_fwd') : t('dir_rev');
    
    if(cur && document.getElementById('dy-current')){
      document.getElementById('dy-current').textContent=`${t('tg_name')[cur.tgIdx]}${t('dz_name')[cur.dzIdx]} · ${cur.age}${t('age_unit')}`;
    }
    const dyList = document.getElementById('dayun-list');
    if (dyList) {
      dyList.innerHTML=dy.list.map((item,i)=>{
        return `<div class="dy-item${i===curIdx?' current':''}">
          <div class="dy-gz"><span>${t('tg_name')[item.tgIdx]}</span><span>${t('dz_name')[item.dzIdx]}</span></div>
          <div class="dy-info"><div class="dy-age">${item.ageStr} · ${t('ten')[SS_TABLE[ri][item.tgIdx]]}</div><div class="dy-years">${item.yrStr}</div></div>
        </div>`;
      }).join('');
    }
  } catch (e) { console.error("大運隊列重構崩潰", e); }
}

function shiftDay(d){ curDate.setDate(curDate.getDate()+d); initDrums(); renderJiari(); }
function goToday(){ curDate=new Date(); initDrums(); renderJiari(); }
function scrollToInterp(id){ const el=document.getElementById(id); if(el){el.classList.add('open');setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),50);} }

function switchTab(tab){
  ['jiari','mingpan','dayun'].forEach(t=>{ if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).style.display=t===tab?'block':'none'; });
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{ btn.classList.toggle('active', ['jiari','mingpan','dayun'][i]===tab); });
  if(tab==='mingpan') renderMingpan(); if(tab==='dayun') renderDayun();
}

(function(){const c=document.getElementById('bg-canvas');if(!c)return;const ctx=c.getContext('2d');let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();addEventListener('resize',resize);function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';requestAnimationFrame(draw);}draw();})();

document.addEventListener("DOMContentLoaded", () => {
  const langSelects = document.querySelectorAll('.lang-select');
  langSelects.forEach(el => el.value = currentLang);

  setTimeout(() => { 
    updateStaticUI(); 
    checkAndLoadUser();
  }, 50);
});
</script>
