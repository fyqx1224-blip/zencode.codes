<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻排盘 - ZenCode</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        :root {
            --zc-bg-main: #050505;
            --zc-bg-panel: #0d0c11;
            --zc-gold-light: #e6c587;
            --zc-gold-dark: #8a7342;
            --zc-text-main: #b3b3b3;
            --zc-text-muted: #666666;
            --zc-border: #2a2a35;
        }

        body {
            background-color: var(--zc-bg-main);
            color: var(--zc-text-main);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0; padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #050505 80%);
            min-height: 100vh;
        }

        .page-header { text-align: center; padding: 4rem 0 2rem; }
        .page-title { color: var(--zc-gold-light); font-size: 2.5rem; font-family: "STZhongsong", serif; letter-spacing: 6px; margin: 0 0 10px 0; }
        .page-subtitle { color: var(--zc-gold-dark); font-size: 0.9rem; letter-spacing: 4px; }

        .zencode-panel {
            max-width: 720px; margin: 0 auto 3rem; background-color: var(--zc-bg-panel);
            border: 1px solid var(--zc-border); padding: 2.5rem; position: relative;
            transition: max-width 0.4s ease;
        }
        .zencode-panel::before, .zencode-panel::after { content: ''; position: absolute; width: 15px; height: 15px; border: 1px solid var(--zc-gold-dark); }
        .zencode-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .zencode-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .divination-info {
            border-bottom: 1px dashed var(--zc-gold-dark); padding-bottom: 1.5rem; margin-bottom: 2rem;
            font-family: "Courier New", Courier, monospace; line-height: 2; color: var(--zc-text-main); font-size: 1.05rem;
        }
        .info-highlight { color: var(--zc-gold-light); }

        .zc-btn {
            background: transparent; border: 1px solid var(--zc-gold-dark); color: var(--zc-gold-light);
            padding: 12px 30px; cursor: pointer; transition: all 0.3s; font-family: inherit;
            font-size: 1.1rem; border-radius: 2px; width: 280px; letter-spacing: 2px;
        }
        .zc-btn:hover { background: var(--zc-gold-dark); color: var(--zc-bg-main); }
        .zc-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--zc-border); color: var(--zc-text-muted); background: transparent; }
        .zc-btn-text { background: none; border: none; color: var(--zc-text-muted); cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .zc-btn-text:hover { color: var(--zc-gold-light); }

        /* ════════ 3D 铜钱强力兼容样式 ════════ */
        .coins-container { display: flex; justify-content: center; gap: 25px; margin: 40px 0 30px; perspective: 1000px; -webkit-perspective: 1000px; }
        
        .coin {
            width: 60px; height: 60px; position: relative; 
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d; /* 苹果兼容核心 */
        }
        
        .coin-face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden; /* 苹果兼容核心 */
            background: radial-gradient(circle at 30% 30%, #f5d796 0%, #d4a843 40%, #8a7342 100%);
            border: 2px solid #5a4b2a; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
            color: #3b2f15; font-family: "STZhongsong", serif; font-weight: bold;
        }
        
        .coin-back { 
            transform: rotateY(180deg); 
            -webkit-transform: rotateY(180deg);
        }
        
        .coin-hole { width: 16px; height: 16px; background: var(--zc-bg-panel); border: 2px solid #5a4b2a; position: absolute; z-index: 2; }
