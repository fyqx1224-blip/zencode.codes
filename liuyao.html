<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻排盘 - ZenCode</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        /* --- ZenCode 核心视觉变量 --- */
        :root {
            --zc-bg-main: #050505;
            --zc-bg-panel: #0d0c11;
            --zc-gold-light: #e6c587;
            --zc-gold-dark: #8a7342;
            --zc-text-main: #b3b3b3;
            --zc-text-muted: #666666;
            --zc-border: #2a2a35;
        }

        body {
            background-color: var(--zc-bg-main);
            color: var(--zc-text-main);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #050505 80%);
            min-height: 100vh;
        }

        /* --- 页面标题区 --- */
        .page-header {
            text-align: center;
            padding: 4rem 0 2rem;
        }
        .page-title {
            color: var(--zc-gold-light);
            font-size: 2.5rem;
            font-family: "STZhongsong", "SimSun", serif; /* 衬线体显高级 */
            letter-spacing: 6px;
            margin: 0 0 10px 0;
        }
        .page-subtitle {
            color: var(--zc-gold-dark);
            font-size: 0.9rem;
            letter-spacing: 4px;
        }

        /* --- 核心折角面板 --- */
        .zencode-panel {
            max-width: 850px;
            margin: 0 auto 3rem;
            background-color: var(--zc-bg-panel);
            border: 1px solid var(--zc-border);
            padding: 2.5rem;
            position: relative;
        }
        .zencode-panel::before, .zencode-panel::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 1px solid var(--zc-gold-dark);
        }
        .zencode-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .zencode-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* --- 排盘信息区 --- */
        .divination-info {
            border-bottom: 1px dashed var(--zc-gold-dark);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            font-family: "Courier New", Courier, monospace; /* 等宽保证对齐 */
            line-height: 2;
            color: var(--zc-text-main);
            font-size: 1.05rem;
        }
        .info-highlight {
            color: var(--zc-gold-light);
        }

        /* --- 六爻网格排版区 --- */
        .gua-grid {
            display: grid;
            grid-template-columns: 60px 1fr 1fr;
            gap: 30px;
            font-family: "Courier New", Courier, monospace;
            font-size: 1.1rem;
        }

        /* 六兽列垂直分布 */
        .beast-column {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-top: 36px; /* 与第一爻对齐 */
            padding-bottom: 4px;
            color: var(--zc-text-muted);
        }

        /* 卦象标题 */
        .gua-title {
            color: var(--zc-gold-light);
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 单爻行容器 */
        .yao-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 38px;
            margin-bottom: 10px;
        }

        /* 纯 CSS 爻象绘制 */
        .yao-symbol {
            width: 80px;
            height: 12px;
            display: flex;
            justify-content: space-between;
        }
        .yao-yang .line { width: 100%; height: 100%; background-color: var(--zc-gold-light); }
        .yao-yin .line { width: 42%; height: 100%; background-color: var(--zc-text-main); }
        
        .changing-mark {
            color: var(--zc-gold-dark);
            width: 30px;
            text-align: center;
            font-weight: bold;
        }
        
        .yao-text { color: var(--zc-text-main); width: 100px; }
        .yao-shishen { color: var(--zc-text-muted); width: 80px; }
        .yao-position { color: var(--zc-gold-dark); width: 30px; text-align: center;}
    </style>
</head>
<body>

    <div id="nav-container"></div>

    <div class="page-header">
        <h1 class="page-title">六爻排盘</h1>
        <div class="page-subtitle">· ZENCODE · 命运档案 ·</div>
    </div>

    <div class="zencode-panel">
        <div class="divination-info" id="dynamic-info">
            </div>

        <div class="gua-grid">
            
            <div class="beast-column">
                <span>白虎</span>
                <span>滕蛇</span>
                <span>勾陈</span>
                <span>朱雀</span>
                <span>青龙</span>
                <span>玄武</span>
            </div>

            <div>
                <div class="gua-title">兑宫：水山蹇</div>
                <div class="yao-row">
                    <span class="yao-shishen">父母丁未土</span>
                    <span class="yao-text">子孙戊子水</span>
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="changing-mark"></span>
                    <span class="yao-position"></span>
                </div>
                <div class="yao-row">
                    <span class="yao-shishen">兄弟丁酉金</span>
                    <span class="yao-text">父母戊戌土</span>
                    <div class="yao-symbol yao-yang"><div class="line"></div></div>
                    <span class="changing-mark">○→</span>
                    <span class="yao-position"></span>
                </div>
                <div class="yao-row">
                    <span class="yao-shishen">子孙丁亥水</span>
                    <span class="yao-text">兄弟戊申金</span>
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="changing-mark"></span>
                    <span class="yao-position">世</span>
                </div>
                <div class="yao-row">
                    <span class="yao-shishen">父母丁丑土</span>
                    <span class="yao-text">兄弟丙申金</span>
                    <div class="yao-symbol yao-yang"><div class="line"></div></div>
                    <span class="changing-mark"></span>
                    <span class="yao-position"></span>
                </div>
                <div class="yao-row">
                    <span class="yao-shishen">妻财丁卯木</span>
                    <span class="yao-text">官鬼丙午火</span>
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="changing-mark">×→</span>
                    <span class="yao-position"></span>
                </div>
                <div class="yao-row">
                    <span class="yao-shishen">官鬼丁巳火</span>
                    <span class="yao-text">父母丙辰土</span>
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="changing-mark"></span>
                    <span class="yao-position">应</span>
                </div>
            </div>

            <div>
                <div class="gua-title">坤宫：坤为地 (六冲)</div>
                <div class="yao-row">
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="yao-text">兄弟癸酉金</span>
                    <span class="yao-position">世</span>
                </div>
                <div class="yao-row">
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="yao-text">子孙癸亥水</span>
                    <span class="yao-position"></span>
                </div>
                <div class="yao-row">
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="yao-text">父母癸丑土</span>
                    <span class="yao-position"></span>
                </div>
                <div class="yao-row">
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="yao-text">妻财乙卯木</span>
                    <span class="yao-position">应</span>
                </div>
                <div class="yao-row">
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="yao-text">官鬼乙巳火</span>
                    <span class="yao-position"></span>
                </div>
                <div class="yao-row">
                    <div class="yao-symbol yao-yin"><div class="line"></div><div class="line"></div></div>
                    <span class="yao-text">父母乙未土</span>
                    <span class="yao-position"></span>
                </div>
            </div>

        </div>
    </div>

    <script src="nav.js"></script>
    <script src="i18n.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function updateDivineInfo() {
                if (typeof Lunar === 'undefined') {
                    document.getElementById('dynamic-info').innerHTML = "<span style='color:red'>历法库加载失败，请检查网络。</span>";
                    return;
                }

                const now = new Date();
                const d = Lunar.fromDate(now);
                
                // 组装格式化数据
                const solarDate = d.getSolar().toYmdHms();
                const gzYear = d.getYearInGanZhi();
                const gzMonth = d.getMonthInGanZhi();
                const gzDay = d.getDayInGanZhi();
                const gzTime = d.getTimeZhi();
                const xunKong = d.getDayXunKong();

                // 简单的起卦人信息模拟
                const html = `
                    <span class="info-highlight">当前测算：</span>排盘演示 (男测)<br>
                    <span class="info-highlight">公历时间：</span>${solarDate}<br>
                    <span class="info-highlight">干支历法：</span>${gzYear}年 ${gzMonth}月 ${gzDay}日 ${gzTime}时 <span style="color:var(--zc-text-muted)">（旬空：${xunKong}）</span>
                `;
                
                document.getElementById('dynamic-info').innerHTML = html;
            }

            // 初始化执行
            updateDivineInfo();
        });
    </script>
</body>
</html>
