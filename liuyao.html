<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻排盘 - ZenCode</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        /* --- ZenCode 核心视觉体系 --- */
        :root {
            --zc-bg-main: #050505;
            --zc-bg-panel: #0d0c11;
            --zc-gold-light: #e6c587;
            --zc-gold-dark: #8a7342;
            --zc-text-main: #b3b3b3;
            --zc-text-muted: #666666;
            --zc-border: #2a2a35;
        }

        body {
            background-color: var(--zc-bg-main);
            color: var(--zc-text-main);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #050505 80%);
            min-height: 100vh;
        }

        .page-header { text-align: center; padding: 3rem 0 1.5rem; }
        .page-title { color: var(--zc-gold-light); font-size: 2.2rem; font-family: "STZhongsong", serif; letter-spacing: 6px; margin: 0 0 10px 0; }
        .page-subtitle { color: var(--zc-gold-dark); font-size: 0.85rem; letter-spacing: 4px; }

        .zencode-panel {
            max-width: 850px; margin: 0 auto 3rem; background-color: var(--zc-bg-panel);
            border: 1px solid var(--zc-border); padding: 2.5rem; position: relative;
            transition: all 0.4s ease;
        }
        .zencode-panel::before, .zencode-panel::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 1px solid var(--zc-gold-dark);
        }
        .zencode-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .zencode-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .divination-info {
            border-bottom: 1px dashed var(--zc-gold-dark); padding-bottom: 1.2rem;
            margin-bottom: 1.8rem; font-family: "Courier New", Courier, monospace;
            line-height: 1.8; color: var(--zc-text-main); font-size: 1rem;
        }
        .info-highlight { color: var(--zc-gold-light); }

        .zc-btn {
            background: transparent; border: 1px solid var(--zc-gold-dark); color: var(--zc-gold-light);
            padding: 12px 24px; cursor: pointer; transition: all 0.3s; font-family: inherit;
            font-size: 1.05rem; border-radius: 2px; width: 100%; max-width: 280px; letter-spacing: 2px;
        }
        .zc-btn:hover { background: var(--zc-gold-dark); color: var(--zc-bg-main); }
        .zc-btn-text { background: none; border: none; color: var(--zc-text-muted); cursor: pointer; font-size: 0.9rem; transition: 0.3s; }

        /* 手工排盘交互 */
        .manual-row-interactive {
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--zc-border); padding: 12px 20px;
            margin-bottom: 8px; background: rgba(0,0,0,0.3); border-radius: 2px;
        }
        .yao-interactive {
            width: 80px; height: 12px; cursor: pointer; display: flex; justify-content: space-between;
        }
        .yao-dashed .line { width: 100%; height: 100%; border: 1px dashed rgba(212, 168, 67, 0.4); }
        .btn-dong {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--zc-border);
            background: rgba(0,0,0,0.5); color: var(--zc-text-muted); font-size: 0.8rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-dong.active { background: var(--zc-gold-dark); color: #050505; font-weight: bold; }

        /* 排盘网格核心 */
        .gua-grid {
            display: grid; 
            grid-template-columns: 60px 1fr 1fr; 
            gap: 20px;
            font-family: "Courier New", Courier, monospace; 
            font-size: 1.05rem;
        }
        /* 当没有变卦时，由JS动态切换此类 */
        .is-jing-gua { grid-template-columns: 60px 1fr !important; max-width: 500px; margin: 0 auto; }

        .beast-column { display: flex; flex-direction: column; justify-content: space-between; padding-top: 36px; padding-bottom: 4px; color: var(--zc-text-muted); }
        .gua-title { color: var(--zc-gold-light); text-align: center; margin-bottom: 12px; font-weight: bold; font-size: 1rem; }
        .yao-row { display: flex; align-items: center; justify-content: space-between; height: 36px; margin-bottom: 8px; gap: 8px; }
        .yao-symbol { width: 70px; height: 10px; display: flex; justify-content: space-between; flex-shrink: 0; }
        .yao-yang .line { width: 100%; height: 100%; background-color: var(--zc-gold-light); }
        .yao-yin .line { width: 42%; height: 100%; background-color: var(--zc-text-main); }
        .changing-mark { color: var(--zc-gold-dark); width: 25px; text-align: center; font-weight: bold; flex-shrink: 0; }
        .yao-text { color: var(--zc-text-main); flex: 1; min-width: 0; white-space: nowrap; }
        .yao-shishen { color: var(--zc-text-muted); width: 45px; flex-shrink: 0; text-align: right; }
        .yao-position { color: var(--zc-gold-dark); width: 25px; text-align: center; font-weight: bold; flex-shrink: 0; }

        /* ════════════════ 手机端兼容优化 ════════════════ */
        @media (max-width: 768px) {
            .zencode-panel { padding: 1.2rem; margin: 0 10px 2rem; }
            .page-header { padding: 2rem 0 1rem; }
            .page-title { font-size: 1.8rem; }
            .divination-info { font-size: 0.85rem; line-height: 1.6; }
            
            .gua-grid { 
                grid-template-columns: 40px 1fr 1fr; 
                gap: 10px; 
                font-size: 0.8rem; 
            }
            .is-jing-gua { grid-template-columns: 40px 1fr !important; }
            
            .beast-column { font-size: 0.75rem; padding-top: 28px; width: 40px; }
            .yao-row { height: 30px; gap: 4px; }
            .yao-symbol { width: 45px; height: 8px; }
            .yao-text { font-size: 0.75rem; letter-spacing: -0.5px; }
            .yao-shishen { width: 32px; font-size: 0.75rem; }
            .yao-position { width: 18px; font-size: 0.75rem; }
            .changing-mark { width: 18px; font-size: 0.7rem; }
            .gua-title { font-size: 0.85rem; letter-spacing: 0.5px; }

            .manual-row-interactive { padding: 10px 12px; }
            .yao-interactive { width: 60px; }
        }
    </style>
</head>
<body>
    <div id="nav-container"></div>
    <div class="page-header">
        <h1 class="page-title" data-i18n="nav.liuyao">六爻排盤</h1>
        <div class="page-subtitle">· ZENCODE · 命運檔案 ·</div>
    </div>

    <div class="zencode-panel" id="main-panel">
        <div class="divination-info" id="dynamic-info">加载中...</div>

        <div id="screen-choice" class="flow-screen">
            <h2 style="text-align: center; color: var(--zc-gold-light); margin-bottom: 2rem; font-weight: normal; font-size: 1.2rem;">选择推演方式</h2>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                <button class="zc-btn" onclick="startMethod('time')">时间起卦 (自动推演)</button>
                <button class="zc-btn" onclick="startMethod('shake')">铜钱摇卦 (模拟求测)</button>
                <button class="zc-btn" onclick="startMethod('manual')">手工排盘 (点击阴阳)</button>
            </div>
        </div>

        <div id="screen-interact" class="flow-screen" style="display: none; text-align: center;">
            <h3 id="interact-title" style="color: var(--zc-gold-light); margin-bottom: 1.5rem; font-weight: normal; font-size: 1.1rem;"></h3>
            <div id="interact-shake" style="display: none;">
                <button class="zc-btn" id="btn-shake">掷出铜钱 (第1次)</button>
                <div id="shake-progress" style="display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; margin-top: 20px;"></div>
            </div>
            <div id="interact-manual" style="display: none;">
                <div id="manual-rows" style="display: flex; flex-direction: column-reverse; max-width: 400px; margin: 0 auto;"></div>
                <button class="zc-btn" onclick="generateManualGua()" style="margin-top: 1.5rem; background: var(--zc-gold-dark); color: #050505; font-weight: bold;">生成卦象</button>
            </div>
            <button class="zc-btn-text" onclick="resetFlow()" style="margin-top: 2rem;">← 返回</button>
        </div>

        <div id="screen-result" class="flow-screen" style="display: none;">
            <div class="gua-grid" id="gua-layout">
                <div class="beast-column" id="dynamic-beasts"></div>
                <div id="main-gua-col">
                    <div class="gua-title" id="main-gua-title"></div>
                    <div id="dynamic-main-gua"></div>
                </div>
                <div id="change-gua-col">
                    <div class="gua-title" id="change-gua-title"></div>
                    <div id="dynamic-change-gua"></div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 3rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                <a href="mailto:VIP@zencode.codes?subject=【ZenCode 六爻解卦预约】" class="zc-btn" 
                   style="background: linear-gradient(135deg, #5A0A0A 0%, #9C2F18 55%, #C8402A 100%); border: none; color: #fff; text-decoration: none; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(180,40,20,0.3); letter-spacing: 2px;">
                    不会解卦？联系我们
                </a>
                <div style="margin-top: 4px; display: flex; flex-direction: column; align-items: center; gap: 4px;">
                    <div style="color: var(--zc-gold-dark); font-size: 0.75rem; letter-spacing: 1px;">【预约卦师联系方式】</div>
                    <div style="color: var(--zc-text-muted); font-size: 0.75rem; font-family: monospace;">VIP@zencode.codes</div>
                </div>
                <button class="zc-btn-text" onclick="resetFlow()" style="margin-top: 10px;">← 重新推演</button>
            </div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="nav.js"></script>
    <script src="liuyao.js"></script>
</body>
</html>
