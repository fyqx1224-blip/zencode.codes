<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六十四卦大全 - ZenCode</title>
    <style>
        /* --- 沿用 ZenCode 核心视觉体系 --- */
        :root {
            --zc-bg-main: #050505;
            --zc-bg-panel: #0d0c11;
            --zc-gold-light: #e6c587;
            --zc-gold-dark: #8a7342;
            --zc-text-main: #b3b3b3;
            --zc-text-muted: #666666;
            --zc-border: #2a2a35;
        }

        body {
            background-color: var(--zc-bg-main);
            color: var(--zc-text-main);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 粒子太极引擎底层 */
        #bg-canvas { 
            position: fixed; inset: 0; z-index: -2; pointer-events: none; 
            background-color: var(--zc-bg-main);
        }

        /* 顶部导航 */
        .top-nav {
            position: absolute; top: 20px; left: 20px; z-index: 100;
        }
        .back-btn {
            background: rgba(13, 12, 17, 0.6); border: 1px solid var(--zc-gold-dark);
            color: var(--zc-gold-light); padding: 8px 16px; border-radius: 4px;
            font-size: 0.95rem; cursor: pointer; transition: all 0.3s;
            backdrop-filter: blur(4px); text-decoration: none; display: inline-block; letter-spacing: 1px;
        }
        .back-btn:hover { background: var(--zc-gold-dark); color: var(--zc-bg-main); }

        /* 标题版式 */
        .page-header { text-align: center; padding: 4rem 0 2rem; position: relative; z-index: 10; }
        .page-title { color: var(--zc-gold-light); font-size: 2.5rem; font-family: "STZhongsong", serif; letter-spacing: 6px; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(212, 168, 67, 0.4); }
        .page-subtitle { color: var(--zc-gold-dark); font-size: 0.9rem; letter-spacing: 4px; }

        /* 字典主容器 */
        .dict-container {
            max-width: 1000px; margin: 0 auto 4rem; padding: 0 20px;
            position: relative; z-index: 10;
        }

        /* 宫位区块 */
        .palace-block {
            background: rgba(13, 12, 17, 0.65);
            border: 1px solid rgba(138, 115, 66, 0.3);
            border-radius: 4px; padding: 1.5rem; margin-bottom: 2rem;
            backdrop-filter: blur(8px);
        }
        .palace-title {
            color: var(--zc-gold-dark); font-size: 1.2rem; font-weight: bold; letter-spacing: 2px;
            border-bottom: 1px dashed rgba(138, 115, 66, 0.4); padding-bottom: 10px; margin-bottom: 20px;
        }

        /* 响应式网格：PC端一行8个，平板4个，手机4个/2个 */
        .hex-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 12px;
        }

        /* 卦象卡片 */
        .hex-card {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--zc-border);
            padding: 15px 5px; text-align: center; cursor: pointer; transition: all 0.3s ease;
            border-radius: 2px;
        }
        .hex-card:hover {
            border-color: var(--zc-gold-light); background: rgba(138, 115, 66, 0.1);
            box-shadow: 0 5px 15px rgba(212, 168, 67, 0.15); transform: translateY(-3px);
        }
        .hex-card-name { color: var(--zc-gold-light); font-size: 1.05rem; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
        
        /* 迷你卦象图形 */
        .mini-gua { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .mini-yao { height: 4px; width: 30px; display: flex; justify-content: space-between; }
        .mini-yao-yang { background: var(--zc-gold-dark); width: 100%; }
        .mini-yao-yin { background: var(--zc-text-muted); width: 42%; }

        /* === 弹窗详情页 === */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(6px);
            z-index: 1000; display: none; overflow-y: auto; padding: 20px 10px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: block; opacity: 1; }
        
        .modal-content {
            max-width: 600px; margin: 40px auto; background: var(--zc-bg-panel);
            border: 1px solid var(--zc-gold-dark); padding: 30px 40px; position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
        }
        .modal-content::before, .modal-content::after { content: ''; position: absolute; width: 15px; height: 15px; border: 1px solid var(--zc-gold-dark); }
        .modal-content::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .modal-content::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .btn-close {
            position: absolute; top: 15px; right: 20px; background: none; border: none;
            color: var(--zc-text-muted); font-size: 1.8rem; cursor: pointer; transition: 0.3s;
        }
        .btn-close:hover { color: var(--zc-gold-light); transform: rotate(90deg); }

        .detail-header { text-align: center; border-bottom: 1px dashed rgba(138, 115, 66, 0.4); padding-bottom: 20px; margin-bottom: 20px; }
        .detail-title { color: var(--zc-gold-light); font-size: 2rem; font-family: "STZhongsong", serif; letter-spacing: 4px; margin: 0 0 5px; }
        .detail-subtitle { color: var(--zc-gold-dark); font-size: 0.9rem; letter-spacing: 2px; }

        /* 弹窗内的排盘结构 */
        .detail-gua-layout { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .detail-yao-row { display: flex; align-items: center; justify-content: center; height: 30px; margin-bottom: 6px; gap: 12px; font-family: "Courier New", Courier, monospace;}
        .yao-shishen { color: var(--zc-text-muted); width: 40px; text-align: right; }
        .yao-text { color: var(--zc-text-main); width: 60px; text-align: left; padding-left: 5px;}
        .yao-symbol { width: 65px; height: 8px; display: flex; justify-content: space-between; }
        .yao-position { color: var(--zc-gold-dark); width: 20px; text-align: center; font-weight: bold;}
        .yao-symbol.yang .line { width: 100%; height: 100%; background-color: var(--zc-gold-light); box-shadow: 0 0 5px rgba(212, 168, 67, 0.3);}
        .yao-symbol.yin .line { width: 42%; height: 100%; background-color: var(--zc-text-main); }

        .detail-section { margin-bottom: 25px; }
        .section-title { color: var(--zc-gold-dark); font-size: 1.05rem; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .section-title::before { content:''; display:inline-block; width:4px; height:14px; background:var(--zc-gold-dark); }
        .section-content { color: var(--zc-text-main); font-size: 0.95rem; line-height: 1.8; text-align: justify; }
        
        .yaoci-item { margin-bottom: 10px; border-left: 1px solid rgba(138, 115, 66, 0.2); padding-left: 10px; }
        .yaoci-name { color: var(--zc-gold-light); font-weight: bold; margin-right: 8px; }

        /* === 手机端适配 === */
        @media (max-width: 768px) {
            .hex-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .palace-block { padding: 1rem; }
            .hex-card { padding: 10px 2px; }
            .hex-card-name { font-size: 0.9rem; }
            .modal-content { padding: 20px 15px; margin: 20px auto; }
            .detail-title { font-size: 1.6rem; }
            .detail-yao-row { font-size: 0.85rem; gap: 6px; }
            .yao-symbol { width: 45px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="top-nav">
        <a href="index.html" class="back-btn">← 返回排盘</a>
    </div>

    <div class="page-header">
        <h1 class="page-title">六十四卦大全</h1>
        <div class="page-subtitle">· 易经义理与排盘字典 ·</div>
    </div>

    <div class="dict-container" id="dict-root">
        </div>

    <div class="modal-overlay" id="detail-modal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModal()">×</button>
            
            <div class="detail-header">
                <h2 class="detail-title" id="m-name">乾为天</h2>
                <div class="detail-subtitle" id="m-palace">乾宫 · 金</div>
            </div>

            <div class="detail-gua-layout" id="m-gua-layout">
                </div>

            <div class="detail-section">
                <div class="section-title">卦意解析</div>
                <div class="section-content" id="m-meaning"></div>
            </div>

            <div class="detail-section">
                <div class="section-title">各爻辞解</div>
                <div class="section-content" id="m-yaoci"></div>
            </div>
        </div>
    </div>

    <script>
    // ================= 1. 粒子背景引擎复用 =================
    (function(){
        const c = document.getElementById('bg-canvas');
        const ctx = c.getContext('2d');
        let W, H; const particles = []; const NUM_PARTICLES = 400; // 字典页稍微减少粒子保持清爽
        function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        function gaussianRandom() { let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v); }
        class Particle {
            constructor() { this.isYang = Math.random() > 0.5; this.reset(true); }
            reset(randomize = false) {
                this.progress = randomize ? Math.random() : 0; 
                this.speed = Math.random() * 0.0015 + 0.0005; 
                this.size = Math.random() * 3.5 + 1.5; 
                let spread = (Math.max(W, H) * 0.15); this.thickness = gaussianRandom() * spread;
            }
            update() { this.progress += this.speed; if (this.progress > 1) this.reset(); }
            draw() {
                let cx = W / 2, cy = H / 2; let maxR = Math.max(W, H) * 0.7; 
                let baseAngle = this.progress * Math.PI * 2.5; if (!this.isYang) baseAngle += Math.PI; 
                let r = maxR * (1 - this.progress * 0.6); let perpAngle = baseAngle + Math.PI / 2;
                let globalRot = Date.now() * 0.00015; let finalAngle = baseAngle + globalRot;
                let x = cx + r * Math.cos(finalAngle) + Math.cos(perpAngle + globalRot) * this.thickness;
                let y = cy + r * Math.sin(finalAngle) + Math.sin(perpAngle + globalRot) * this.thickness;
                let alpha = 1; if (this.progress < 0.1) alpha = this.progress / 0.1; if (this.progress > 0.9) alpha = (1 - this.progress) / 0.1;
                ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.isYang ? `rgba(245, 215, 150, ${alpha * 0.6})` : `rgba(160, 125, 65, ${alpha * 0.3})`;
                ctx.fill();
            }
        }
        for(let i=0;i<NUM_PARTICLES;i++) particles.push(new Particle());
        function loop() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)'; ctx.fillRect(0, 0, W, H);
            let glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)/2);
            glow.addColorStop(0, 'rgba(138, 115, 66, 0.06)'); glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);
            particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(loop);
        }
        loop();
    })();

    // ================= 2. 字典数据结构 (样例) =================
    // 数组 1 表示阳爻，0 表示阴爻。顺序为从初爻（最下）到上爻（最上）
    
    const palaces = [
        { name: "乾", wx: "金", hexagrams: ["乾为天", "天风姤", "天山遁", "天地否", "风地观", "山地剥", "火地晋", "火天大有"] },
        { name: "兑", wx: "金", hexagrams: ["兑为泽", "泽水困", "泽地萃", "泽山咸", "水山蹇", "地山谦", "雷山小过", "雷泽归妹"] },
        // ... 此处你需要自己补充完整八宫的顺序，目前我先用前两宫作为UI结构展示。
    ];

    // 这是核心字典数据。你需要基于这个格式把64卦填满。
    const dictData = {
        "乾为天": {
            bin: [1,1,1, 1,1,1], // 初爻到上爻
            shi: 5, ying: 2, // 索引0-5
            lines: [
                { k: "父母", tg: "甲", dz: "子", wx: "水" },
                { k: "妻财", tg: "甲", dz: "寅", wx: "木" },
                { k: "子孙", tg: "甲", dz: "辰", wx: "土" },
                { k: "父母", tg: "壬", dz: "午", wx: "火" },
                { k: "妻财", tg: "壬", dz: "申", wx: "金" },
                { k: "子孙", tg: "壬", dz: "戌", wx: "土" }
            ],
            meaning: "乾卦为六十四卦之首，纯阳之卦。象征天，刚健中正，自强不息。测事主大吉大利，但也需防过刚易折，亢龙有悔。",
            yaoci: [
                { name: "初九", text: "潜龙勿用。时机未到，宜隐藏实力。" },
                { name: "九二", text: "见龙在田，利见大人。崭露头角，贵人相助。" },
                { name: "九三", text: "君子终日乾乾，夕惕若厉，无咎。勤奋谨慎，可免灾祸。" },
                { name: "九四", text: "或跃在渊，无咎。进退有据，伺机而动。" },
                { name: "九五", text: "飞龙在天，利见大人。如日中天，大吉大利。" },
                { name: "上九", text: "亢龙有悔。盛极必衰，需懂知足进退。" }
            ]
        },
        "天风姤": {
            bin: [0,1,1, 1,1,1], // 初爻变阴
            shi: 0, ying: 3,
            lines: [
                { k: "父母", tg: "辛", dz: "丑", wx: "土" },
                { k: "妻财", tg: "辛", dz: "亥", wx: "水" },
                { k: "子孙", tg: "辛", dz: "酉", wx: "金" },
                { k: "父母", tg: "壬", dz: "午", wx: "火" },
                { k: "妻财", tg: "壬", dz: "申", wx: "金" },
                { k: "子孙", tg: "壬", dz: "戌", wx: "土" }
            ],
            meaning: "姤卦一阴生于下，五阳在上。象征相遇、不期而遇。阴气渐长，君子需防范小人暗中滋生，测感情多指偶遇或非正缘。",
            yaoci: [
                { name: "初六", text: "系于金柅，贞吉；有攸往，见凶；羸豕孚蹢躅。" },
                { name: "九二", text: "包有鱼，无咎；不利宾。" },
                { name: "九三", text: "臀无肤，其行次且；厉，无大咎。" },
                { name: "九四", text: "包无鱼，起凶。" },
                { name: "九五", text: "以杞包瓜，含章，有陨自天。" },
                { name: "上九", text: "姤其角；吝，无咎。" }
            ]
        }
        // 继续补充其它卦象...
    };

    // ================= 3. 渲染主页面网格 =================
    const root = document.getElementById('dict-root');

    function renderMiniLines(binArr) {
        let html = '';
        // 渲染时习惯从上爻往下排
        for(let i=5; i>=0; i--) {
            let type = binArr[i] === 1 ? 'mini-yao-yang' : 'mini-yao-yin';
            let lineHtml = binArr[i] === 1 ? `<div class="${type}"></div>` : `<div class="${type}"></div><div class="${type}"></div>`;
            html += `<div class="mini-yao">${lineHtml}</div>`;
        }
        return `<div class="mini-gua">${html}</div>`;
    }

    palaces.forEach(palace => {
        let block = document.createElement('div');
        block.className = 'palace-block';
        
        let hexCardsHtml = palace.hexagrams.map(hName => {
            let data = dictData[hName];
            // 假如还没配置该卦数据，用空的占位符避免报错
            let linesHtml = data ? renderMiniLines(data.bin) : '<div style="color:var(--zc-text-muted);font-size:0.7rem;">暂无数据</div>';
            return `
                <div class="hex-card" onclick="openModal('${hName}', '${palace.name}', '${palace.wx}')">
                    <div class="hex-card-name">${hName}</div>
                    ${linesHtml}
                </div>
            `;
        }).join('');

        block.innerHTML = `
            <div class="palace-title">${palace.name}宫八卦 (${palace.wx})</div>
            <div class="hex-grid">${hexCardsHtml}</div>
        `;
        root.appendChild(block);
    });

    // ================= 4. 弹窗交互逻辑 =================
    const modal = document.getElementById('detail-modal');

    window.openModal = function(hName, pName, pWx) {
        const data = dictData[hName];
        if(!data) {
            alert("该卦象详细数据尚未配置。请在代码的 dictData 中补充。");
            return;
        }

        document.getElementById('m-name').innerText = hName;
        document.getElementById('m-palace').innerText = `【${pName}宫】五行属 ${pWx}`;
        document.getElementById('m-meaning').innerText = data.meaning;

        // 渲染内部爻象结构
        let layoutHtml = '';
        for(let i=5; i>=0; i--) {
            let line = data.lines[i];
            let isYang = data.bin[i] === 1;
            let mPos = (data.shi === i) ? '世' : (data.ying === i) ? '应' : '';
            let yaoSym = isYang ? '<div class="line"></div>' : '<div class="line"></div><div class="line"></div>';
            let symClass = isYang ? 'yang' : 'yin';

            layoutHtml += `
                <div class="detail-yao-row">
                    <span class="yao-shishen">${line.k}</span>
                    <span class="yao-text">${line.tg}${line.dz}${line.wx}</span>
                    <div class="yao-symbol ${symClass}">${yaoSym}</div>
                    <span class="yao-position">${mPos}</span>
                </div>
            `;
        }
        document.getElementById('m-gua-layout').innerHTML = `<div>${layoutHtml}</div>`;

        // 渲染爻辞
        let yaociHtml = data.yaoci.map(yc => `
            <div class="yaoci-item">
                <span class="yaoci-name">${yc.name}：</span><span>${yc.text}</span>
            </div>
        `).join('');
        document.getElementById('m-yaoci').innerHTML = yaociHtml;

        // 显示弹窗
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // 禁止背景滚动
    }

    window.closeModal = function() {
        modal.classList.remove('active');
        document.body.style.overflow = 'auto'; // 恢复背景滚动
    }

    // 点击背景也能关闭弹窗
    modal.addEventListener('click', function(e) {
        if(e.target === modal) closeModal();
    });

    </script>
</body>
</html>
